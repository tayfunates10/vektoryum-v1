# Render Blueprint — Vektoryum.ai (Docker web servisi)
#
# Kurulum (3 adım, ~2 dk):
#   1) render.com → New + → "Blueprint"
#   2) Bu GitHub reposunu (tayfunates10/vektoryum-v1) bağla ve dalı 'main' seç
#   3) "Apply" → Render bu dosyayı okuyup imajı derler ve yayına alır.
#      Bittiğinde servis URL'i: https://vektoryum.onrender.com (ad'a göre)
#
# ÖNEMLİ — BELLEK: Bu motor küçük bir logoda bile ~826MB tepe bellek kullanır
# (ölçüldü). Ücretsiz VE Starter kademe 512MB'dır -> her istekte OOM olur, sunucu
# boş/HTML yanıt döner ("Unexpected end of JSON input"). Bu nedenle Dashboard'dan
# planı EN AZ "Standard" (2GB / 1 CPU) yapmak ZORUNLUDUR; ardından
# VEKTORYUM_WORKERS'ı 2-3'e çıkarabilirsin. (Bu blueprint 'free' başlatır ki
# Apply beklenmedik ücret açmasın; planı panelden yükselt.)

services:
  - type: web
    name: vektoryum
    runtime: docker
    repo: https://github.com/tayfunates10/vektoryum-v1
    dockerfilePath: ./engine/Dockerfile
    dockerContext: ./engine
    plan: free            # büyük görseller için: standard (2GB)
    region: frankfurt     # TR'ye en yakın bölge
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # free/tek-CPU'da bellek güvenliği için tekil işlem; daha büyük planda 2-4
      - key: VEKTORYUM_WORKERS
        value: "1"
      # 512MB RAM'de büyük görsel (ör. 3840px) OOM yapıp HTML hata sayfası döner;
      # girdi en uzun kenarı bu değere küçültülür (vektör kalitesi ~kayıpsız).
      # Standard (2GB) plana geçince 2600-3200 yapabilir ya da kaldırabilirsin.
      - key: VEKTORYUM_MAX_INPUT_SIDE
        value: "1800"
