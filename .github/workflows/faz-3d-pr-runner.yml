name: FAZ 3D PR executor

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d-pr-runner.yml"

permissions:
  contents: write

concurrency:
  group: faz-3d-pr-executor-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PYTHONHASHSEED: "0"
      PYTHONPATH: engine:.
      VEKTORYUM_WORKERS: "1"
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install executor parser
        run: python -m pip install -q pyyaml

      - name: Execute final test-gated FAZ 3D plan
        shell: bash
        run: |
          set -o pipefail
          test "$(git branch --show-current)" = "${TARGET_BRANCH}"
          python - <<'PY' 2>&1 | tee faz3d-pr-executor.log
          from __future__ import annotations

          import hashlib
          import json
          import os
          import subprocess
          from pathlib import Path

          import yaml

          def run(command: str) -> None:
              subprocess.run(
                  command,
                  shell=True,
                  executable='/bin/bash',
                  check=True,
                  env=os.environ.copy(),
              )

          source = Path('.github/workflows/faz-3d-apply-fix.yml').read_text()
          source = source.replace(
              "    if: github.event.head_commit.message == 'chore: execute FAZ 3D canvas-underpaint fix'\n",
              "    if: true\n",
          )
          workflow = yaml.safe_load(source)
          steps = workflow['jobs']['apply']['steps']
          skipped = {'Confirm exact starting branch'}

          for step in steps:
              name = step.get('name', '')
              command = step.get('run')
              if not command or name in skipped:
                  continue

              print(f'\n=== {name} ===', flush=True)
              run(command)

              if name == 'Add permanent scalar diagnostic evidence':
                  evidence_path = Path(
                      'docs/real_world_fidelity/evidence/'
                      'faz3d_painter_alpha_reconstruction_diagnostics.json'
                  )
                  evidence = json.loads(evidence_path.read_text())
                  evidence.pop('evidence_sha256', None)
                  evidence['schema'] = 'vektoryum-faz3d-painter-diagnostics-v3'
                  evidence['underpaint_stroke_ladder'] = {
                      'source_commit': 'c12e440a00e46b3d6dde21a6225fc1917e80844a',
                      'workflow_run_id': 29999207982,
                      'artifact_digest': 'sha256:55fefe897afbd26a2ac980bf88a9ecaef743d18e6f944015cc8dd4d8b4b517a1',
                      'rows': [
                          {'stroke_width': 1.0, 'alpha_iou': 1.0, 'alpha_mae': 0.0, 'component_delta': 2, 'hole_delta': -3, 'journal_passed': True, 'journal_reason_codes': ['metrics_non_regressing']},
                          {'stroke_width': 1.5, 'alpha_iou': 1.0, 'alpha_mae': 0.0, 'component_delta': 2, 'hole_delta': -1, 'journal_passed': True, 'journal_reason_codes': ['metrics_non_regressing']},
                          {'stroke_width': 2.0, 'alpha_iou': 1.0, 'alpha_mae': 0.0, 'component_delta': -2, 'hole_delta': -2, 'journal_passed': True, 'journal_reason_codes': ['metrics_non_regressing']},
                          {'stroke_width': 3.0, 'alpha_iou': 1.0, 'alpha_mae': 0.0, 'component_delta': 2, 'hole_delta': -1, 'journal_passed': False, 'journal_reason_codes': ['edge_f1_regression']},
                      ],
                      'selected_minimum_underpaint_support_stroke': 1.5,
                      'selection_reason': 'smallest_existing_stroke_preserving_alpha_and_topology_sentinel',
                  }
                  canonical = json.dumps(
                      evidence, sort_keys=True, separators=(',', ':')
                  )
                  evidence['evidence_sha256'] = hashlib.sha256(
                      canonical.encode('utf-8')
                  ).hexdigest()
                  evidence_path.write_text(
                      json.dumps(evidence, sort_keys=True, indent=2) + '\n'
                  )
                  diagnostic_doc = Path(
                      'docs/real_world_fidelity/'
                      'faz-3d-painter-alpha-reconstruction-diagnostics.md'
                  )
                  diagnostic_doc.write_text(
                      diagnostic_doc.read_text()
                      + '''\n## Underpaint support-stroke measurement\n\nThe same fixture was rendered with every existing support-stroke candidate.\nAlpha stayed exact (`IoU=1.0`, `MAE=0.0`) for all four widths. The source\ntopology sentinel separated them:\n\n| Stroke | Component delta | Hole delta | Journal |\n|---:|---:|---:|---|\n| 1.0 | +2 | -3 | pass |\n| 1.5 | +2 | -1 | pass |\n| 2.0 | -2 | -2 | pass |\n| 3.0 | +2 | -1 | fail: edge_f1_regression |\n\n`1.5 px` is the smallest already-existing candidate that preserves exact alpha,\npasses the unchanged journal and stays inside the pre-existing topology sentinel.\nThe fix therefore treats only sub-1.5px support as inadmissible when a proven\ncanvas is retained as transform-owned underpaint. No evaluator or journal\nthreshold is changed.\n'''
                  )
                  run(
                      "git add docs/real_world_fidelity/evidence/"
                      "faz3d_painter_alpha_reconstruction_diagnostics.json "
                      "docs/real_world_fidelity/"
                      "faz-3d-painter-alpha-reconstruction-diagnostics.md && "
                      "git -c user.name='Vektoryum CI' "
                      "-c user.email='actions@github.com' commit --amend --no-edit"
                  )

              if name == 'Apply narrow canvas-underpaint production fix':
                  painter = Path('engine/app/alpha_candidate_painter.py')
                  text = painter.read_text()
                  old = '''_PAINTER_STROKE_PIXELS = (1.0, 1.5, 2.0, 3.0)\n_PAINTER_EVAL_SIDE = 512.0\n'''
                  new = '''_PAINTER_STROKE_PIXELS = (1.0, 1.5, 2.0, 3.0)\n# A proven full-canvas underpaint supplies alpha support but can expose its own\n# comparison colour through an uncovered one-pixel AA fringe. The measured\n# existing 1.5px candidate is the smallest support width that preserves the\n# unchanged source-topology sentinel; this is an encoding preflight, not a\n# quality-threshold change.\n_PAINTER_UNDERPAINT_MIN_STROKE_PIXELS = 1.5\n_PAINTER_EVAL_SIDE = 512.0\n'''
                  assert text.count(old) == 1
                  text = text.replace(old, new)
                  old = '''                entry["preflight_status"] = "within_budget"\n                entry["validation_started"] = True\n'''
                  new = '''                entry["preflight_status"] = "within_budget"\n                if (\n                    canvas is not None\n                    and float(stroke_width)\n                    < _PAINTER_UNDERPAINT_MIN_STROKE_PIXELS\n                ):\n                    entry["validation_stage"] = "underpaint_support"\n                    entry["status"] = "geometry_rejected"\n                    entry["exact_error_code"] = (\n                        "source_alpha_candidate_painter_underpaint_support_insufficient:"\n                        f"{stroke_width:g}<"\n                        f"{_PAINTER_UNDERPAINT_MIN_STROKE_PIXELS:g}"\n                    )\n                    attempts.append(entry)\n                    probe_temp.unlink(missing_ok=True)\n                    continue\n                entry["validation_started"] = True\n'''
                  assert text.count(old) == 1
                  text = text.replace(old, new)
                  painter.write_text(text)

              if name == 'Add FAZ 3D reconstruction fidelity tests':
                  test_path = Path(
                      'engine/test_alpha_painter_reconstruction_fidelity.py'
                  )
                  text = test_path.read_text()

                  fractional_marker = (
                      'def test_fractional_nonzero_viewbox_uses_cell_edge_mapping'
                  )
                  before, fractional = text.split(fractional_marker, 1)
                  rendered_token = 'rendered = _render_tree(tree, 64, 64)'
                  rendered_index = fractional.index(rendered_token)
                  line_start = fractional.rfind('\n', 0, rendered_index) + 1
                  indent = fractional[line_start:rendered_index]
                  fractional = (
                      fractional[:line_start]
                      + indent
                      + '# Explicit anisotropic mapping; default meet would letterbox.\n'
                      + indent
                      + 'tree.set("preserveAspectRatio", "none")\n'
                      + fractional[line_start:]
                  )
                  text = before + fractional_marker + fractional

                  end_marker = (
                      'def test_end_to_end_sparse_artwork_uses_masked_canvas_support'
                  )
                  before, end_to_end = text.split(end_marker, 1)
                  alpha_assert = (
                      'self.assertGreaterEqual('
                      'report["painter_native_alpha_iou"], 0.995)'
                  )
                  assert_index = end_to_end.index(alpha_assert)
                  line_start = end_to_end.rfind('\n', 0, assert_index) + 1
                  indent = end_to_end[line_start:assert_index]
                  insertion = (
                      indent
                      + 'self.assertGreaterEqual(\n'
                      + indent
                      + '    report["candidate_support_stroke_width_pixels"], 1.5\n'
                      + indent
                      + ')\n'
                  )
                  end_to_end = (
                      end_to_end[:line_start] + insertion + end_to_end[line_start:]
                  )
                  text = before + end_marker + end_to_end
                  test_path.write_text(text)

              if name == 'Update alpha contract workflow and fix documentation':
                  fix_doc = Path(
                      'docs/real_world_fidelity/'
                      'faz-3d-painter-alpha-reconstruction-fix.md'
                  )
                  fix_doc.write_text(
                      fix_doc.read_text()
                      + '''\n## Underpaint support preflight\n\nFor a proven comparison canvas, the existing 1.0px support candidate is recorded\nin the deterministic attempt ledger but is not admitted to alpha/journal\nvalidation: a 1.0px stroke expands only 0.5px per side and the renderer evidence\nshows a source-hole delta of -3. The next existing candidate, 1.5px, keeps alpha\nIoU at 1.0, passes the unchanged journal and restores the existing topology\nsentinel. Byte-rejected encodings still record all four stroke candidates, so the\nFAZ 3B.1 observability and primary-error contracts are preserved.\n'''
                  )

              if name == 'Commit fix and remove executor workflows':
                  for temporary in (
                      '.github/workflows/faz-3d-pr-runner.yml',
                      '.github/workflows/faz-3d-underpaint-stroke-diagnostic.yml',
                  ):
                      subprocess.run(['git', 'rm', '-f', temporary], check=True)

          PY

      - name: Upload complete executor log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faz3d-pr-executor-${{ github.run_id }}
          path: faz3d-pr-executor.log
          if-no-files-found: error
          retention-days: 7
