name: FAZ 3D PR executor

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d-pr-runner.yml"

permissions:
  contents: write

concurrency:
  group: faz-3d-pr-executor-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PYTHONHASHSEED: "0"
      PYTHONPATH: engine:.
      VEKTORYUM_WORKERS: "1"
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install executor parser
        run: python -m pip install -q pyyaml

      - name: Execute test-gated FAZ 3D plan
        shell: bash
        run: |
          set -o pipefail
          test "$(git branch --show-current)" = "${TARGET_BRANCH}"
          python - <<'PY' 2>&1 | tee faz3d-pr-executor.log
          from __future__ import annotations

          import os
          import subprocess
          from pathlib import Path

          import yaml

          source = Path('.github/workflows/faz-3d-apply-fix.yml').read_text()
          source = source.replace(
              "    if: github.event.head_commit.message == 'chore: execute FAZ 3D canvas-underpaint fix'\n",
              "    if: true\n",
          )
          workflow = yaml.safe_load(source)
          steps = workflow['jobs']['apply']['steps']
          skipped = {'Confirm exact starting branch'}
          for step in steps:
              name = step.get('name', '')
              command = step.get('run')
              if not command or name in skipped:
                  continue
              if name == 'Commit fix and remove executor workflows':
                  subprocess.run(
                      ['git', 'rm', '-f', '.github/workflows/faz-3d-pr-runner.yml'],
                      check=True,
                  )
              print(f'\n=== {name} ===', flush=True)
              subprocess.run(
                  command,
                  shell=True,
                  executable='/bin/bash',
                  check=True,
                  env=os.environ.copy(),
              )
          PY

      - name: Upload complete executor log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faz3d-pr-executor-${{ github.run_id }}
          path: faz3d-pr-executor.log
          if-no-files-found: error
          retention-days: 7
