name: FAZ 3D4 prune diagnostics

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-prune-diagnostics.yml"

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
      KEEP: .github/workflows/faz-3d4-paint-deficit-production-v2.yml
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Keep only the production v2 executor
        shell: bash
        run: |
          set -euo pipefail
          for file in .github/workflows/faz-3d4-*.yml; do
            [ "$file" = "$KEEP" ] && continue
            rm -f "$file"
          done
          git diff --check
          git add -A .github/workflows
          git -c user.name='Vektoryum CI' -c user.email='actions@github.com' commit \
            -m 'chore: prune temporary FAZ 3D4 diagnostic workflows'
          git push origin "HEAD:${TARGET_BRANCH}"
