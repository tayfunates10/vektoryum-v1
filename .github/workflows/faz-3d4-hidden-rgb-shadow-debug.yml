name: FAZ 3D4 hidden RGB shadow debug

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-hidden-rgb-shadow-debug.yml"

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: engine:.
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -q -r engine/requirements.txt pytest httpx
      - name: Extract and run shadow script with safe error capture
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/faz-3d4-hidden-rgb-shadow.yml').read_text()
          start = "cat > /tmp/hidden_rgb_shadow.py <<'PY'\n"
          end = "\n          PY\n          python /tmp/hidden_rgb_shadow.py"
          script = workflow.split(start, 1)[1].split(end, 1)[0]
          Path('/tmp/hidden_rgb_shadow.py').write_text(textwrap.dedent(script))
          PY
          set +e
          python /tmp/hidden_rgb_shadow.py > shadow-run.log 2>&1
          status=$?
          set -e
          tail -120 shadow-run.log > shadow-error-tail.txt
          echo "exit_code=${status}" >> shadow-error-tail.txt
          exit 0
      - name: Upload safe debug output
        uses: actions/upload-artifact@v4
        with:
          name: faz3d4-hidden-rgb-debug-${{ github.run_id }}
          path: |
            shadow-error-tail.txt
            faz3d4-hidden-rgb-shadow.json
          if-no-files-found: warn
          retention-days: 3
