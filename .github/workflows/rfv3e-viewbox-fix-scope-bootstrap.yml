name: RFV-3E viewBox fix scope bootstrap

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/rfv3e-viewbox-fix-scope-bootstrap.yml"
      - "engine/regression/apply_rfv3e_viewbox_fix_scope.py"

permissions:
  contents: write

concurrency:
  group: rfv3e-viewbox-fix-scope-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply-test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: engine
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/rfv-3e-exact-metric-path-viewbox-fix

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Apply stage-scoped alpha and historical-diagnostics patch
        run: python engine/regression/apply_rfv3e_viewbox_fix_scope.py

      - name: Install production test dependencies
        run: python -m pip install -r engine/requirements.txt pytest

      - name: Compile changed contracts
        run: >-
          python -m py_compile
          engine/app/transform_journal.py
          engine/test_transform_journal.py
          engine/regression/rfv3e_viewbox_journal_diagnostics.py
          engine/regression/test_rfv3e_viewbox_journal_diagnostics.py

      - name: Run complete transform journal contract
        working-directory: engine
        run: pytest -q test_transform_journal.py

      - name: Verify immutable historical diagnostics
        run: |
          python -m unittest engine.regression.test_rfv3e_viewbox_journal_diagnostics -v
          python -m engine.regression.rfv3e_viewbox_journal_diagnostics verify \
            --evidence docs/real_world_fidelity/evidence/rfv3e_viewbox_journal_diagnostics.json

      - name: Verify exact patch scope
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git diff --name-only HEAD)"
          expected=$'docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-diagnostics.md\nengine/app/transform_journal.py\nengine/regression/rfv3e_viewbox_journal_diagnostics.py\nengine/regression/test_rfv3e_viewbox_journal_diagnostics.py\nengine/test_transform_journal.py'
          test "${changed}" = "${expected}"

      - name: Commit validated stage-scoped fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            engine/app/transform_journal.py \
            engine/test_transform_journal.py \
            engine/regression/rfv3e_viewbox_journal_diagnostics.py \
            engine/regression/test_rfv3e_viewbox_journal_diagnostics.py \
            docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-diagnostics.md
          git commit -m "fix(rfv3e): scope alpha repair and retire live diagnosis"
          git push origin HEAD:agent/rfv-3e-exact-metric-path-viewbox-fix
