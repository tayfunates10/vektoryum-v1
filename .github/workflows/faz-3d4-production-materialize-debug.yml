name: FAZ 3D4 integration v2 debug

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-production-materialize-debug.yml"
      - "engine/regression/faz3d4_integrate_paint_deficit_v2.py"

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run integration v2 with safe error capture
        shell: bash
        run: |
          set +e
          python engine/regression/faz3d4_integrate_paint_deficit_v2.py \
            > integration-v2-debug.log 2>&1
          status=$?
          set -e
          {
            echo "exit_code=${status}"
            tail -120 integration-v2-debug.log
            test -f engine/app/alpha_candidate_paint_deficit.py && echo "module=true" || echo "module=false"
            test -f engine/test_alpha_painter_paint_deficit.py && echo "test=true" || echo "test=false"
          } > integration-v2-debug-tail.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: faz3d4-integration-v2-debug-${{ github.run_id }}
          path: integration-v2-debug-tail.txt
          retention-days: 3
