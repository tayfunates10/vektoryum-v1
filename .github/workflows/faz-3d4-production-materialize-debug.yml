name: FAZ 3D4 integration script debug

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-production-materialize-debug.yml"
      - "engine/regression/faz3d4_integrate_paint_deficit.py"

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run integration script with safe error capture
        shell: bash
        run: |
          set +e
          python engine/regression/faz3d4_integrate_paint_deficit.py \
            > integration-debug.log 2>&1
          status=$?
          set -e
          {
            echo "exit_code=${status}"
            tail -120 integration-debug.log
            if [ -f engine/app/alpha_candidate_paint_deficit.py ]; then
              echo "module_materialized=true"
            else
              echo "module_materialized=false"
            fi
            if [ -f engine/test_alpha_painter_paint_deficit.py ]; then
              echo "test_materialized=true"
            else
              echo "test_materialized=false"
            fi
          } > integration-debug-tail.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: faz3d4-integration-debug-${{ github.run_id }}
          path: integration-debug-tail.txt
          retention-days: 3
