name: Real-world fidelity RFV-3D2 metric provenance

on:
  pull_request:

permissions:
  contents: read

jobs:
  rfv3d2-metric-provenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: engine
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install RFV-3D2 dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          numpy pillow opencv-python-headless scipy defusedxml

      - name: Compile RFV-3D2 files
        run: |
          python -m py_compile \
            engine/benchmark/manifest.py \
            engine/benchmark/pipeline_results.py \
            engine/benchmark/pipeline_smoke.py \
            engine/regression/test_rfv3d2_metric_provenance.py

      - name: Test RFV-3D2 metric provenance instrumentation
        run: python -m unittest engine.regression.test_rfv3d2_metric_provenance -v

      - name: Guard existing measurement contracts
        run: >-
          python -m unittest
          engine.regression.test_rfv3_live_measurement
          engine.regression.test_rfv3_measurement_runner
          engine.regression.test_rfv3_metric_coverage

      - name: Confirm RFV-4 remains blocked
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          roadmap = json.loads(Path('docs/real_world_fidelity_roadmap.json').read_text())
          decision = json.loads(Path('docs/real_world_fidelity/evidence/rfv3_quality_decision.json').read_text())
          assert roadmap['phases'][3]['status'] == 'pending'
          assert decision['release_decision'] == 'no_go'
          assert decision['rfv4_allowed'] is False
          PY
