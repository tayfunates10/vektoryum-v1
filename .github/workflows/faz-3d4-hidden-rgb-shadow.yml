name: FAZ 3D4 hidden RGB shadow matrix

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-hidden-rgb-shadow.yml"

permissions:
  contents: read

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: engine:.
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -q -r engine/requirements.txt pytest httpx

      - name: Measure source-hidden-RGB vector support variants
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/hidden_rgb_shadow.py <<'PY'
          from __future__ import annotations

          import copy
          import hashlib
          import json
          import tempfile
          import xml.etree.ElementTree as ET
          from pathlib import Path

          import numpy as np
          from PIL import Image

          import app  # noqa: F401 - installs runtime wrappers
          from app import pipeline
          from app.alpha_candidate_background import classify_comparison_background
          from app.alpha_candidate_knockout import (
              _local_name,
              _render_root,
              _source_rgb_on_white,
              _viewbox,
          )
          from app.alpha_candidate_painter import (
              _painter_contour_children,
              _painter_loops,
              _painter_polygon_children,
              _painter_rect_children,
          )
          from app.alpha_candidate_support import _PROTECTED_ROOT_TAGS, _strip_content_alpha
          from app.alpha_preprocess import _rgba_from_source_at_size
          from app.alpha_svg_mask import _MODE_IMAGE_CLASS, _merged_rectangles_by_level, _quantize_alpha
          from app.final_artifact_evaluator import evaluate_final_svg
          from app.source_truth import alpha_plane_metrics, render_svg_to_rgba
          from app.transform_journal import TransformJournal, _measure_svg_bytes

          SVG_NS = "http://www.w3.org/2000/svg"
          ET.register_namespace("", SVG_NS)

          def qname(name: str) -> str:
              return f"{{{SVG_NS}}}{name}"

          def pipeline_without_alpha():
              fn = pipeline.run_pipeline
              while fn is not None:
                  if getattr(fn, "__vektoryum_auto_gate_wrapped__", False):
                      return fn
                  fn = getattr(fn, "__wrapped__", None)
              raise RuntimeError("auto-gate pipeline wrapper not found")

          def dominant_opaque_palette(rgba: np.ndarray, limit: int) -> np.ndarray:
              alpha = rgba[:, :, 3]
              rgb = rgba[:, :, :3]
              selected = alpha >= 240
              if not bool(selected.any()):
                  selected = alpha > 0
              colors = rgb[selected].astype(np.int32)
              buckets = colors // 8
              unique, inverse, counts = np.unique(buckets, axis=0, return_inverse=True, return_counts=True)
              order = sorted(
                  range(len(unique)),
                  key=lambda i: (-int(counts[i]), tuple(int(v) for v in unique[i])),
              )[: max(1, int(limit))]
              palette = []
              for index in order:
                  members = colors[inverse == index]
                  palette.append(np.rint(members.mean(axis=0)).clip(0, 255).astype(np.uint8))
              return np.asarray(palette, dtype=np.uint8)

          def nearest_palette(values: np.ndarray, palette: np.ndarray) -> np.ndarray:
              flat = values.reshape(-1, 3).astype(np.int32)
              pal = palette.astype(np.int32)
              distances = ((flat[:, None, :] - pal[None, :, :]) ** 2).sum(axis=2)
              return palette[np.argmin(distances, axis=1)].reshape(values.shape)

          def solved_underpaint(source_rgba: np.ndarray, artwork_rgba: np.ndarray) -> tuple[np.ndarray, np.ndarray]:
              source_alpha = source_rgba[:, :, 3]
              artwork_alpha = artwork_rgba[:, :, 3]
              residual = (source_alpha > 0) & (artwork_alpha < 255)
              a = artwork_alpha.astype(np.float32)[:, :, None] / 255.0
              denominator = np.maximum(1.0 - a, 1.0 / 255.0)
              source_rgb = source_rgba[:, :, :3].astype(np.float32)
              artwork_rgb = artwork_rgba[:, :, :3].astype(np.float32)
              solved = (source_rgb - artwork_rgb * a) / denominator
              return np.rint(np.clip(solved, 0, 255)).astype(np.uint8), residual

          def color_labels(colors: np.ndarray, residual: np.ndarray) -> tuple[np.ndarray, list[tuple[int, int, int]]]:
              labels = np.zeros(residual.shape, dtype=np.int32)
              pixels = colors[residual]
              if not len(pixels):
                  return labels, []
              unique = np.unique(pixels, axis=0)
              palette = [tuple(int(v) for v in row) for row in unique]
              for index, color in enumerate(palette, start=1):
                  match = residual & np.all(colors == np.asarray(color, dtype=np.uint8), axis=2)
                  labels[match] = index
              return labels, palette

          def build_candidate(
              parent_path: Path,
              source_path: Path,
              support_colors: np.ndarray,
              residual: np.ndarray,
              mask_encoding: str,
              output_path: Path,
          ) -> dict[str, int | str]:
              root = ET.parse(parent_path).getroot()
              view_x, view_y, view_w, view_h = _viewbox(root)
              height, width = residual.shape
              source_eval = _rgba_from_source_at_size(source_path, (width, height))
              background_status, background = classify_comparison_background(
                  root, source_eval, width, height
              )
              if background_status == "ambiguous":
                  raise RuntimeError("comparison background ambiguous")
              background_index = list(root).index(background) if background is not None else None

              out_root = copy.deepcopy(root)
              out_background = (
                  list(out_root)[background_index]
                  if background_index is not None
                  else None
              )
              defs = next(
                  (
                      child
                      for child in list(out_root)
                      if _local_name(str(child.tag)).lower() == "defs"
                  ),
                  None,
              )
              if defs is None:
                  defs = ET.Element(qname("defs"))
                  out_root.insert(0, defs)

              alpha = source_eval[:, :, 3]
              quantized, opacity = _quantize_alpha(alpha)
              loops = _painter_loops(quantized, opacity)
              mask_id = "vektoryum-shadow-source-alpha"
              mask = ET.SubElement(
                  defs,
                  qname("mask"),
                  {
                      "id": mask_id,
                      "maskUnits": "userSpaceOnUse",
                      "maskContentUnits": "userSpaceOnUse",
                      "x": f"{view_x:g}",
                      "y": f"{view_y:g}",
                      "width": f"{view_w:g}",
                      "height": f"{view_h:g}",
                  },
              )
              mask_content = ET.SubElement(
                  mask,
                  qname("g"),
                  {
                      "transform": (
                          f"translate({view_x:.12g} {view_y:.12g}) "
                          f"scale({view_w / width:.12g} {view_h / height:.12g})"
                      )
                  },
              )
              ET.SubElement(
                  mask_content,
                  qname("rect"),
                  {"x": "0", "y": "0", "width": str(width), "height": str(height), "fill": "rgb(0,0,0)"},
              )
              contour_stats = {"contour_path_count": 0, "contour_command_count": 0}
              if mask_encoding == "contour":
                  result = _painter_contour_children(quantized, opacity, qname)
                  if result is None:
                      raise RuntimeError("contour mask unavailable")
                  mask_children, contour_stats = result
              elif mask_encoding == "rect":
                  mask_children, _ = _painter_rect_children(quantized, opacity, qname)
                  mask_children = [
                      child
                      for child in mask_children
                      if child.get("fill") != "rgb(0,0,0)"
                  ]
              else:
                  mask_children = _painter_polygon_children(loops, qname)
              for child in mask_children:
                  mask_content.append(child)

              movable = [
                  child
                  for child in list(out_root)
                  if child is not defs
                  and _local_name(str(child.tag)).lower() not in _PROTECTED_ROOT_TAGS
              ]
              layer = ET.Element(
                  qname("g"),
                  {"mask": f"url(#{mask_id})", "data-vektoryum-shadow": "hidden-rgb-v1"},
              )

              labels, palette = color_labels(support_colors, residual)
              rectangles = _merged_rectangles_by_level(labels)
              support = ET.SubElement(
                  layer,
                  qname("g"),
                  {
                      "transform": (
                          f"translate({view_x:.12g} {view_y:.12g}) "
                          f"scale({view_w / width:.12g} {view_h / height:.12g})"
                      ),
                      "data-vektoryum-shadow-support": "solved-hidden-rgb",
                  },
              )
              rect_count = 0
              for label in sorted(rectangles):
                  if label <= 0 or label > len(palette):
                      continue
                  color = palette[label - 1]
                  group = ET.SubElement(
                      support,
                      qname("g"),
                      {"fill": f"rgb({color[0]},{color[1]},{color[2]})"},
                  )
                  for x, y, rect_w, rect_h in rectangles[label]:
                      ET.SubElement(
                          group,
                          qname("rect"),
                          {"x": str(x), "y": str(y), "width": str(rect_w), "height": str(rect_h)},
                      )
                      rect_count += 1

              for child in movable:
                  out_root.remove(child)
                  if child is out_background:
                      continue
                  _strip_content_alpha(child)
                  layer.append(child)
              out_root.append(layer)
              ET.ElementTree(out_root).write(output_path, encoding="utf-8", xml_declaration=True)
              return {
                  "background_status": background_status,
                  "support_palette_count": len(palette),
                  "support_rect_count": rect_count,
                  "mask_encoding": mask_encoding,
                  **{key: int(value) for key, value in contour_stats.items()},
              }

          repo = Path.cwd()
          source_path = repo / "engine/regression/fixtures/class_reklam.png"
          job_dir = Path(tempfile.mkdtemp(prefix="faz3d4-hidden-rgb-"))
          with Image.open(source_path) as image:
              result = pipeline_without_alpha()(
                  image=image.convert("RGBA"),
                  original_path=source_path,
                  trace_mode="auto",
                  job_dir=job_dir,
              )
          parent = Path(result["best"]["svg_path"])
          mode = str(result["mode_used"])
          root = ET.parse(parent).getroot()
          _vx, _vy, view_w, view_h = _viewbox(root)
          scale = min(1.0, 1600.0 / float(max(view_w, view_h)))
          grid_w = max(1, int(round(view_w * scale)))
          grid_h = max(1, int(round(view_h * scale)))
          source_rgba = _rgba_from_source_at_size(source_path, (grid_w, grid_h))
          background_status, background = classify_comparison_background(
              root, source_rgba, grid_w, grid_h
          )
          artwork_root = copy.deepcopy(root)
          if background is not None:
              artwork_root.remove(list(artwork_root)[list(root).index(background)])
          artwork_rgba = _render_root(artwork_root, grid_w, grid_h)
          if artwork_rgba is None:
              raise RuntimeError("artwork-only render unavailable")

          solved, residual = solved_underpaint(source_rgba, artwork_rgba)
          palette8 = dominant_opaque_palette(source_rgba, 8)
          palette16 = dominant_opaque_palette(source_rgba, 16)
          strategies = {
              "solved_nearest_opaque_8": nearest_palette(solved, palette8),
              "solved_nearest_opaque_16": nearest_palette(solved, palette16),
              "solved_q32": np.minimum(255, ((solved.astype(np.int32) + 4) // 8) * 8).astype(np.uint8),
              "source_rgb_q32": np.minimum(255, ((source_rgba[:, :, :3].astype(np.int32) + 4) // 8) * 8).astype(np.uint8),
          }

          source_full = np.asarray(Image.open(source_path).convert("RGBA"), dtype=np.uint8)
          source_rgb_white = _source_rgb_on_white(source_full)
          image_class = _MODE_IMAGE_CLASS[mode]
          matrix = []
          for strategy_name, colors in strategies.items():
              for encoding in ("rect", "contour", "polygon"):
                  candidate = job_dir / f"{strategy_name}-{encoding}.svg"
                  try:
                      geometry = build_candidate(
                          parent, source_path, colors, residual, encoding, candidate
                      )
                      rendered = render_svg_to_rgba(candidate, grid_w, grid_h)
                      if rendered is None:
                          raise RuntimeError("candidate render unavailable")
                      alpha_metrics = alpha_plane_metrics(
                          source_rgba[:, :, 3], rendered[:, :, 3]
                      )
                      measured = _measure_svg_bytes(
                          candidate.read_bytes(), source_rgb_white, max_side=512
                      )
                      evaluator = evaluate_final_svg(
                          candidate,
                          source_rgb_white,
                          source_alpha=source_full[:, :, 3],
                          image_class=image_class,
                          required_metrics={"alpha_fidelity"},
                      )
                      journal = TransformJournal(
                          parent,
                          source_rgb_white,
                          image_class=image_class,
                          required_metrics=set(),
                      )
                      accepted_path, stage = journal.consider_candidate(
                          "hidden_rgb_shadow",
                          parent,
                          candidate,
                          transform_report=geometry,
                      )
                      alpha_group = evaluator.metrics.get("G_gradient_alpha") or {}
                      matrix.append({
                          "strategy": strategy_name,
                          "mask_encoding": encoding,
                          "residual_pixel_count": int(np.count_nonzero(residual)),
                          "background_status": background_status,
                          "serialized_bytes": int(candidate.stat().st_size),
                          "support_palette_count": int(geometry["support_palette_count"]),
                          "support_rect_count": int(geometry["support_rect_count"]),
                          "path_count": int(measured.get("path_count", 0)),
                          "node_count": int(measured.get("node_count", 0)),
                          "native_alpha_iou": float(alpha_metrics["alpha_iou"]),
                          "native_alpha_mae": float(alpha_metrics["alpha_mae"]),
                          "evaluator_alpha_iou": alpha_group.get("alpha_iou"),
                          "evaluator_alpha_mae": alpha_group.get("alpha_mae"),
                          "ssim": measured.get("ssim"),
                          "edge_f1": measured.get("edge_f1_1px"),
                          "seam_ratio": measured.get("seam_ratio"),
                          "component_delta": measured.get("component_delta"),
                          "hole_delta": measured.get("hole_delta"),
                          "journal_passed": Path(accepted_path) == candidate,
                          "journal_reason_codes": list(stage.get("reason_codes") or []),
                          "candidate_sha256": hashlib.sha256(candidate.read_bytes()).hexdigest(),
                      })
                  except Exception as exc:
                      matrix.append({
                          "strategy": strategy_name,
                          "mask_encoding": encoding,
                          "residual_pixel_count": int(np.count_nonzero(residual)),
                          "status": "error",
                          "error_code": str(exc)[:240],
                      })

          payload = {
              "schema": "faz3d4-hidden-rgb-shadow-v1",
              "case_id": "class_reklam",
              "parent_candidate": result["best"].get("name"),
              "mode": mode,
              "grid_width": grid_w,
              "grid_height": grid_h,
              "background_status": background_status,
              "residual_pixel_count": int(np.count_nonzero(residual)),
              "matrix": matrix,
          }
          Path("faz3d4-hidden-rgb-shadow.json").write_text(
              json.dumps(payload, sort_keys=True, indent=2), encoding="utf-8"
          )
          print(json.dumps(payload, sort_keys=True))
          PY
          python /tmp/hidden_rgb_shadow.py

      - name: Upload scalar-only shadow matrix
        uses: actions/upload-artifact@v4
        with:
          name: faz3d4-hidden-rgb-shadow-${{ github.run_id }}
          path: faz3d4-hidden-rgb-shadow.json
          retention-days: 7
