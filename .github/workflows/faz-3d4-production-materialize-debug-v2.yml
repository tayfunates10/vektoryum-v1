name: FAZ 3D4 production materialize debug v2

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-production-materialize-debug-v2.yml"

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_COMMIT: 8eb30de2c7256abe36fedaaddcb2d9f9655e4faf
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract and run production materialize step
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import textwrap

          text = Path(
              '.github/workflows/faz-3d4-paint-deficit-production.yml'
          ).read_text(encoding='utf-8')
          marker = '      - name: Materialize generic paint-deficit production code\n'
          section = text.split(marker, 1)[1].split(
              '\n      - name: Run focused painter contracts', 1
          )[0]
          run_body = section.split('        run: |\n', 1)[1]
          Path('/tmp/materialize.sh').write_text(textwrap.dedent(run_body))
          PY
          set +e
          bash /tmp/materialize.sh > /tmp/materialize.log 2>&1
          status=$?
          set -e
          {
            echo "exit_code=${status}"
            tail -160 /tmp/materialize.log
          } > materialize-error-tail-v2.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: faz3d4-materialize-debug-v2-${{ github.run_id }}
          path: materialize-error-tail-v2.txt
          retention-days: 3
