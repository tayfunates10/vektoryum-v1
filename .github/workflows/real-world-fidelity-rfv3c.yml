name: Real-world fidelity RFV-3C reviewed quality decision

on:
  pull_request:

permissions:
  contents: read

jobs:
  rfv3c-reviewed-decision:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile RFV-3C evaluator and tests
        run: python -m py_compile engine/regression/rfv3_quality_decision.py engine/regression/test_rfv3_quality_decision.py

      - name: Record committed evidence digests
        run: |
          sha256sum \
            docs/real_world_fidelity/evidence/rfv3_pipeline_results.json \
            docs/real_world_fidelity/evidence/rfv3_retry_audit.json \
            docs/real_world_fidelity/evidence/rfv3_measurement_envelope.json \
            docs/real_world_fidelity/evidence/rfv3_publication_envelope.json \
            docs/real_world_fidelity/evidence/rfv3_quality_decision.json \
            > "${RUNNER_TEMP}/rfv3c-digests.txt"
          cat "${RUNNER_TEMP}/rfv3c-digests.txt"

      - name: Validate immutable evidence and fail-closed decision
        shell: bash
        run: |
          set -o pipefail
          python -m unittest engine.regression.test_rfv3_quality_decision -v \
            2>&1 | tee "${RUNNER_TEMP}/rfv3c-test.log"

      - name: Reproduce committed NO-GO decision
        shell: bash
        run: |
          set -o pipefail
          python -m engine.regression.rfv3_quality_decision --verify-committed \
            2>&1 | tee "${RUNNER_TEMP}/rfv3c-decision.log"

      - name: Upload RFV-3C failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rfv3c-failure-diagnostics-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ runner.temp }}/rfv3c-digests.txt
            ${{ runner.temp }}/rfv3c-test.log
            ${{ runner.temp }}/rfv3c-decision.log
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

      - name: Confirm RFV-4 remains blocked while closure is pending
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          roadmap = json.loads(Path('docs/real_world_fidelity_roadmap.json').read_text())
          decision = json.loads(Path('docs/real_world_fidelity/evidence/rfv3_quality_decision.json').read_text())
          assert roadmap['phases'][2]['status'] == 'pending'
          assert roadmap['phases'][2]['release_decision'] == 'no_go'
          assert 'phase closure' in roadmap['phases'][2]['blocked_on']
          assert roadmap['phases'][3]['status'] == 'pending'
          assert decision['release_decision'] == 'no_go'
          assert decision['rfv4_allowed'] is False
          assert decision['raw_assets_in_repository'] is False
          PY
