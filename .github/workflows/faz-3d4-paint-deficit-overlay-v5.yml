name: FAZ 3D4 paint deficit overlay v5

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-paint-deficit-overlay-v5.yml"

permissions:
  contents: read

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: engine:.
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -q -r engine/requirements.txt pytest httpx
      - name: Build focused paint-deficit script
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/faz-3d4-seam-isolation-v3.yml').read_text()
          start = "python - <<'PY'\n"
          end = "\n          PY\n          python -m py_compile /tmp/seam_isolation_v3.py"
          builder = textwrap.dedent(workflow.split(start, 1)[1].split(end, 1)[0])
          exec(compile(builder, '<v3-builder>', 'exec'))

          path = Path('/tmp/seam_isolation_v3.py')
          script = path.read_text()

          support_create = '''    support = ET.SubElement(
                  layer,
                  qname("g"),
                  {
                      "transform": (
                          f"translate({view_x:.12g} {view_y:.12g}) "
                          f"scale({view_w / width:.12g} {view_h / height:.12g})"
                      ),
                      "data-vektoryum-shadow-support": "paint-deficit-overlay-v1",
                  },
              )
              rect_count = 0'''
          script = script.replace('    rect_count = 0', support_create, 1)
          script = script.replace(
              '            candidate = job_dir / f"{strategy_name}-{support_encoding}-{encoding}.svg"\n            try:',
              '            candidate = job_dir / f"{strategy_name}-{support_encoding}-{encoding}.svg"\n'
              '            geometry = {}\n'
              '            try:',
              1,
          )
          script = script.replace(
              'int(geometry["support_shape_count"])',
              'int(geometry.get("support_shape_count", 0))',
          )

          script = script.replace(
              'from app.source_truth import alpha_plane_metrics, render_svg_to_rgba',
              'from app.source_truth import alpha_plane_metrics, composite_rgba, render_svg_to_rgba',
              1,
          )
          script = script.replace(
              'quantized, opacity = _quantize_alpha(alpha)',
              'steps = 63\n'
              '    quantized = np.rint(alpha.astype(np.float32) * steps / 255.0).astype(np.uint8)\n'
              '    opacity = {int(value): int(value) / float(steps) for value in np.unique(quantized) if int(value) > 0}',
              1,
          )
          old_residual = 'solved, residual = solved_underpaint(source_rgba, artwork_rgba)'
          new_residual = '''source_white_grid = composite_rgba(source_rgba, 255)
          artwork_white_grid = composite_rgba(artwork_rgba, 255)
          source_foreground = np.any(
              np.abs(source_white_grid.astype(np.int16) - 255) > 12,
              axis=2,
          )
          artwork_missing = np.all(artwork_white_grid > 244, axis=2)
          alpha_residual = (source_rgba[:, :, 3] > 0) & (artwork_rgba[:, :, 3] < 255)
          residual = source_foreground & artwork_missing
          solved = source_rgba[:, :, :3].copy()'''
          if old_residual not in script:
              raise SystemExit('residual assignment missing')
          script = script.replace(old_residual, new_residual, 1)
          script = script.replace(
              'strategies = {"solved_nearest_opaque_8": strategies["solved_nearest_opaque_8"]}',
              'strategies = {"source_rgb_q32": strategies["source_rgb_q32"]}',
              1,
          )
          script = script.replace(
              'for support_encoding in ("rect", "polygon"):',
              'for support_encoding in ("polygon",):',
              1,
          )

          overlay_anchor = '    out_root.append(layer)'
          if overlay_anchor not in script:
              raise SystemExit('layer append anchor missing')
          script = script.replace(
              overlay_anchor,
              '    layer.remove(support)\n'
              '    layer.append(support)\n'
              '    out_root.append(layer)',
              1,
          )
          script = script.replace(
              '"schema": "faz3d4-seam-isolation-v3"',
              '"schema": "faz3d4-paint-deficit-overlay-v5"',
              1,
          )
          script = script.replace(
              '"residual_pixel_count": int(np.count_nonzero(residual)),\n    "matrix": matrix,',
              '"residual_pixel_count": int(np.count_nonzero(residual)),\n'
              '    "alpha_residual_pixel_count": int(np.count_nonzero(alpha_residual)),\n'
              '    "paint_deficit_overlap_alpha_residual": int(np.count_nonzero(residual & alpha_residual)),\n'
              '    "paint_deficit_opaque_artwork_count": int(np.count_nonzero(residual & (artwork_rgba[:, :, 3] == 255))),\n'
              '    "matrix": matrix,',
              1,
          )
          path.write_text(script)
          PY
          python -m py_compile /tmp/seam_isolation_v3.py
      - name: Run paint-deficit overlay candidate
        shell: bash
        run: |
          set +e
          python /tmp/seam_isolation_v3.py > paint-v5.log 2>&1
          status=$?
          set -e
          tail -180 paint-v5.log > paint-v5-tail.txt
          echo "exit_code=${status}" >> paint-v5-tail.txt
          exit 0
      - name: Upload scalar-only result
        uses: actions/upload-artifact@v4
        with:
          name: faz3d4-paint-deficit-overlay-v5-${{ github.run_id }}
          path: |
            faz3d4-hidden-rgb-shadow.json
            paint-v5-tail.txt
          if-no-files-found: warn
          retention-days: 7
