name: FAZ 3D4 code-only export

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-code-export.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Build code-only archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p export/engine export/.github export/docs
          cp -a engine/app export/engine/
          find engine -maxdepth 1 -type f \( -name '*.py' -o -name 'requirements*.txt' \) -exec cp {} export/engine/ \;
          cp -a engine/benchmark export/engine/
          cp -a .github/workflows export/.github/
          if [ -d docs/real_world_fidelity ]; then cp -a docs/real_world_fidelity export/docs/; fi
          find export -type f \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.svg' -o -iname '*.webp' -o -iname '*.zip' \) -delete
          tar -C export -czf faz3d4-code-only.tar.gz .
          find export -type f | sort > faz3d4-code-file-list.txt
      - uses: actions/upload-artifact@v4
        with:
          name: faz3d4-code-only-${{ github.run_id }}
          path: |
            faz3d4-code-only.tar.gz
            faz3d4-code-file-list.txt
          retention-days: 2
