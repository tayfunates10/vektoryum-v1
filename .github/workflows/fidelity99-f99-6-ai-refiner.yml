name: Fidelity-99 F99-6 AI refiner contract

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  f99-6-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile F99-6 contract
        run: python -m py_compile engine/tests/test_f99_6_ai_refiner.py
      - name: Validate finite AI refiner thresholds
        run: python -m unittest -v engine.tests.test_f99_6_ai_refiner
