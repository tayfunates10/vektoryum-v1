name: FAZ 3D Class Reklam diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d-class-reklam-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: engine
    env:
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install production dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -r requirements.txt pytest httpx

      - name: Run Class Reklam with complete painter telemetry
        shell: bash
        run: |
          set -o pipefail
          python test_visual_regression.py \
            --case class_reklam \
            --require-baseline \
            --out-dir regression/faz3d-class-reklam-output \
            > regression/faz3d-class-reklam.log 2>&1 || status=$?
          cat regression/faz3d-class-reklam.log
          exit "${status:-0}"

      - name: Upload scalar log and regression outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faz3d-class-reklam-${{ github.run_id }}
          path: |
            engine/regression/faz3d-class-reklam.log
            engine/regression/faz3d-class-reklam-output
          if-no-files-found: error
          retention-days: 7
