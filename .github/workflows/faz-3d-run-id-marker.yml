name: FAZ 3D alpha run locator

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d-run-id-marker.yml"

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  locate:
    runs-on: ubuntu-latest
    steps:
      - name: Locate alpha workflow run and publish run ID
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          payload="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/316330054/runs?branch=agent%2Frfv-3d3-canvas-independent-alpha-mask&event=pull_request&per_page=30")"
          summary="$(jq -r --arg sha "${HEAD_SHA}" '[.workflow_runs[] | select(.head_sha == $sha) | {id,status,conclusion,run_number}] | if length == 0 then "not_found" else map("run_id=\(.id),run_number=\(.run_number),status=\(.status),conclusion=\(.conclusion // \"null\")") | join("; ") end' <<<"${payload}")"
          gh api "/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -f body="FAZ3D_ALPHA_RUN_LOCATOR head=${HEAD_SHA} ${summary}"
