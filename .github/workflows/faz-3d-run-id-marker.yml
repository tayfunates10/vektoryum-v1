name: FAZ 3D executor run locator

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d-run-id-marker.yml"

permissions:
  actions: read
  contents: read

jobs:
  locate:
    runs-on: ubuntu-latest
    steps:
      - name: Locate executor workflow run
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: 04dfc04c4d42121e6b9f3e5099a8d3885aaad9c9
        shell: bash
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/318873935/runs?branch=agent%2Frfv-3d3-canvas-independent-alpha-mask&event=pull_request&per_page=30" > /tmp/runs.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('/tmp/runs.json').read_text())
          selected = [
              run for run in payload.get('workflow_runs', [])
              if run.get('head_sha') == os.environ['TARGET_SHA']
          ]
          if not selected:
              print(f"FAZ3D_EXECUTOR_RUN_LOCATOR head={os.environ['TARGET_SHA']} not_found")
          else:
              for run in selected:
                  print(
                      "FAZ3D_EXECUTOR_RUN_LOCATOR "
                      f"head={os.environ['TARGET_SHA']} "
                      f"run_id={run.get('id')} "
                      f"run_number={run.get('run_number')} "
                      f"status={run.get('status')} "
                      f"conclusion={run.get('conclusion')}"
                  )
          PY
