name: FAZ 3D4 residual patch check v2

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-residual-patch-check-v2.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
      - name: Build safe patch summary
        shell: bash
        run: |
          set +e
          cat engine/regression/faz3d4_residual_part_*.txt > /tmp/patch.b64
          base64 --decode --ignore-garbage /tmp/patch.b64 > /tmp/residual.patch
          decode_status=$?
          git apply --check --verbose /tmp/residual.patch > /tmp/git-apply.log 2>&1
          git_status=$?
          patch --batch --forward -p1 --dry-run < /tmp/residual.patch > /tmp/patch.log 2>&1
          patch_status=$?
          {
            echo "b64_bytes=$(wc -c < /tmp/patch.b64)"
            echo "decode_status=${decode_status}"
            echo "patch_bytes=$(wc -c < /tmp/residual.patch)"
            echo "patch_sha=$(sha256sum /tmp/residual.patch | cut -d' ' -f1)"
            echo "git_apply_status=${git_status}"
            echo "patch_status=${patch_status}"
            echo "--- git apply summary ---"
            tail -40 /tmp/git-apply.log
            echo "--- patch summary ---"
            tail -40 /tmp/patch.log
          } > residual-patch-summary.txt
          cat residual-patch-summary.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: residual-patch-summary-${{ github.run_id }}
          path: residual-patch-summary.txt
          retention-days: 2
