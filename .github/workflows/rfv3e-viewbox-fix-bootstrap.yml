name: RFV-3E viewBox fix bootstrap

on:
  push:
    branches:
      - agent/rfv-3e-exact-metric-path-viewbox-fix
    paths:
      - ".github/workflows/rfv3e-viewbox-fix-bootstrap.yml"
      - "engine/regression/apply_rfv3e_viewbox_fix.py"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/rfv3e-viewbox-fix-bootstrap.yml"
      - "engine/regression/apply_rfv3e_viewbox_fix.py"

permissions:
  contents: write

concurrency:
  group: rfv3e-viewbox-fix-bootstrap-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: engine
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/rfv-3e-exact-metric-path-viewbox-fix

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Apply fail-closed source-bound patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('engine/regression/apply_rfv3e_viewbox_fix.py')
          source = path.read_text(encoding='utf-8')
          workflow_start = source.index(
              'workflow = ROOT / ".github/workflows/real-world-fidelity-rfv3e-viewbox-fix.yml"'
          )
          report_start = source.index(
              'report = ROOT / "docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-fix.md"'
          )
          source = source[:workflow_start] + source[report_start:]
          source = source.replace(
              '''# The bootstrap is intentionally absent from the final PR diff.\n(ROOT / "engine/regression/apply_rfv3e_viewbox_fix.py").unlink()\n(ROOT / ".github/workflows/rfv3e-viewbox-fix-bootstrap.yml").unlink()\nprint("RFV-3E viewBox alpha-journal fix applied")\n''',
              '''print("RFV-3E viewBox alpha-journal fix applied")\n''',
          )
          namespace = {'__name__': '__main__', '__file__': str(path.resolve())}
          exec(compile(source, str(path), 'exec'), namespace)
          PY

      - name: Install production test dependencies
        run: python -m pip install -r engine/requirements.txt pytest

      - name: Compile changed production contract
        run: python -m py_compile engine/app/transform_journal.py engine/test_transform_journal.py

      - name: Run transform journal contract
        working-directory: engine
        run: pytest -q test_transform_journal.py

      - name: Verify final feature-branch diff shape
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git diff --name-only HEAD)"
          while IFS= read -r path; do
            [ -z "${path}" ] && continue
            case "${path}" in
              engine/app/transform_journal.py|\
              engine/test_transform_journal.py|\
              docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-fix.md)
                ;;
              *)
                echo "Unexpected bootstrap diff: ${path}"
                exit 1
                ;;
            esac
          done <<< "${changed}"
          test -e engine/regression/apply_rfv3e_viewbox_fix.py
          test -e .github/workflows/rfv3e-viewbox-fix-bootstrap.yml
          test ! -e .github/workflows/real-world-fidelity-rfv3e-viewbox-fix.yml

      - name: Commit validated production fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            engine/app/transform_journal.py \
            engine/test_transform_journal.py \
            docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-fix.md
          git commit -m "fix(rfv3e): measure alpha preservation before viewBox repair"
          git push origin HEAD:agent/rfv-3e-exact-metric-path-viewbox-fix
