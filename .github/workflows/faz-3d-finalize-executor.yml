name: FAZ 3D formatting normalizer

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d-finalize-executor.yml"

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: engine:.
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
      EXECUTOR_COMMIT_MESSAGE: "chore: normalize painter retry import formatting"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Normalize import and verify contracts
        shell: bash
        run: |
          set -euo pipefail
          test "$(git log -1 --pretty=%s)" = "${EXECUTOR_COMMIT_MESSAGE}"
          python - <<'PY'
          from pathlib import Path

          path = Path('engine/app/alpha_candidate_painter.py')
          text = path.read_text()
          old = '''    from app.alpha_svg_mask import (  # noqa: PLC0415
    _painter_retry_eligible,
    _quantize_alpha,
)
'''
          new = '''    from app.alpha_svg_mask import (  # noqa: PLC0415
        _painter_retry_eligible,
        _quantize_alpha,
    )
'''
          if text.count(old) != 1:
              raise RuntimeError('unexpected painter retry import formatting')
          path.write_text(text.replace(old, new))
          PY
          python -m py_compile engine/app/alpha_candidate_painter.py
          python -m unittest \
            engine.test_alpha_painter_stroke_continuation \
            engine.test_alpha_painter_retry \
            -v

      - name: Commit normalized production file
        shell: bash
        run: |
          set -euo pipefail
          git add engine/app/alpha_candidate_painter.py
          git -c user.name='Vektoryum CI' -c user.email='actions@github.com' commit \
            -m 'style: normalize painter retry import formatting'
          git push origin "HEAD:${TARGET_BRANCH}"
