name: Exact final SVG contract

on:
  pull_request:
    paths:
      - "engine/**"
      - ".github/workflows/exact-final-svg.yml"
      - "Dockerfile"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exact-final-svg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: engine
    env:
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install system validators
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ghostscript libcairo2
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest httpx
      - name: Exact final download contract
        run: python -m pytest -q test_exact_final_contract.py
      - name: Exact corpus contract
        run: python -m pytest -q test_exact_corpus.py
      - name: Transform journal contract
        run: python -m pytest -q test_transform_journal.py
      - name: Final artifact metric contract
        run: python -m pytest -q test_final_artifact_metrics.py
      - name: Source truth unit gates
        run: python -m pytest -q test_source_truth.py
      - name: Alpha multi-background gates
        run: python -m pytest -q test_alpha_multibackground_fidelity.py
      - name: ICC and CMYK color-management gates
        run: python -m pytest -q test_input_color_management.py
      - name: FAZ 4 multi-hypothesis shadow contract
        run: python -m pytest -q test_multi_hypothesis.py
      - name: FAZ 4 shadow telemetry immutability contract
        run: python -m pytest -q test_shadow_telemetry.py
      - name: FAZ 4 shadow runtime feature-flag contract
        run: python -m pytest -q test_shadow_runtime.py
      - name: FAZ 4 shadow-aware pipeline entry contract
        run: python -m pytest -q test_pipeline_entry.py
      - name: FAZ 4 production ASGI runtime entry contract
        run: python -m pytest -q test_runtime_main.py
      - name: Benchmark v1 manifest and report contract
        run: python -m pytest -q test_benchmark_manifest.py test_benchmark_seed_runner.py
      - name: Benchmark v1 baseline delta contract
        run: python -m pytest -q test_benchmark_compare.py
      - name: Benchmark v1 artifact history contract
        run: python -m pytest -q test_benchmark_artifact_history.py
      - name: Benchmark v1 real pipeline result adapter
        run: python -m pytest -q test_benchmark_pipeline_results.py
      - name: Benchmark v1 scheduled pipeline smoke contract
        run: python -m pytest -q test_benchmark_pipeline_smoke.py
      - name: Benchmark v1 fail-closed release gate
        run: python -m pytest -q test_benchmark_release_gate.py

  pipeline-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: engine
    env:
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install system validators
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ghostscript libcairo2
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest httpx
      - name: Real pipeline, evaluator and HTTP download chain
        run: >-
          python -m pytest -q
          test_exact_final_artifact_integration.py
          test_exact_corpus_pipeline.py

  hard-svg-regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: engine
    env:
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install system validators
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ghostscript libcairo2
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest httpx
      - name: Artifact seam, halo, stroke and glyph corpus
        run: python regression/artifact_probe.py
      - name: Geometric and gradient paint-model regressions
        run: >-
          python test_visual_regression.py
          --case class_reklam
          --case gradient_logo
          --require-baseline
      - name: Native-resolution LEGO registered-mark regression
        run: python test_small_component_quality.py
