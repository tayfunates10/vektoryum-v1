name: Real-world fidelity RFV-2E live acquisition evidence

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: rfv2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rfv2e-live-acquisition:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check Pillow

      - name: Compile RFV-2E files
        run: |
          python -m py_compile \
            engine/regression/rfv2_public_source_acquire.py \
            engine/regression/rfv2_live_acquire.py \
            engine/regression/rfv2_manifest_assembler.py \
            engine/regression/rfv2_live_bundle.py \
            engine/regression/test_rfv2_live_acquire.py \
            engine/regression/test_rfv2_live_bundle.py

      - name: Validate deterministic fail-closed acquisition and bundle contracts
        run: |
          python -m unittest \
            engine.regression.test_rfv2_live_acquire \
            engine.regression.test_rfv2_live_bundle

      - name: Acquire and qualify all 24 reviewed public sources
        shell: bash
        run: |
          set -uo pipefail
          RFV_ROOT="${RUNNER_TEMP}/rfv2-live"
          rm -rf "${RFV_ROOT}"
          mkdir -p \
            "${RFV_ROOT}/downloads" \
            "${RFV_ROOT}/storage" \
            "${RFV_ROOT}/records" \
            "${RFV_ROOT}/out"

          set +e
          (
            set -euo pipefail
            python -m engine.regression.rfv2_live_acquire \
              --all \
              --download-root "${RFV_ROOT}/downloads" \
              --storage-root "${RFV_ROOT}/storage" \
              --records-dir "${RFV_ROOT}/records"

            python -m engine.regression.rfv2_manifest_assembler \
              --records-dir "${RFV_ROOT}/records" \
              --manifest-out "${RFV_ROOT}/out/qualification-manifest.json" \
              --audit-out "${RFV_ROOT}/out/qualification-audit.json" \
              --require-complete

            python -m engine.regression.rfv2_live_bundle \
              --storage-root "${RFV_ROOT}/storage" \
              --download-root "${RFV_ROOT}/downloads" \
              --records-dir "${RFV_ROOT}/records" \
              --manifest "${RFV_ROOT}/out/qualification-manifest.json" \
              --audit "${RFV_ROOT}/out/qualification-audit.json" \
              --bundle-out "${RFV_ROOT}/out/rfv2-public-corpus.tar.gz" \
              --checksums-out "${RFV_ROOT}/out/bundle-checksums.json"

            python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["RUNNER_TEMP"]) / "rfv2-live" / "out"
          manifest = json.loads((root / "qualification-manifest.json").read_text())
          audit = json.loads((root / "qualification-audit.json").read_text())
          checksums = json.loads((root / "bundle-checksums.json").read_text())
          assert manifest["status"] == "qualified"
          assert manifest["qualified_case_count"] == 24
          assert len(manifest["cases"]) == 24
          assert audit["complete"] is True
          assert audit["missing_categories"] == []
          assert checksums["qualified_case_count"] == 24
          assert checksums["storage_mode"] == "github_actions_immutable_artifact"
          assert checksums["retention_days"] == 90
          assert (root / "rfv2-public-corpus.tar.gz").stat().st_size > 0
          PY
          ) 2>&1 | tee "${RFV_ROOT}/out/live-acquisition.log"
          status=${PIPESTATUS[0]}
          if [ "${status}" -ne 0 ]; then
            tail -n 80 "${RFV_ROOT}/out/live-acquisition.log" > "${RFV_ROOT}/out/failure-tail.log"
            exit "${status}"
          fi

      - name: Upload RFV-2E failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rfv2e-failure-diagnostics-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ runner.temp }}/rfv2-live/out/live-acquisition.log
            ${{ runner.temp }}/rfv2-live/out/failure-tail.log
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload immutable RFV-2 corpus artifact
        id: upload-corpus
        uses: actions/upload-artifact@v4
        with:
          name: rfv2-public-qualification-corpus-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ runner.temp }}/rfv2-live/out/rfv2-public-corpus.tar.gz
            ${{ runner.temp }}/rfv2-live/out/qualification-manifest.json
            ${{ runner.temp }}/rfv2-live/out/qualification-audit.json
            ${{ runner.temp }}/rfv2-live/out/bundle-checksums.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Bind artifact identity to acquisition evidence
        env:
          ARTIFACT_ID: ${{ steps.upload-corpus.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload-corpus.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload-corpus.outputs.artifact-digest }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          artifact_id = os.environ["ARTIFACT_ID"]
          artifact_url = os.environ["ARTIFACT_URL"]
          artifact_digest = os.environ["ARTIFACT_DIGEST"]
          head_sha = os.environ["HEAD_SHA"]
          assert artifact_id.isdigit()
          assert artifact_url.startswith("https://github.com/")
          assert re.fullmatch(r"(?:sha256:)?[0-9a-f]{64}", artifact_digest)
          assert re.fullmatch(r"[0-9a-f]{40}", head_sha)

          root = Path(os.environ["RUNNER_TEMP"]) / "rfv2-live" / "out"
          checksums = json.loads((root / "bundle-checksums.json").read_text())
          envelope = {
              "schema": "vektoryum-rfv2-actions-publication-envelope-v1",
              "head_sha": head_sha,
              "artifact_id": int(artifact_id),
              "artifact_url": artifact_url,
              "artifact_digest": artifact_digest,
              "retention_days": 90,
              "qualified_case_count": 24,
              "cases_sha256": checksums["cases_sha256"],
              "bundle_sha256": checksums["bundle_sha256"],
              "raw_assets_in_repository": False,
          }
          (root / "publication-envelope.json").write_text(
              json.dumps(envelope, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload publication envelope
        uses: actions/upload-artifact@v4
        with:
          name: rfv2-publication-envelope-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/rfv2-live/out/publication-envelope.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
