name: FAZ 3D apply painter alpha fix

on:
  push:
    branches:
      - agent/rfv-3d3-canvas-independent-alpha-mask
    paths:
      - ".github/workflows/faz-3d-apply-fix.yml"

permissions:
  contents: write

concurrency:
  group: faz-3d-apply-fix
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.head_commit.message == 'chore: execute FAZ 3D canvas-underpaint fix'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONHASHSEED: "0"
      PYTHONPATH: engine:.
      VEKTORYUM_WORKERS: "1"
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: python -m pip install -q -r engine/requirements.txt

      - name: Confirm exact starting branch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "${TARGET_BRANCH}"
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          git status --short

      - name: Add permanent scalar diagnostic evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/real_world_fidelity/evidence
          cat > docs/real_world_fidelity/evidence/faz3d_painter_alpha_reconstruction_diagnostics.json <<'JSON'
          {
            "evidence_sha256": "74c9d19d028c26234b34519c9d19822cd6f2c07657a8f681b63ed8a99829aae1",
            "gray_values": [0, 1, 32, 64, 128, 192, 254, 255],
            "implicit_luminance_transfer_is_byte_exact": true,
            "renderer": "resvg_py",
            "root_cause": "canvas_knockout_removes_required_alpha_support",
            "schema": "vektoryum-faz3d-mask-semantics-v2",
            "source_commit": "d594e15f3defdf989eb60c55850b8c5c2fbb9cf5",
            "synthetic": {
              "canvas_knockout": {
                "alpha_iou": 0.2685607373714447,
                "alpha_mae": 0.32018327713012695,
                "comparison_canvas_knocked_out": true,
                "render_coverage": 0.11756089329719543,
                "source_coverage": 0.437744140625
              },
              "canvas_retained_inside_mask": {
                "alpha_iou": 1.0,
                "alpha_mae": 0.0,
                "comparison_canvas_knocked_out": false,
                "render_coverage": 0.437744140625,
                "source_coverage": 0.437744140625
              },
              "grid_height": 64,
              "grid_width": 64,
              "source_support_pixels": 1793
            },
            "transfer": {
              "attr-alpha": {"0": 255, "1": 255, "32": 255, "64": 255, "128": 255, "192": 255, "254": 255, "255": 255},
              "attr-luminance": {"0": 0, "1": 1, "32": 32, "64": 64, "128": 128, "192": 192, "254": 254, "255": 255},
              "implicit": {"0": 0, "1": 1, "32": 32, "64": 64, "128": 128, "192": 192, "254": 254, "255": 255},
              "style-alpha": {"0": 255, "1": 255, "32": 255, "64": 255, "128": 255, "192": 255, "254": 255, "255": 255},
              "style-luminance": {"0": 0, "1": 1, "32": 32, "64": 64, "128": 128, "192": 192, "254": 254, "255": 255}
            }
          }
          JSON

          cat > docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-diagnostics.md <<'MD'
          # FAZ 3D — Painter alpha reconstruction diagnostics

          ## Scope

          This is diagnostics-only evidence produced with the production `resvg_py`
          renderer. No evaluator threshold, TransformJournal policy, corpus, retry,
          timeout or release decision was changed.

          ## Proven root cause

          `root_cause: canvas_knockout_removes_required_alpha_support`

          Painter encoded the source alpha mask correctly, but when a border-connected
          full-canvas comparison shape was classified as a tracer background it was
          removed from the visible paint and archived outside the mask. The rendered
          alpha therefore became:

          `source_alpha_mask ∩ residual_artwork_coverage`

          instead of the required source alpha plane. Sparse artwork could cover only
          part of the source-positive region, producing the public-05/public-06 class
          of native alpha IoU failures.

          ## Controlled renderer evidence

          The production renderer maps implicit and explicit luminance grays byte for
          byte: 0→0, 1→1, 32→32, 64→64, 128→128, 192→192, 254→254, 255→255. This
          disproves a luminance gamma or transfer-function defect.

          On the same deterministic 64×64 synthetic alpha support:

          | Mechanism | Alpha IoU | Alpha MAE | Render coverage |
          |---|---:|---:|---:|
          | Proven canvas removed outside mask | 0.2685607374 | 0.3201832771 | 0.1175608933 |
          | Same canvas retained inside source-alpha mask | 1.0 | 0.0 | 0.4377441406 |

          Source coverage was 0.4377441406 in both runs. Encoding, mask geometry,
          quantization, renderer and stroke width were held constant; only the canvas
          support placement changed.

          ## Authorized narrow fix

          A proven comparison canvas may remain only as transform-owned underpaint
          inside the existing source-alpha mask. It must not remain as an unmasked
          visible canvas, and it must remain excluded from artwork identity. All final
          alpha, appearance, topology, seam and complexity gates remain unchanged.
          MD

          git add \
            docs/real_world_fidelity/evidence/faz3d_painter_alpha_reconstruction_diagnostics.json \
            docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-diagnostics.md
          git -c user.name='Vektoryum CI' -c user.email='actions@github.com' commit \
            -m 'test: prove painter alpha reconstruction root cause'

      - name: Apply narrow canvas-underpaint production fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          identity = Path('engine/app/alpha_artwork_identity.py')
          text = identity.read_text()
          old = '''ROLE_MASK_APPLICATION = "alpha-mask-application"\nROLE_CANVAS_KNOCKOUT = "comparison-canvas-knockout"\n'''
          new = '''ROLE_MASK_APPLICATION = "alpha-mask-application"\nROLE_CANVAS_KNOCKOUT = "comparison-canvas-knockout"\nROLE_CANVAS_UNDERPAINT = "comparison-canvas-underpaint"\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)
          old = '''        ROLE_MASK_APPLICATION,\n        ROLE_CANVAS_KNOCKOUT,\n'''
          new = '''        ROLE_MASK_APPLICATION,\n        ROLE_CANVAS_KNOCKOUT,\n        ROLE_CANVAS_UNDERPAINT,\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)
          identity.write_text(text)

          painter = Path('engine/app/alpha_candidate_painter.py')
          text = painter.read_text()
          old = '''    ROLE_CANVAS_KNOCKOUT,\n    ROLE_MASK_APPLICATION,\n'''
          new = '''    ROLE_CANVAS_UNDERPAINT,\n    ROLE_MASK_APPLICATION,\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)

          old = '''    """Mask the stroked paint once, knocking out a comparison canvas if given.\n\n    ``canvas_element`` is a border-connected comparison background proven by\n    :func:`app.alpha_candidate_background.classify_comparison_background`. When it\n    is ``None`` (no background trace) the candidate paint is preserved as-is and\n    source alpha is reconstructed over it without any knockout (canvas-independent\n    path). Colour is never inspected here.\n    """\n'''
          new = '''    """Mask candidate paint once, retaining a proven canvas only as underpaint.\n\n    ``canvas_element`` is a border-connected comparison background proven by\n    :func:`app.alpha_candidate_background.classify_comparison_background`. It is\n    moved into the same source-alpha-masked paint group and tagged transform-owned.\n    This preserves full source-positive alpha support without leaving an unmasked\n    opaque canvas. When it is ``None`` the candidate paint is preserved as-is.\n    Colour is never inspected here.\n    """\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)

          old = '''    root = copy.deepcopy(original_root)\n    knocked_out_canvas = False\n    if canvas_element is not None:\n        canvas_index = list(original_root).index(canvas_element)\n        target_canvas = list(root)[canvas_index]\n        root.remove(target_canvas)\n\n    defs = next(\n        (\n            child\n            for child in list(root)\n            if _local_name(str(child.tag)).lower() == "defs"\n        ),\n        None,\n    )\n    if defs is None:\n        defs = ET.Element(qname("defs"))\n        root.insert(0, defs)\n    if canvas_element is not None:\n        archive = ET.SubElement(\n            defs,\n            qname("g"),\n            {\n                "data-vektoryum-candidate-geometry-knockout": "comparison-canvas-v1",\n                "display": "none",\n            },\n        )\n        tag_transform_node(archive, ROLE_CANVAS_KNOCKOUT, transaction_id)\n        archive.append(target_canvas)\n        knocked_out_canvas = True\n\n'''
          new = '''    root = copy.deepcopy(original_root)\n    target_canvas = None\n    if canvas_element is not None:\n        canvas_index = list(original_root).index(canvas_element)\n        target_canvas = list(root)[canvas_index]\n\n    defs = next(\n        (\n            child\n            for child in list(root)\n            if _local_name(str(child.tag)).lower() == "defs"\n        ),\n        None,\n    )\n    if defs is None:\n        defs = ET.Element(qname("defs"))\n        root.insert(0, defs)\n\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)

          old = '''    for child in movable:\n        root.remove(child)\n        _strip_content_alpha(child)\n        paint.append(child)\n'''
          new = '''    for child in movable:\n        root.remove(child)\n        if child is target_canvas:\n            tag_transform_node(child, ROLE_CANVAS_UNDERPAINT, transaction_id)\n            child.set(\n                "data-vektoryum-candidate-geometry-underpaint",\n                "comparison-canvas-v1",\n            )\n        _strip_content_alpha(child)\n        paint.append(child)\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)

          old = '''        "comparison_canvas_knocked_out": bool(knocked_out_canvas),\n        **contour_stats,\n'''
          new = '''        "comparison_canvas_knocked_out": False,\n        "comparison_canvas_retained_under_mask": bool(target_canvas is not None),\n        **contour_stats,\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)
          painter.write_text(text)
          PY

      - name: Add FAZ 3D reconstruction fidelity tests
        shell: bash
        run: |
          set -euo pipefail
          cat > engine/test_alpha_painter_reconstruction_fidelity.py <<'PY'
          from __future__ import annotations

          import hashlib
          import tempfile
          import unittest
          import xml.etree.ElementTree as ET
          from pathlib import Path

          import numpy as np
          from PIL import Image

          from app.alpha_artwork_identity import artwork_fingerprint
          from app.alpha_candidate_painter import (
              _painter_contour_children,
              _painter_loops,
              _painter_polygon_children,
              _painter_rect_children,
              apply_candidate_painter_reconstruction,
              build_painter_reconstruction_tree,
          )
          from app.alpha_source_placeholder import *  # noqa: F401,F403
          from app.alpha_source_placeholder import __name__ as _unused  # noqa: F401
          from app.alpha_svg_mask import _quantize_alpha
          from app.source_truth import alpha_plane_metrics, render_svg_to_rgba

          SVG_NS = "http://www.w3.org/2000/svg"
          Q = lambda name: f"{{{SVG_NS}}}{name}"
          GRAYS = (0, 1, 32, 64, 128, 192, 254, 255)


          def _render_bytes(data: bytes, width: int, height: int) -> np.ndarray:
              with tempfile.TemporaryDirectory() as directory:
                  path = Path(directory) / "probe.svg"
                  path.write_bytes(data)
                  rgba = render_svg_to_rgba(path, width, height)
              if rgba is None:
                  raise AssertionError("production renderer unavailable")
              return rgba


          def _render_tree(root: ET.Element, width: int, height: int) -> np.ndarray:
              ET.register_namespace("", SVG_NS)
              return _render_bytes(
                  ET.tostring(root, encoding="utf-8", xml_declaration=True),
                  width,
                  height,
              )


          def _root(
              *,
              canvas_fill: str = "#B4141E",
              viewbox: tuple[float, float, float, float] = (0.0, 0.0, 64.0, 64.0),
          ) -> tuple[ET.Element, ET.Element]:
              vx, vy, vw, vh = viewbox
              root = ET.Element(
                  Q("svg"),
                  {
                      "width": "64",
                      "height": "64",
                      "viewBox": f"{vx:g} {vy:g} {vw:g} {vh:g}",
                  },
              )
              canvas = ET.SubElement(
                  root,
                  Q("rect"),
                  {
                      "x": f"{vx:g}",
                      "y": f"{vy:g}",
                      "width": f"{vw:g}",
                      "height": f"{vh:g}",
                      "fill": canvas_fill,
                  },
              )
              ET.SubElement(
                  root,
                  Q("circle"),
                  {
                      "cx": f"{vx + vw / 2:g}",
                      "cy": f"{vy + vh / 2:g}",
                      "r": f"{min(vw, vh) / 8:g}",
                      "fill": canvas_fill,
                  },
              )
              return root, canvas


          def _soft_support(width: int, height: int) -> np.ndarray:
              yy, xx = np.indices((height, width), dtype=np.float32)
              cx = (width - 1) / 2.0
              cy = (height - 1) / 2.0
              radius = min(width, height) * 0.34
              distance = np.sqrt((xx - cx) ** 2 + (yy - cy) ** 2)
              alpha = np.clip((radius + 1.5 - distance) * 96.0, 0.0, 255.0)
              alpha[(xx < width * 0.18) & (yy < height * 0.18)] = 0.0
              return alpha.astype(np.uint8)


          def _mask_probe(gray: int, mask_type: str | None = None) -> bytes:
              attr = ""
              if mask_type is not None:
                  attr = f' mask-type="{mask_type}"'
              return f'''<svg xmlns="{SVG_NS}" width="32" height="32" viewBox="0 0 32 32">
                <defs><mask id="m" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse" x="0" y="0" width="32" height="32"{attr}>
                  <rect x="0" y="0" width="32" height="32" fill="rgb(0,0,0)"/>
                  <rect x="0" y="0" width="32" height="32" fill="rgb({gray},{gray},{gray})"/>
                </mask></defs>
                <rect x="0" y="0" width="32" height="32" fill="#fff" mask="url(#m)"/>
              </svg>'''.encode()


          class PainterMaskTransferTests(unittest.TestCase):
              def test_implicit_and_explicit_luminance_transfer_are_byte_exact(self) -> None:
                  for gray in GRAYS:
                      for mask_type in (None, "luminance"):
                          rendered = _render_bytes(_mask_probe(gray, mask_type), 32, 32)
                          self.assertEqual(int(rendered[16, 16, 3]), gray)

              def test_alpha_mask_type_uses_shape_alpha_not_gray(self) -> None:
                  for gray in (0, 128, 255):
                      rendered = _render_bytes(_mask_probe(gray, "alpha"), 32, 32)
                      self.assertEqual(int(rendered[16, 16, 3]), 255)


          class PainterCanvasUnderpaintTests(unittest.TestCase):
              def _build(self, encoding: str = "polygon", viewbox=(0.0, 0.0, 64.0, 64.0)):
                  root, canvas = _root(viewbox=viewbox)
                  alpha = _soft_support(64, 64)
                  quantized, opacity = _quantize_alpha(alpha)
                  tree, stats = build_painter_reconstruction_tree(
                      root,
                      canvas,
                      quantized,
                      opacity,
                      1.0,
                      mask_encoding=encoding,
                      transaction_id=f"faz3d-{encoding}",
                  )
                  return root, canvas, alpha, tree, stats

              def test_proven_canvas_is_retained_only_inside_source_alpha_mask(self) -> None:
                  _root_node, _canvas, alpha, tree, stats = self._build()
                  rendered = _render_tree(tree, 64, 64)
                  metrics = alpha_plane_metrics(alpha, rendered[:, :, 3])
                  self.assertGreaterEqual(metrics["alpha_iou"], 0.995, metrics)
                  self.assertLessEqual(metrics["alpha_mae"], 0.005, metrics)
                  self.assertFalse(stats["comparison_canvas_knocked_out"])
                  self.assertTrue(stats["comparison_canvas_retained_under_mask"])
                  data = ET.tostring(tree)
                  self.assertIn(b"comparison-canvas-underpaint", data)
                  self.assertIn(b"comparison-canvas-v1", data)
                  self.assertNotIn(b"data-vektoryum-candidate-geometry-knockout", data)
                  self.assertNotIn(b"<image", data.lower())
                  self.assertNotIn(b"data:image", data.lower())

              def test_underpaint_is_excluded_from_artwork_fingerprint(self) -> None:
                  root, canvas, _alpha, tree, _stats = self._build()
                  transaction = "faz3d-polygon"
                  parent = artwork_fingerprint(root, transaction, (canvas,))
                  candidate = artwork_fingerprint(tree, transaction)
                  self.assertEqual(parent, candidate)

              def test_fractional_nonzero_viewbox_uses_cell_edge_mapping(self) -> None:
                  _root_node, _canvas, alpha, tree, _stats = self._build(
                      viewbox=(5.5, -2.25, 91.75, 47.5)
                  )
                  rendered = _render_tree(tree, 64, 64)
                  metrics = alpha_plane_metrics(alpha, rendered[:, :, 3])
                  self.assertGreaterEqual(metrics["alpha_iou"], 0.995, metrics)
                  self.assertLessEqual(metrics["alpha_mae"], 0.005, metrics)

              def test_polygon_rect_and_contour_underpaint_are_native_equivalent(self) -> None:
                  renders = {}
                  for encoding in ("polygon", "rect", "contour"):
                      _root_node, _canvas, alpha, tree, stats = self._build(encoding)
                      rendered = _render_tree(tree, 64, 64)
                      metrics = alpha_plane_metrics(alpha, rendered[:, :, 3])
                      self.assertGreaterEqual(metrics["alpha_iou"], 0.995, (encoding, metrics))
                      self.assertTrue(stats["comparison_canvas_retained_under_mask"])
                      renders[encoding] = rendered[:, :, 3]
                  self.assertTrue(np.array_equal(renders["polygon"], renders["contour"]))
                  self.assertTrue(np.array_equal(renders["polygon"], renders["rect"]))

              def test_output_tree_is_deterministic(self) -> None:
                  first = self._build()[3]
                  second = self._build()[3]
                  first_bytes = ET.tostring(first)
                  second_bytes = ET.tostring(second)
                  self.assertEqual(first_bytes, second_bytes)
                  self.assertEqual(
                      hashlib.sha256(first_bytes).hexdigest(),
                      hashlib.sha256(second_bytes).hexdigest(),
                  )

              def test_absent_canvas_path_remains_masked_without_underpaint(self) -> None:
                  root, _canvas = _root()
                  root.remove(list(root)[0])
                  ET.SubElement(
                      root,
                      Q("rect"),
                      {"x": "0", "y": "0", "width": "64", "height": "64", "fill": "#B4141E"},
                  )
                  alpha = _soft_support(64, 64)
                  quantized, opacity = _quantize_alpha(alpha)
                  tree, stats = build_painter_reconstruction_tree(
                      root, None, quantized, opacity, 1.0,
                      mask_encoding="polygon", transaction_id="faz3d-absent"
                  )
                  metrics = alpha_plane_metrics(alpha, _render_tree(tree, 64, 64)[:, :, 3])
                  self.assertGreaterEqual(metrics["alpha_iou"], 0.995, metrics)
                  self.assertFalse(stats["comparison_canvas_retained_under_mask"])

              def test_end_to_end_sparse_artwork_uses_masked_canvas_support(self) -> None:
                  with tempfile.TemporaryDirectory() as directory:
                      base = Path(directory)
                      source_path = base / "source.png"
                      svg_path = base / "candidate.svg"
                      alpha = _soft_support(96, 72)
                      rgba = np.zeros((72, 96, 4), dtype=np.uint8)
                      rgba[:, :, :3] = (180, 20, 30)
                      rgba[:, :, 3] = alpha
                      Image.fromarray(rgba, mode="RGBA").save(source_path)
                      original = (
                          '<?xml version="1.0" encoding="utf-8"?>'
                          f'<svg xmlns="{SVG_NS}" width="96" height="72" viewBox="0 0 96 72">'
                          '<path d="M0 0H96V72H0Z" fill="#B4141E"/>'
                          '<circle cx="48" cy="36" r="8" fill="#B4141E"/>'
                          '</svg>'
                      ).encode()
                      svg_path.write_bytes(original)
                      report = apply_candidate_painter_reconstruction(
                          svg_path, source_path, "logo_color"
                      )
                      self.assertTrue(report["applied"])
                      self.assertTrue(report["comparison_canvas_retained_under_mask"])
                      self.assertFalse(report["comparison_canvas_knocked_out"])
                      self.assertGreaterEqual(report["painter_native_alpha_iou"], 0.995)
                      self.assertLessEqual(report["painter_native_alpha_mae"], 0.005)
                      self.assertGreaterEqual(report["source_truth_alpha_iou"], 0.995)
                      self.assertGreaterEqual(report["final_evaluator_alpha_iou"], 0.995)
                      self.assertTrue(report["artwork_identity_preserved"])
                      text = svg_path.read_bytes().lower()
                      self.assertNotIn(b"<image", text)
                      self.assertNotIn(b"data:image", text)


          if __name__ == "__main__":
              unittest.main()
          PY

          # Remove two accidental placeholder imports before compilation. They are
          # deliberately asserted here so the generated test remains deterministic.
          python - <<'PY'
          from pathlib import Path
          path = Path('engine/test_alpha_painter_reconstruction_fidelity.py')
          text = path.read_text()
          text = text.replace('from app.alpha_source_placeholder import *  # noqa: F401,F403\n', '')
          text = text.replace('from app.alpha_source_placeholder import __name__ as _unused  # noqa: F401\n', '')
          path.write_text(text)
          PY

      - name: Update alpha contract workflow and fix documentation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/real-world-fidelity-rfv3d2-alpha-mask-fix.yml')
          text = path.read_text()
          old = '''      - "engine/test_alpha_painter_retry.py"\n      - "docs/real_world_fidelity/rfv-3d2-alpha-mask-fix.md"\n'''
          new = '''      - "engine/test_alpha_painter_retry.py"\n      - "engine/test_alpha_painter_reconstruction_fidelity.py"\n      - "docs/real_world_fidelity/rfv-3d2-alpha-mask-fix.md"\n      - "docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-diagnostics.md"\n      - "docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-fix.md"\n      - "docs/real_world_fidelity/evidence/faz3d_painter_alpha_reconstruction_diagnostics.json"\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)
          old = '''          engine/test_alpha_painter_retry.py\n\n      - name: Run alpha-mask unit and production integration tests\n'''
          new = '''          engine/test_alpha_painter_retry.py\n          engine/test_alpha_painter_reconstruction_fidelity.py\n\n      - name: Run alpha-mask unit and production integration tests\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)
          old = '''            engine.test_alpha_painter_retry \\\n            -v > alpha-mask-tests.log 2>&1\n'''
          new = '''            engine.test_alpha_painter_retry \\\n            engine.test_alpha_painter_reconstruction_fidelity \\\n            -v > alpha-mask-tests.log 2>&1\n'''
          assert text.count(old) == 1
          text = text.replace(old, new)
          old = 'engine/test_alpha_painter_retry.py|docs/real_world_fidelity/rfv-3d2-alpha-mask-fix.md) ;;'
          new = (
              'engine/test_alpha_painter_retry.py|engine/test_alpha_painter_reconstruction_fidelity.py|'
              'docs/real_world_fidelity/rfv-3d2-alpha-mask-fix.md|'
              'docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-diagnostics.md|'
              'docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-fix.md|'
              'docs/real_world_fidelity/evidence/faz3d_painter_alpha_reconstruction_diagnostics.json) ;;'
          )
          assert text.count(old) == 1
          text = text.replace(old, new)
          path.write_text(text)
          PY

          cat > docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-fix.md <<'MD'
          # FAZ 3D — Painter alpha reconstruction fidelity fix

          ## Change

          A comparison canvas proven by the existing color-agnostic classifier is no
          longer archived outside the painter mask. It is moved into the preserved
          paint group, tagged `comparison-canvas-underpaint`, stripped of inherited
          alpha and rendered exactly once through the existing source-alpha mask.

          The canvas is therefore invisible where source alpha is zero and supplies
          deterministic paint support wherever source alpha is positive. It remains
          transform-owned and excluded from artwork identity; path data, palette and
          gradient definitions are unchanged.

          ## Unchanged contracts

          - Alpha IoU/MAE and all final evaluator thresholds.
          - TransformJournal SSIM, edge, seam, topology, path, node and byte gates.
          - FAZ 3B.1 attempt ledger, primary error precedence and three-tier encoding
            tournament.
          - FAZ 3C retry eligibility.
          - Corpus, shard count, repeats, retry count and timeouts.
          - Vector-only output; no `<image>`, data URI or external raster.
          - Atomic byte-identical rollback on rejection.
          - `release_decision=no_go` and `rfv4_allowed=false`.

          ## Verification scope

          The dedicated fidelity suite covers production-renderer transfer values,
          masked canvas support, fractional/non-zero viewBox mapping, polygon/rect/
          contour native equivalence, deterministic output, artwork fingerprint,
          absent-canvas compatibility and end-to-end alpha/evaluator acceptance.
          Public-05/public-06 remain subject to the unchanged RFV-3B live measurement.
          MD

      - name: Compile and run targeted FAZ 3D tests
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            engine/app/alpha_artwork_identity.py \
            engine/app/alpha_candidate_painter.py \
            engine/test_alpha_painter_reconstruction_fidelity.py
          python -m unittest \
            engine.test_alpha_painter_reconstruction_fidelity \
            engine.test_alpha_candidate_painter \
            engine.test_alpha_artwork_identity \
            engine.test_alpha_painter_encoding \
            engine.test_alpha_painter_ledger \
            engine.test_alpha_painter_retry \
            -v

      - name: Run complete alpha suite
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest \
            engine.test_alpha_candidate_identity \
            engine.test_alpha_candidate_knockout \
            engine.test_alpha_candidate_paint_selection \
            engine.test_alpha_candidate_support \
            engine.test_alpha_candidate_validation \
            engine.test_alpha_candidate_painter \
            engine.test_alpha_candidate_background \
            engine.test_alpha_mask_adaptive \
            engine.test_alpha_mask_transaction \
            engine.test_alpha_preprocess \
            engine.test_alpha_noop_preflight \
            engine.test_alpha_clip_encoding \
            engine.test_alpha_artwork_identity \
            engine.test_alpha_painter_encoding \
            engine.test_alpha_painter_ledger \
            engine.test_alpha_painter_retry \
            engine.test_alpha_painter_reconstruction_fidelity \
            -v | tee faz3d-alpha-tests.log

      - name: Confirm forbidden policy files are untouched
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code HEAD~1 -- \
            engine/app/final_artifact_evaluator.py \
            engine/app/source_truth.py \
            engine/app/transform_journal.py \
            engine/benchmark \
            engine/regression/rfv3_measurement_policy.json \
            engine/regression/rfv2_qualification_manifest.json \
            docs/real_world_fidelity/evidence/rfv3_quality_decision.json \
            docs/real_world_fidelity_roadmap.json

      - name: Commit fix and remove executor workflows
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/faz-3d-mask-semantics-diagnostic.yml \
            .github/workflows/faz-3d-apply-fix.yml
          git add \
            engine/app/alpha_artwork_identity.py \
            engine/app/alpha_candidate_painter.py \
            engine/test_alpha_painter_reconstruction_fidelity.py \
            .github/workflows/real-world-fidelity-rfv3d2-alpha-mask-fix.yml \
            docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-fix.md
          git -c user.name='Vektoryum CI' -c user.email='actions@github.com' commit \
            -m 'fix: make painter reconstruction alpha-faithful' \
            -m 'Retain a proven comparison canvas only as transform-owned underpaint inside the existing source-alpha mask. Thresholds, evaluator, TransformJournal, corpus, retry, timeout and release policy remain unchanged. Output remains deterministic vector-only with byte-identical rollback.'

      - name: Push diagnostic and fix commits
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          test -z "$(git status --porcelain)"
          git log -4 --oneline
          git push origin "HEAD:${TARGET_BRANCH}"
