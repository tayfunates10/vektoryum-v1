name: FAZ 3D4 seam isolation v3

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-seam-isolation-v3.yml"

permissions:
  contents: read

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: engine:.
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -q -r engine/requirements.txt pytest httpx
      - name: Build focused seam-isolation script
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/faz-3d4-hidden-rgb-shadow.yml').read_text()
          start_marker = "cat > /tmp/hidden_rgb_shadow.py <<'PY'\n"
          end_marker = "\n          PY\n          python /tmp/hidden_rgb_shadow.py"
          script = textwrap.dedent(workflow.split(start_marker, 1)[1].split(end_marker, 1)[0])

          old_unwrap = '''def pipeline_without_alpha():
              fn = pipeline.run_pipeline
              while fn is not None:
                  if getattr(fn, "__vektoryum_auto_gate_wrapped__", False):
                      return fn
                  fn = getattr(fn, "__wrapped__", None)
              raise RuntimeError("auto-gate pipeline wrapper not found")'''
          new_unwrap = '''def pipeline_without_alpha():
              fn = pipeline.run_pipeline
              matches = []
              while fn is not None:
                  if getattr(fn, "__vektoryum_auto_gate_wrapped__", False):
                      matches.append(fn)
                  fn = getattr(fn, "__wrapped__", None)
              if not matches:
                  raise RuntimeError("auto-gate pipeline wrapper not found")
              return matches[-1]'''
          if old_unwrap not in script:
              raise SystemExit('unwrap block missing')
          script = script.replace(old_unwrap, new_unwrap, 1)

          script = script.replace(
              'from app.alpha_candidate_painter import (\n'
              '    _painter_contour_children,',
              'from app.alpha_candidate_painter import (\n'
              '    _painter_contour_children,\n'
              '    _simplify_rectilinear_loop,',
              1,
          )
          script = script.replace(
              'from app.alpha_candidate_support import _PROTECTED_ROOT_TAGS, _strip_content_alpha',
              'from app.alpha_candidate_support import _PROTECTED_ROOT_TAGS, _strip_content_alpha\n'
              'from app.alpha_mask_contour import trace_cell_contours',
              1,
          )

          helper = '''def compact_polygon_children(loops, qname):
              children = []
              for _area, corners, gray in loops:
                  simplified = _simplify_rectilinear_loop(corners)
                  if len(simplified) < 3:
                      continue
                  children.append(ET.Element(
                      qname("polygon"),
                      {
                          "points": " ".join(f"{x},{y}" for x, y in simplified),
                          "fill": f"rgb({gray},{gray},{gray})",
                      },
                  ))
              return children

          '''
          script = script.replace('def build_candidate(\n', helper + 'def build_candidate(\n', 1)
          script = script.replace(
              '    mask_encoding: str,\n    output_path: Path,',
              '    mask_encoding: str,\n    support_encoding: str,\n    output_path: Path,',
              1,
          )
          script = script.replace(
              'mask_children = _painter_polygon_children(loops, qname)',
              'mask_children = compact_polygon_children(loops, qname)',
          )

          support_start = script.index(
              '    rectangles = _merged_rectangles_by_level(labels)',
              script.index('def build_candidate('),
          )
          support_end = script.index('\n\n    for child in movable:', support_start)
          support_block = '''    rect_count = 0
              support_shape_count = 0
              if support_encoding == "rect":
                  rectangles = _merged_rectangles_by_level(labels)
                  for label in sorted(rectangles):
                      if label <= 0 or label > len(palette):
                          continue
                      color = palette[label - 1]
                      group = ET.SubElement(
                          support,
                          qname("g"),
                          {"fill": f"rgb({color[0]},{color[1]},{color[2]})"},
                      )
                      for x, y, rect_w, rect_h in rectangles[label]:
                          ET.SubElement(
                              group,
                              qname("rect"),
                              {"x": str(x), "y": str(y), "width": str(rect_w), "height": str(rect_h)},
                          )
                          rect_count += 1
                          support_shape_count += 1
              elif support_encoding == "polygon":
                  for label, color in enumerate(palette, start=1):
                      loops_for_color = trace_cell_contours(labels == label)
                      group = ET.SubElement(
                          support,
                          qname("g"),
                          {"fill": f"rgb({color[0]},{color[1]},{color[2]})"},
                      )
                      for corners in loops_for_color:
                          simplified = _simplify_rectilinear_loop(corners)
                          if len(simplified) < 3:
                              continue
                          ET.SubElement(
                              group,
                              qname("polygon"),
                              {"points": " ".join(f"{x},{y}" for x, y in simplified)},
                          )
                          support_shape_count += 1
              else:
                  raise RuntimeError(f"unsupported support encoding: {support_encoding}")'''
          script = script[:support_start] + support_block + script[support_end:]

          script = script.replace(
              '"support_rect_count": rect_count,\n        "mask_encoding": mask_encoding,',
              '"support_rect_count": rect_count,\n'
              '        "support_shape_count": support_shape_count,\n'
              '        "support_encoding": support_encoding,\n'
              '        "mask_encoding": mask_encoding,',
              1,
          )
          strategy_anchor = 'source_full = np.asarray(Image.open(source_path).convert("RGBA"), dtype=np.uint8)'
          script = script.replace(
              strategy_anchor,
              'strategies = {"solved_nearest_opaque_8": strategies["solved_nearest_opaque_8"]}\n\n'
              + strategy_anchor,
              1,
          )
          script = script.replace(
              'image_class = _MODE_IMAGE_CLASS[mode]\nmatrix = []',
              'image_class = _MODE_IMAGE_CLASS[mode]\n'
              'parent_measured = _measure_svg_bytes(parent.read_bytes(), source_rgb_white, max_side=512)\n'
              'matrix = []',
              1,
          )
          script = script.replace(
              'for strategy_name, colors in strategies.items():\n    for encoding in ("rect", "contour", "polygon"):\n'
              '        candidate = job_dir / f"{strategy_name}-{encoding}.svg"',
              'for strategy_name, colors in strategies.items():\n'
              '    for support_encoding in ("rect", "polygon"):\n'
              '        for encoding in ("polygon",):\n'
              '            candidate = job_dir / f"{strategy_name}-{support_encoding}-{encoding}.svg"',
              1,
          )
          script = script.replace(
              'parent, source_path, colors, residual, encoding, candidate',
              'parent, source_path, colors, residual, encoding, support_encoding, candidate',
          )
          script = script.replace(
              '"mask_encoding": encoding,\n',
              '"mask_encoding": encoding,\n'
              '                    "support_encoding": support_encoding,\n'
              '                    "support_shape_count": int(geometry["support_shape_count"]),\n',
          )
          script = script.replace(
              '"background_status": background_status,\n    "residual_pixel_count": int(np.count_nonzero(residual)),',
              '"background_status": background_status,\n'
              '    "parent_metrics": {\n'
              '        "serialized_bytes": parent_measured.get("byte_size"),\n'
              '        "path_count": parent_measured.get("path_count"),\n'
              '        "node_count": parent_measured.get("node_count"),\n'
              '        "ssim": parent_measured.get("ssim"),\n'
              '        "edge_f1": parent_measured.get("edge_f1_1px"),\n'
              '        "seam_ratio": parent_measured.get("seam_ratio"),\n'
              '        "component_delta": parent_measured.get("component_delta"),\n'
              '        "hole_delta": parent_measured.get("hole_delta"),\n'
              '    },\n'
              '    "residual_pixel_count": int(np.count_nonzero(residual)),',
              1,
          )
          script = script.replace(
              '"schema": "faz3d4-hidden-rgb-shadow-v1"',
              '"schema": "faz3d4-seam-isolation-v3"',
              1,
          )
          Path('/tmp/seam_isolation_v3.py').write_text(script)
          PY
          python -m py_compile /tmp/seam_isolation_v3.py
      - name: Run seam-isolation candidates
        shell: bash
        run: |
          set +e
          python /tmp/seam_isolation_v3.py > seam-v3.log 2>&1
          status=$?
          set -e
          tail -160 seam-v3.log > seam-v3-tail.txt
          echo "exit_code=${status}" >> seam-v3-tail.txt
          exit 0
      - name: Upload scalar-only matrix
        uses: actions/upload-artifact@v4
        with:
          name: faz3d4-seam-isolation-v3-${{ github.run_id }}
          path: |
            faz3d4-hidden-rgb-shadow.json
            seam-v3-tail.txt
          if-no-files-found: warn
          retention-days: 7
