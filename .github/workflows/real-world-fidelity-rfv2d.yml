name: Real-world fidelity RFV-2D public source acquisition

on:
  pull_request:

permissions:
  contents: read

jobs:
  rfv2d-public-source-acquisition:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow
      - name: Compile RFV-2D files
        run: python -m py_compile engine/regression/rfv2_public_source_acquire.py engine/regression/test_rfv2_public_source_acquire.py
      - name: Validate exact public-source allowlist and transforms
        run: python -m unittest engine.regression.test_rfv2_public_source_acquire
      - name: Validate RFV-2D evidence state
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          sources = json.loads(Path('engine/regression/rfv2_public_source_manifest.json').read_text())
          qualified = json.loads(Path('engine/regression/rfv2_qualification_manifest.json').read_text())
          phase = json.loads(Path('docs/real_world_fidelity_roadmap.json').read_text())['phases'][1]
          assert len(sources['cases']) == 24
          assert qualified['status'] in {'awaiting_real_assets', 'qualified'}
          if qualified['status'] == 'qualified':
              assert qualified['qualified_case_count'] == 24
              assert phase['status'] in {'implemented', 'merged'}
          else:
              assert qualified['cases'] == []
              assert phase['status'] == 'pending'
          PY
