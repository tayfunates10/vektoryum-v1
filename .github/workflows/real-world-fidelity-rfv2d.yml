name: Real-world fidelity RFV-2D public source acquisition

on:
  pull_request:

permissions:
  contents: read

jobs:
  rfv2d-public-source-acquisition:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Compile RFV-2D files
        run: python -m py_compile engine/regression/rfv2_public_source_acquire.py engine/regression/test_rfv2_public_source_acquire.py

      - name: Validate exact public-source allowlist and transforms
        run: python -m unittest engine.regression.test_rfv2_public_source_acquire

      - name: Confirm selection does not claim acquisition
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          sources = json.loads(Path('engine/regression/rfv2_public_source_manifest.json').read_text())
          real_manifest = json.loads(Path('engine/regression/rfv2_qualification_manifest.json').read_text())
          roadmap = json.loads(Path('docs/real_world_fidelity_roadmap.json').read_text())
          assert sources['status'] == 'selected_not_acquired'
          assert len(sources['cases']) == 24
          assert real_manifest['status'] == 'awaiting_real_assets'
          assert real_manifest['qualified_case_count'] == 0
          assert real_manifest['cases'] == []
          assert roadmap['phases'][1]['status'] == 'pending'
          assert roadmap['phases'][1]['selected_public_source_count'] == 24
          PY
