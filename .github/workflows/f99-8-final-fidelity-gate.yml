name: Fidelity-99 F99-8 final fidelity gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  f99-8-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile F99-8 contract
        run: python -m py_compile engine/tests/test_f99_8_final_fidelity_gate.py
      - name: Validate finite final fidelity gate
        run: python -m unittest -v engine.tests.test_f99_8_final_fidelity_gate
