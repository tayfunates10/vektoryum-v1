name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

concurrency:
  group: huggingface-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync repository to Hugging Face
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ATESOGLU/Vektoryum
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is required." >&2
            exit 1
          fi
          git remote add huggingface "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"
          git push --force huggingface HEAD:main
