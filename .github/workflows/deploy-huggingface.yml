name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

concurrency:
  group: huggingface-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync repository to Hugging Face
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Configure Git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Prepare Hugging Face Space payload
        run: |
          set -euo pipefail
          rm -rf /tmp/hf-space
          mkdir -p /tmp/hf-space/engine
          cp Dockerfile README.md /tmp/hf-space/
          cp engine/requirements.txt /tmp/hf-space/engine/
          cp -R engine/app /tmp/hf-space/engine/app
          cp -R engine/models /tmp/hf-space/engine/models

      - name: Configure Space runtime persistence
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ATESOGLU/Vektoryum
          HF_PERSIST_REPO: ATESOGLU/Vektoryum-jobs
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is required." >&2
            exit 1
          fi
          python -m pip install --quiet huggingface_hub
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          space = os.environ["HF_SPACE"]
          persist_repo = os.environ["HF_PERSIST_REPO"]

          api = HfApi(token=token)
          api.create_repo(repo_id=persist_repo, repo_type="dataset", private=True, exist_ok=True)
          api.add_space_secret(repo_id=space, key="HF_TOKEN", value=token)
          api.add_space_variable(repo_id=space, key="VEKTORYUM_HF_PERSIST_REPO", value=persist_repo)
          api.add_space_variable(repo_id=space, key="VEKTORYUM_HF_PERSIST_REPO_TYPE", value="dataset")
          PY

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ATESOGLU/Vektoryum
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is required." >&2
            exit 1
          fi
          cd /tmp/hf-space
          git init
          git checkout -b main
          git add .
          git commit -m "Deploy Vektoryum to Hugging Face"
          git remote add huggingface "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"
          git push --force huggingface main
