name: Production platform roadmap contract

on:
  pull_request:
    paths:
      - "engine/production_platform_roadmap.json"
      - "engine/test_production_platform_roadmap.py"
      - "engine/test_platform_identity.py"
      - "engine/test_platform_persistence.py"
      - "engine/test_platform_operations.py"
      - "engine/app/**"
      - "docs/PRODUCTION_PLATFORM_ROADMAP.md"
      - "Dockerfile"
      - ".github/workflows/production-platform-contract.yml"
      - ".github/workflows/huggingface-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-platform-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: engine
    env:
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
      VEKTORYUM_SERVICE_MODE: "beta"
      VEKTORYUM_SOURCE_REVISION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install test dependencies
        run: python -m pip install -r requirements.txt pytest httpx
      - name: Validate production platform roadmap
        run: python -m pytest -q test_production_platform_roadmap.py
      - name: Validate PPC-2 account and login-state contract
        run: python -m pytest -q test_platform_identity.py test_runtime_main.py
      - name: Validate PPC-3 durable persistence contract
        run: python -m pytest -q test_platform_persistence.py
      - name: Validate PPC-4 operations contract
        run: python -m pytest -q test_platform_operations.py

  container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t vektoryum-ppc4:${GITHUB_SHA} .
      - name: Verify non-root image user
        run: test "$(docker image inspect vektoryum-ppc4:${GITHUB_SHA} --format '{{.Config.User}}')" = "appuser"
      - name: Start bounded container
        run: >-
          docker run -d --name vektoryum-ppc4
          --memory 4g --cpus 2 --pids-limit 256
          -e VEKTORYUM_SERVICE_MODE=beta
          -e VEKTORYUM_SOURCE_REVISION=${GITHUB_SHA}
          -p 7860:7860 vektoryum-ppc4:${GITHUB_SHA}
      - name: Machine-readable liveness and readiness
        run: |
          for i in $(seq 1 45); do
            python - <<'PY' && exit 0 || true
          import json, urllib.request
          for path in ("livez", "readyz"):
              with urllib.request.urlopen(f"http://127.0.0.1:7860/{path}", timeout=3) as response:
                  payload = json.load(response)
                  assert payload["revision"]
                  assert payload["status"] in {"ok", "ready"}
          PY
            sleep 2
          done
          docker logs vektoryum-ppc4
          exit 1
      - name: Graceful SIGTERM smoke
        run: |
          docker stop --time 20 vektoryum-ppc4
          test "$(docker inspect vektoryum-ppc4 --format '{{.State.ExitCode}}')" = "0"
      - name: Cleanup
        if: always()
        run: docker rm -f vektoryum-ppc4 >/dev/null 2>&1 || true
