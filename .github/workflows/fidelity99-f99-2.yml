name: Fidelity-99 F99-2 edge and curve contract

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  f99-2-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile F99-2 contract
        run: python -m py_compile engine/tests/test_f99_2_edge_curve_quality.py
      - name: Validate finite edge and curve thresholds
        run: python -m pytest -q engine/tests/test_f99_2_edge_curve_quality.py
