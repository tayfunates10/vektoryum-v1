name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy engine folder to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ATESOGLU/Vektoryum
        run: |
          set -e

          echo "HF deploy klasörü hazırlanıyor..."
          rm -rf /tmp/hf-space
          mkdir -p /tmp/hf-space

          echo "Tüm repository içeriği HF kök dizinine kopyalanıyor..."
          rsync -a ./ /tmp/hf-space/ \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".git" \
            --exclude "vector_jobs" \
            --exclude "vektoryum_data" \
            --exclude "engine/regression" \
            --exclude "engine/__pycache__" \
            --exclude "engine/.vscode"

          cd /tmp/hf-space

          echo "HF deploy içeriği:"
          ls -la

          echo "Dockerfile kontrol ediliyor..."
          if [ ! -f "Dockerfile" ]; then
            echo "HATA: Dockerfile bulunamadı."
            exit 1
          fi

          echo "README.md kontrol ediliyor..."
          if [ ! -f "README.md" ]; then
            echo "HATA: README.md bulunamadı."
            exit 1
          fi

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "HF Space engine deploy"

          git branch -M main
          git remote add hf "https://ATESOGLU:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"

          echo "HF Space'e temiz push ediliyor..."
          git push --force hf main
