- name: Deploy to Hugging Face Space
  env:
    HF_TOKEN: ${{ secrets.HF_TOKEN }}
    HF_SPACE: ATESOGLU/Vektoryum
  run: |
    set -e

    echo "HF deploy klasörü hazırlanıyor..."
    rm -rf /tmp/hf-space
    mkdir -p /tmp/hf-space

    rsync -a ./ /tmp/hf-space/ \
      --exclude ".git" \
      --exclude ".github" \
      --exclude "engine/regression" \
      --exclude "__pycache__" \
      --exclude ".pytest_cache" \
      --exclude "node_modules" \
      --exclude ".next" \
      --exclude "dist" \
      --exclude "build" \
      --exclude ".venv" \
      --exclude "venv"

    cd /tmp/hf-space

    echo "Deploy klasörü içeriği:"
    ls -la

    git init
    git config user.name "github-actions[bot]"
    git config user.email "github-actions[bot]@users.noreply.github.com"

    git add .
    git commit -m "HF Space build"

    git branch -M main
    git remote add hf "https://ATESOGLU:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"

    echo "HF Space'e temiz push ediliyor..."
    git push --force hf main
