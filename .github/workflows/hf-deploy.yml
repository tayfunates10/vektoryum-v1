name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy engine folder to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ATESOGLU/Vektoryum
        run: |
          set -e

          echo "HF deploy klasörü hazırlanıyor..."
          rm -rf /tmp/hf-space
          mkdir -p /tmp/hf-space

          echo "engine klasörünün içeriği HF kök dizinine kopyalanıyor..."
          rsync -a ./engine/ /tmp/hf-space/ \
            --exclude "regression" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".vscode" \
            --exclude "tests" \
            --exclude "*.png" \
            --exclude "*.jpg" \
            --exclude "*.jpeg" \
            --exclude "*.webp"

          echo "README.md kopyalanıyor..."
          cp README.md /tmp/hf-space/README.md

          cd /tmp/hf-space

          echo "HF deploy içeriği:"
          ls -la

          echo "Dockerfile kontrol ediliyor..."
          if [ ! -f "Dockerfile" ]; then
            echo "HATA: Dockerfile bulunamadı."
            exit 1
          fi

          echo "README.md kontrol ediliyor..."
          if [ ! -f "README.md" ]; then
            echo "HATA: README.md bulunamadı."
            exit 1
          fi

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "HF Space engine deploy"

          git branch -M main
          git remote add hf "https://ATESOGLU:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"

          echo "HF Space'e temiz push ediliyor..."
          git push --force hf main
