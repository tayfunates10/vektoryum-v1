name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy clean copy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ATESOGLU/Vektoryum
        run: |
          set -e

          echo "HF deploy klasörü hazırlanıyor..."
          rm -rf /tmp/hf-space
          mkdir -p /tmp/hf-space

          rsync -a ./ /tmp/hf-space/ \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "engine/regression" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude "dist" \
            --exclude "build" \
            --exclude ".venv" \
            --exclude "venv"

          cd /tmp/hf-space

          echo "Kontrol: engine/regression gönderilmeyecek"
          if [ -d "engine/regression" ]; then
            echo "HATA: engine/regression hâlâ var"
            exit 1
          fi

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "HF Space clean deploy"

          git branch -M main
          git remote add hf "https://ATESOGLU:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"

          echo "HF Space'e temiz push ediliyor..."
          git push --force hf main
