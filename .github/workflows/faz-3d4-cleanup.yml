name: FAZ 3D4 one-shot cleanup

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-cleanup.yml"

permissions:
  contents: write

concurrency:
  group: faz-3d4-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove temporary FAZ 3D4 executors and staging files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/faz-3d4-*.yml
          rm -f engine/regression/faz3d4_*.b64
          rm -f engine/regression/faz3d4_*.txt
          rm -f engine/regression/faz3d4_residual_part_*.txt
          rm -f engine/regression/residual_exact_*.txt
          rm -f engine/regression/residual_corr_*.txt
          rm -f engine/regression/correct_script_*.txt
          git diff --check
          if git status --porcelain | grep -Ev '^ D (\.github/workflows/faz-3d4-|engine/regression/(faz3d4_|residual_exact_|residual_corr_|correct_script_))'; then
            echo 'unexpected cleanup scope' >&2
            exit 1
          fi

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git add -A .github/workflows engine/regression
          git -c user.name='Vektoryum CI' -c user.email='actions@github.com' commit \
            -m 'chore: remove temporary FAZ 3D4 executors and staging files'
          git push origin "HEAD:${TARGET_BRANCH}"
