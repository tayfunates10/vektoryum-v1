name: Benchmark v1 seed corpus

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

concurrency:
  group: benchmark-v1-seed
  cancel-in-progress: true

jobs:
  seed-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: engine
    env:
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest
      - name: Validate benchmark contracts
        run: python -m pytest -q test_benchmark_manifest.py test_benchmark_seed_runner.py
      - name: Generate deterministic seed corpus and reports
        run: python -m benchmark.seed_runner --output benchmark_artifacts
      - name: Upload JSON HTML and fixtures
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-v1-seed-${{ github.run_number }}
          path: engine/benchmark_artifacts
          if-no-files-found: error
          retention-days: 30
