name: Benchmark v1 seed corpus

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/benchmark-seed.yml"
      - "engine/benchmark/**"
      - "engine/app/**"

permissions:
  contents: read
  actions: read

concurrency:
  group: benchmark-v1-seed
  cancel-in-progress: true

jobs:
  seed-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: engine
    env:
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install system validators
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ghostscript libcairo2
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest
      - name: Validate benchmark contracts
        run: >-
          python -m pytest -q
          test_benchmark_manifest.py
          test_benchmark_seed_runner.py
          test_benchmark_compare.py
          test_benchmark_artifact_history.py
          test_benchmark_pipeline_results.py
          test_benchmark_pipeline_smoke.py
          test_benchmark_release_gate.py
          test_benchmark_release_gate_cli.py
      - name: Download previous successful seed artifact
        shell: bash
        run: |
          set -euo pipefail
          previous_run_id="$(gh run list --workflow benchmark-seed.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
          if [ -n "$previous_run_id" ]; then
            mkdir -p baseline_artifact
            gh run download "$previous_run_id" --name benchmark-v1-seed --dir baseline_artifact || true
          fi
      - name: Generate deterministic seed corpus and reports
        run: python -m benchmark.seed_runner --output benchmark_artifacts
      - name: Run two-case real pipeline smoke benchmark
        run: python -m benchmark.pipeline_smoke --output benchmark_artifacts/pipeline --engine-version "${GITHUB_SHA}"
      - name: Generate artifact history delta
        shell: bash
        run: |
          set -euo pipefail
          args=(--current benchmark_artifacts/seed_manifest.json --output benchmark_artifacts)
          if [ -f baseline_artifact/seed_manifest.json ]; then
            args+=(--baseline baseline_artifact/seed_manifest.json)
          fi
          python -m benchmark.artifact_history "${args[@]}"
      - name: Evaluate fail-closed pipeline release gate
        shell: bash
        run: |
          set -euo pipefail
          args=(--current benchmark_artifacts/pipeline/pipeline_results.json --output benchmark_artifacts/pipeline/release_gate.json)
          if [ -f baseline_artifact/pipeline/pipeline_results.json ]; then
            args+=(--baseline baseline_artifact/pipeline/pipeline_results.json)
          fi
          python -m benchmark.release_gate "${args[@]}"
      - name: Upload JSON HTML fixtures and real pipeline results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-v1-seed
          path: engine/benchmark_artifacts
          if-no-files-found: error
          retention-days: 30
