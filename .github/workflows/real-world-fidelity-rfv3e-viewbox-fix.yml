name: Real-world fidelity RFV-3E viewBox alpha-journal fix

on:
  pull_request:
    paths:
      - ".github/workflows/real-world-fidelity-rfv3e-viewbox-fix.yml"
      - ".github/workflows/real-world-fidelity-rfv3e-viewbox-journal-diagnostics.yml"
      - "engine/app/transform_journal.py"
      - "engine/test_transform_journal.py"
      - "engine/regression/rfv3e_viewbox_journal_diagnostics.py"
      - "engine/regression/test_rfv3e_viewbox_journal_diagnostics.py"
      - "docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-fix.md"
      - "docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-diagnostics.md"

permissions:
  actions: read
  contents: write

concurrency:
  group: rfv3e-viewbox-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rfv3e-viewbox-alpha-journal-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: engine
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Download exact verified patch artifact
        uses: actions/download-artifact@v4
        with:
          name: rfv3e-verified-shared-rgba-patch-f640fda23c03f52c6b85069e41b5f951207418b8
          path: "${{ runner.temp }}/rfv3e-verified"
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: 29677939153

      - name: Verify and install exact tested files
        shell: bash
        run: |
          set -euo pipefail
          production="${RUNNER_TEMP}/rfv3e-verified/app/transform_journal.py"
          tests="${RUNNER_TEMP}/rfv3e-verified/test_transform_journal.py"
          test "$(sha256sum "${production}" | awk '{print $1}')" = \
            "e259c00403bda98df0ac0eaa1e3d9ee4877c44c51b545912de9d038c598bc433"
          test "$(sha256sum "${tests}" | awk '{print $1}')" = \
            "282c40d73ce6698b8b5ac6f64b37a7884f9a8fa206de3e652d027fbc291e672b"
          cp "${production}" engine/app/transform_journal.py
          cp "${tests}" engine/test_transform_journal.py
          git diff --check -- engine/app/transform_journal.py engine/test_transform_journal.py

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install production test dependencies
        run: python -m pip install -r engine/requirements.txt pytest

      - name: Compile exact verified files
        run: >-
          python -m py_compile
          engine/app/transform_journal.py
          engine/test_transform_journal.py

      - name: Run complete transform journal contract
        working-directory: engine
        run: pytest -q test_transform_journal.py

      - name: Verify stage-scoped alpha and render reuse
        working-directory: engine
        run: >-
          pytest -q test_transform_journal.py
          -k 'alpha_preserving_viewbox_restore or alpha_plane_regression or unmeasured_alpha or alpha_measurement_is_scoped or alpha_restore_reuses_single_rgba_render'

      - name: Publish only verified production and test files
        shell: bash
        env:
          RFV3E_HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add engine/app/transform_journal.py engine/test_transform_journal.py
          git diff --cached --check
          git commit -m "RFV-3E: reuse RGBA render within alpha journal"
          git push origin "HEAD:${RFV3E_HEAD_BRANCH}"
