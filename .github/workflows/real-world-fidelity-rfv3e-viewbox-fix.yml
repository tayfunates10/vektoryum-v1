name: Real-world fidelity RFV-3E viewBox alpha-journal fix

on:
  pull_request:
    paths:
      - ".github/workflows/real-world-fidelity-rfv3e-viewbox-fix.yml"
      - ".github/workflows/real-world-fidelity-rfv3e-viewbox-journal-diagnostics.yml"
      - "engine/app/transform_journal.py"
      - "engine/test_transform_journal.py"
      - "engine/regression/rfv3e_viewbox_journal_diagnostics.py"
      - "engine/regression/test_rfv3e_viewbox_journal_diagnostics.py"
      - "docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-fix.md"
      - "docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-diagnostics.md"

permissions:
  actions: read
  contents: write

concurrency:
  group: rfv3e-viewbox-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rfv3e-viewbox-alpha-journal-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: engine
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply one-shot coordinate render proof patch
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          production_path = Path('engine/app/transform_journal.py')
          production = production_path.read_text()

          def replace_once(old: str, new: str, label: str) -> None:
              global production
              count = production.count(old)
              if count == 1:
                  production = production.replace(old, new, 1)
                  return
              if count == 0 and new in production:
                  return
              raise AssertionError(f'{label} anchor count: {count}')

          replace_once(
              '''    measure_alpha: bool = False,
              _allow_topology_refinement: bool = True,
          ''',
              '''    measure_alpha: bool = False,
              capture_render: bool = False,
              _allow_topology_refinement: bool = True,
          ''',
              'measure signature',
          )

          replace_once(
              '''    if rnd.shape[:2] != (h, w):
              rnd = cv2.resize(rnd, (w, h), interpolation=cv2.INTER_AREA)

          # TransformJournal'ın görevi final source-truth kararını yeniden vermek değil,
          ''',
              '''    if rnd.shape[:2] != (h, w):
              rnd = cv2.resize(rnd, (w, h), interpolation=cv2.INTER_AREA)

          # Zorunlu coordinate-contract onarımında parent/candidate render'ı özel
          # cache alanında tutulur. Bu, source-topology AA sınıflandırma gürültüsünü
          # gerçek render regresyonundan ayırır ve gradient preservation'ı ölçer.
          # Ham RGB ndarray public journal'a source_truth.public_metric_dict sayesinde
          # hiçbir zaman serileştirilmez.
          if capture_render:
              render_rgb = np.asarray(rnd, dtype=np.uint8).copy()
              metric["_render_rgb"] = render_rgb
              metric["render_rgb_sha256"] = hashlib.sha256(
                  np.ascontiguousarray(render_rgb).tobytes()
              ).hexdigest()
              if "gradient_fidelity" in set(required_metrics or ()):
                  metric["gradient_fidelity_status"] = "measured"
                  metric["required_unmeasured"] = [
                      name for name in metric["required_unmeasured"]
                      if name != "gradient_fidelity"
                  ]

          # TransformJournal'ın görevi final source-truth kararını yeniden vermek değil,
          ''',
              'render capture',
          )

          replace_once(
              '''            # Fine pass only replaces topology fields; alpha was already proved.
                      measure_alpha=False,
                      _allow_topology_refinement=False,
          ''',
              '''            # Fine pass only replaces topology fields; alpha/render proof was
                      # already completed at the bounded coarse resolution.
                      measure_alpha=False,
                      capture_render=False,
                      _allow_topology_refinement=False,
          ''',
              'refinement scope',
          )

          replace_once(
              '''        # Alpha measurement is deliberately stage-scoped. The proven defect only
                  # affects the mandatory coordinate-contract repair; opening alpha for every
                  # downstream mutator would change previously fail-closed production scope.
          ''',
              '''        # Alpha ve direct render preservation ölçümü yalnız mandatory
                  # coordinate-contract repair'a açılır. Downstream mutatorlar önceki
                  # fail-closed required-metric scope'larını aynen korur.
          ''',
              'stage scope comment',
          )

          replace_once(
              '''        measure_alpha = self._measurement_stage_id == "restore_source_dimensions"
                  cache_key = f"{sha}:alpha={int(measure_alpha)}"
                  if cache_key not in self._cache:
                      started = time.perf_counter()
                      try:
                          self._cache[cache_key] = _measure_svg_bytes(
                              data, self.source_rgb, max_side=self.max_side,
                              required_metrics=self.required_metrics,
                              measure_alpha=measure_alpha,
                          )
          ''',
              '''        capture_render = self._measurement_stage_id == "restore_source_dimensions"
                  measure_alpha = capture_render
                  cache_key = f"{sha}:alpha={int(measure_alpha)}:render={int(capture_render)}"
                  if cache_key not in self._cache:
                      started = time.perf_counter()
                      try:
                          self._cache[cache_key] = _measure_svg_bytes(
                              data, self.source_rgb, max_side=self.max_side,
                              required_metrics=self.required_metrics,
                              measure_alpha=measure_alpha,
                              capture_render=capture_render,
                          )
          ''',
              'measure cache',
          )

          replace_once(
              '''        return _source_truth.alpha_plane_metrics(parent_alpha, candidate_alpha)

              def _decide(self, before: dict[str, Any], after: dict[str, Any]) -> list[str]:
          ''',
              '''        return _source_truth.alpha_plane_metrics(parent_alpha, candidate_alpha)

              @staticmethod
              def _render_comparison(
                  before: dict[str, Any], after: dict[str, Any],
              ) -> dict[str, float] | None:
                  parent_rgb = before.get("_render_rgb")
                  candidate_rgb = after.get("_render_rgb")
                  if not isinstance(parent_rgb, np.ndarray) or not isinstance(candidate_rgb, np.ndarray):
                      return None
                  if parent_rgb.shape != candidate_rgb.shape:
                      return None
                  from app.final_artifact_evaluator import _color_metrics  # noqa: PLC0415
                  from app.fidelity import _edge_f1, _ssim  # noqa: PLC0415

                  parent_gray = cv2.cvtColor(parent_rgb, cv2.COLOR_RGB2GRAY)
                  candidate_gray = cv2.cvtColor(candidate_rgb, cv2.COLOR_RGB2GRAY)
                  color = _color_metrics(parent_rgb, candidate_rgb)
                  diff = np.abs(
                      parent_rgb.astype(np.float32) - candidate_rgb.astype(np.float32)
                  ) / 255.0
                  return {
                      "ssim": float(_ssim(parent_gray, candidate_gray)),
                      "edge_f1_1px": float(_edge_f1(candidate_gray, parent_gray, tolerance=1)),
                      "de00_mean": float(color["de00_mean"]),
                      "de00_p95": float(color["de00_p95"]),
                      "rgb_mae": float(diff.mean()),
                      "rgb_p95": float(np.percentile(diff, 95)),
                  }

              def _render_equivalent(self, comparison: dict[str, float] | None) -> bool:
                  if comparison is None:
                      return False
                  from app.final_artifact_evaluator import _thresholds  # noqa: PLC0415

                  thresholds = _thresholds(self.image_class, None)
                  return bool(
                      float(comparison["ssim"]) >= thresholds["ssim_min"]
                      and float(comparison["edge_f1_1px"]) >= thresholds["edge_f1_min"]
                      and float(comparison["de00_p95"]) <= thresholds["de00_p95"]
                      and float(comparison["rgb_mae"]) <= thresholds["alpha_background_mae_max"]
                  )

              def _decide(
                  self, before: dict[str, Any], after: dict[str, Any], *, stage_id: str,
              ) -> list[str]:
          ''',
              'render comparison methods',
          )

          replace_once(
              '''        visual_keys = ("ssim", "edge_f1_1px", "seam_ratio", "component_delta", "hole_delta")
                  if any(key not in after for key in visual_keys):
                      reasons.append("stage_metrics_incomplete")

                  if "alpha_fidelity" in self.required_metrics:
          ''',
              '''        visual_keys = ("ssim", "edge_f1_1px", "seam_ratio", "component_delta", "hole_delta")
                  if any(key not in after for key in visual_keys):
                      reasons.append("stage_metrics_incomplete")
                  render_comparison = self._render_comparison(before, after)

                  if "alpha_fidelity" in self.required_metrics:
          ''',
              'render comparison decision setup',
          )

          replace_once(
              '''                if float(alpha_comparison["alpha_mae"]) > alpha_thresholds["alpha_mae_max"]:
                          reasons.append("alpha_mae_regression")
                  if reasons:
          ''',
              '''                if float(alpha_comparison["alpha_mae"]) > alpha_thresholds["alpha_mae_max"]:
                          reasons.append("alpha_mae_regression")

                  if "gradient_fidelity" in self.required_metrics:
                      if render_comparison is None:
                          reasons.append("gradient_stage_metrics_incomplete")
                      else:
                          from app.final_artifact_evaluator import _thresholds  # noqa: PLC0415

                          gradient_thresholds = _thresholds(self.image_class, None)
                          if float(render_comparison["ssim"]) < gradient_thresholds["ssim_min"]:
                              reasons.append("gradient_ssim_regression")
                          if float(render_comparison["edge_f1_1px"]) < gradient_thresholds["edge_f1_min"]:
                              reasons.append("gradient_edge_regression")
                          if float(render_comparison["de00_p95"]) > gradient_thresholds["de00_p95"]:
                              reasons.append("gradient_color_regression")
                          if float(render_comparison["rgb_mae"]) > gradient_thresholds["alpha_background_mae_max"]:
                              reasons.append("gradient_rgb_mae_regression")
                  if reasons:
          ''',
              'gradient decision',
          )

          replace_once(
              '''            if self.image_class != "photo":
                      if after["component_delta"] > before["component_delta"]:
                          reasons.append("topology_component_regression")
                      if after["hole_delta"] > before["hole_delta"]:
                          reasons.append("topology_hole_regression")
          ''',
              '''            coordinate_render_equivalent = (
                      stage_id == "restore_source_dimensions"
                      and self._render_equivalent(render_comparison)
                  )
                  if self.image_class != "photo" and not coordinate_render_equivalent:
                      if after["component_delta"] > before["component_delta"]:
                          reasons.append("topology_component_regression")
                      if after["hole_delta"] > before["hole_delta"]:
                          reasons.append("topology_hole_regression")
          ''',
              'topology alias scope',
          )

          replace_once(
              '''            reasons = self._decide(before, after)
          ''',
              '''            reasons = self._decide(before, after, stage_id=stage_id)
          ''',
              'decide call',
          )

          replace_once(
              '''        alpha_comparison = self._alpha_comparison(before or {}, after or {})
                  before_public = (
          ''',
              '''        alpha_comparison = self._alpha_comparison(before or {}, after or {})
                  render_comparison = self._render_comparison(before or {}, after or {})
                  before_public = (
          ''',
              'stage comparison setup',
          )

          replace_once(
              '''            "alpha_comparison": alpha_comparison,
                      "metric_deltas": self._deltas(before or {}, after or {}),
          ''',
              '''            "alpha_comparison": alpha_comparison,
                      "render_comparison": render_comparison,
                      "metric_deltas": self._deltas(before or {}, after or {}),
          ''',
              'stage comparison publication',
          )

          compile(production, str(production_path), 'exec')
          production_path.write_text(production)

          test_path = Path('engine/test_transform_journal.py')
          tests = test_path.read_text()
          test_name = 'test_gradient_preserving_restore_and_render_equivalent_topology_alias'
          if test_name not in tests:
              marker = '\ndef test_assertions_are_real() -> None:\n'
              assert marker in tests, 'test insertion anchor missing'
              addition = r'''
          def test_gradient_preserving_restore_and_render_equivalent_topology_alias(
              tmp_path: Path, monkeypatch: pytest.MonkeyPatch,
          ) -> None:
              import app.fidelity as fidelity
              import app.transform_journal as transform_journal
              from app.pipeline import _restore_source_dimensions
              from app.transform_journal import TransformJournal

              source = _square_source()
              monkeypatch.setattr(fidelity, "render_svg_to_rgb", lambda *_args, **_kwargs: source.copy())
              path = tmp_path / "gradient-no-viewbox.svg"
              path.write_bytes(
                  b'<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128">'
                  b'<defs><linearGradient id="g"><stop offset="0" stop-color="#e3000b"/>'
                  b'<stop offset="1" stop-color="#554bad"/></linearGradient></defs>'
                  b'<rect x="24" y="24" width="80" height="80" fill="url(#g)"/></svg>'
              )
              journal = TransformJournal(path, source, required_metrics={"gradient_fidelity"})
              accepted, _report, stage = journal.run_in_place(
                  "restore_source_dimensions", path,
                  lambda candidate: _restore_source_dimensions(
                      candidate, {"width": 128, "height": 128},
                  ),
              )
              assert accepted
              assert stage["status"] == "accepted"
              assert stage["required_unmeasured"] == []
              assert stage["render_comparison"]["ssim"] == pytest.approx(1.0)
              assert "_render_rgb" not in stage["before_metrics"]
              assert "_render_rgb" not in stage["after_metrics"]
              assert ET.fromstring(path.read_bytes()).get("viewBox") == "0 0 128 128"

              parent = tmp_path / "parent.svg"
              candidate = tmp_path / "candidate.svg"
              parent.write_bytes(_square_svg())
              candidate.write_bytes(_square_svg("<metadata>candidate</metadata>"))

              def synthetic_measure(data: bytes, _source: np.ndarray, **kwargs):
                  changed = b"candidate" in data
                  return {
                      "sha256": hashlib.sha256(data).hexdigest(),
                      "byte_size": len(data),
                      "structural_safe": True,
                      "structural_failure_codes": [],
                      "path_count": 1,
                      "node_count": 5,
                      "gradient_definition_count": 0,
                      "required_unmeasured": [],
                      "ssim": 0.99,
                      "edge_f1_1px": 0.995,
                      "seam_ratio": 0.0,
                      "component_delta": 11 if changed else 10,
                      "hole_delta": 0,
                      "_render_rgb": source.copy(),
                  }

              monkeypatch.setattr(transform_journal, "_measure_svg_bytes", synthetic_measure)
              restore_journal = TransformJournal(parent, source)
              restored, restore_stage = restore_journal.consider_candidate(
                  "restore_source_dimensions", parent, candidate,
              )
              assert restored == candidate
              assert restore_stage["status"] == "accepted"
              assert restore_stage["render_comparison"]["ssim"] == pytest.approx(1.0)

              downstream_journal = TransformJournal(parent, source)
              downstream, downstream_stage = downstream_journal.consider_candidate(
                  "boundary_refit", parent, candidate,
              )
              assert downstream == parent
              assert "topology_component_regression" in downstream_stage["reason_codes"]


          def test_gradient_render_regression_and_missing_render_fail_closed(
              tmp_path: Path, monkeypatch: pytest.MonkeyPatch,
          ) -> None:
              import app.fidelity as fidelity
              from app.transform_journal import TransformJournal

              source = _square_source()

              def gradient_render(path: Path, _width: int, _height: int) -> np.ndarray:
                  rendered = source.copy()
                  if b"gradient-loss" in Path(path).read_bytes():
                      rendered[:, 64:] = (0, 0, 0)
                  return rendered

              monkeypatch.setattr(fidelity, "render_svg_to_rgb", gradient_render)
              parent = tmp_path / "parent.svg"
              candidate = tmp_path / "candidate.svg"
              parent.write_bytes(_square_svg())
              candidate.write_bytes(_square_svg("<metadata>gradient-loss</metadata>"))
              journal = TransformJournal(
                  parent, source, required_metrics={"gradient_fidelity"},
              )
              accepted, stage = journal.consider_candidate(
                  "restore_source_dimensions", parent, candidate,
              )
              assert accepted == parent
              assert set(stage["reason_codes"]) & {
                  "gradient_ssim_regression", "gradient_edge_regression",
                  "gradient_color_regression", "gradient_rgb_mae_regression",
              }

              monkeypatch.setattr(fidelity, "render_svg_to_rgb", lambda *_args, **_kwargs: None)
              missing_journal = TransformJournal(
                  parent, source, required_metrics={"gradient_fidelity"},
              )
              missing, missing_stage = missing_journal.consider_candidate(
                  "restore_source_dimensions", parent, candidate,
              )
              assert missing == parent
              assert "required_metric_unmeasured" in missing_stage["reason_codes"]
              assert "gradient_stage_metrics_incomplete" in missing_stage["reason_codes"]


          def test_gradient_measurement_is_scoped_to_source_dimension_restore(
              tmp_path: Path, monkeypatch: pytest.MonkeyPatch,
          ) -> None:
              import app.fidelity as fidelity
              from app.transform_journal import TransformJournal

              source = _square_source()
              monkeypatch.setattr(fidelity, "render_svg_to_rgb", lambda *_args, **_kwargs: source.copy())
              parent = tmp_path / "parent.svg"
              candidate = tmp_path / "candidate.svg"
              parent.write_bytes(_square_svg())
              candidate.write_bytes(_square_svg("<metadata>downstream-gradient</metadata>"))
              journal = TransformJournal(
                  parent, source, required_metrics={"gradient_fidelity"},
              )
              accepted, stage = journal.consider_candidate(
                  "boundary_refit", parent, candidate,
              )
              assert accepted == parent
              assert stage["status"] == "rolled_back"
              assert stage["required_unmeasured"] == ["gradient_fidelity"]
              assert "required_metric_unmeasured" in stage["reason_codes"]
              assert "gradient_stage_metrics_incomplete" in stage["reason_codes"]
              assert stage["render_comparison"] is None
          '''
              tests = tests.replace(
                  marker,
                  '\n' + addition.strip('\n') + '\n\n' + marker.lstrip('\n'),
                  1,
              )
              compile(tests, str(test_path), 'exec')
              test_path.write_text(tests)
          PY
          git diff --check -- engine/app/transform_journal.py engine/test_transform_journal.py

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install production test dependencies
        run: python -m pip install -r engine/requirements.txt pytest

      - name: Compile changed production and historical contracts
        run: >-
          python -m py_compile
          engine/app/transform_journal.py
          engine/test_transform_journal.py
          engine/regression/rfv3e_viewbox_journal_diagnostics.py
          engine/regression/test_rfv3e_viewbox_journal_diagnostics.py

      - name: Run complete transform journal contract
        working-directory: engine
        run: pytest -q test_transform_journal.py

      - name: Verify stage-scoped alpha, gradient and coordinate render behavior
        working-directory: engine
        run: >-
          pytest -q test_transform_journal.py
          -k 'alpha_preserving_viewbox_restore or alpha_plane_regression or unmeasured_alpha or alpha_measurement_is_scoped or alpha_restore_reuses_single_rgba_render or gradient_preserving_restore or gradient_render_regression or gradient_measurement_is_scoped'

      - name: Verify immutable historical diagnostics
        run: |
          python -m unittest engine.regression.test_rfv3e_viewbox_journal_diagnostics -v
          python -m engine.regression.rfv3e_viewbox_journal_diagnostics verify \
            --evidence docs/real_world_fidelity/evidence/rfv3e_viewbox_journal_diagnostics.json

      - name: Verify narrow production and evidence-contract diff scope
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          while IFS= read -r path; do
            [ -z "${path}" ] && continue
            case "${path}" in
              .github/workflows/real-world-fidelity-rfv3e-viewbox-fix.yml|\
              .github/workflows/real-world-fidelity-rfv3e-viewbox-journal-diagnostics.yml|\
              engine/app/transform_journal.py|\
              engine/test_transform_journal.py|\
              engine/regression/rfv3e_viewbox_journal_diagnostics.py|\
              engine/regression/test_rfv3e_viewbox_journal_diagnostics.py|\
              docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-fix.md|\
              docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-diagnostics.md)
                ;;
              *)
                echo "Unexpected file in RFV-3E viewBox fix diff: ${path}"
                exit 1
                ;;
            esac
          done <<< "${changed}"

      - name: Confirm historical evidence bytes are unchanged
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code "origin/${{ github.base_ref }}...HEAD" -- \
            docs/real_world_fidelity/evidence/rfv3e_viewbox_journal_diagnostics.json

      - name: Confirm forbidden contracts are unchanged
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code "origin/${{ github.base_ref }}...HEAD" -- \
            engine/app/final_artifact_evaluator.py \
            engine/app/pipeline.py \
            engine/benchmark \
            docs/real_world_fidelity/evidence/rfv3_quality_decision.json \
            docs/real_world_fidelity_roadmap.json

      - name: Confirm release remains NO-GO and RFV-4 blocked
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          roadmap = json.loads(Path('docs/real_world_fidelity_roadmap.json').read_text())
          decision = json.loads(
              Path('docs/real_world_fidelity/evidence/rfv3_quality_decision.json').read_text()
          )
          assert roadmap['phases'][2]['status'] == 'pending'
          assert roadmap['phases'][3]['status'] == 'pending'
          assert decision['release_decision'] == 'no_go'
          assert decision['rfv4_allowed'] is False
          print('RFV-3 remains pending; RFV-4 remains blocked')
          PY

      - name: Publish verified coordinate render proof patch
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          RFV3E_HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add engine/app/transform_journal.py engine/test_transform_journal.py
          if git diff --cached --quiet; then
            echo "Coordinate render proof patch already applied"
            exit 0
          fi
          git diff --cached --check
          git commit -m "RFV-3E: prove coordinate render preservation"
          git push origin "HEAD:${RFV3E_HEAD_BRANCH}"

  diagnose-live-restore-stage:
    name: diagnose live restore (${{ matrix.case_id }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        case_id:
          - qualification-public-10
          - qualification-public-14
          - qualification-public-18
    env:
      PYTHONHASHSEED: "0"
      PYTHONPATH: engine
      VEKTORYUM_WORKERS: "1"
      CASE_ID: ${{ matrix.case_id }}
      SOURCE_RUN_ID: "29678093202"
      SOURCE_ARTIFACT_ID: "8439637898"
      SOURCE_HEAD_SHA: "8d9641c070f69ee1893a7bea9739588cb4bdc23b"
      SOURCE_ARTIFACT_DIGEST: "sha256:90f4f509c8c2e856af560e3848817e3903dfd4d5ba8e56e3a1c6770006a32cf8"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install system validators
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ghostscript libcairo2

      - name: Install production diagnostic dependencies
        run: python -m pip install -r engine/requirements.txt

      - name: Verify immutable source artifact identity
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${SOURCE_ARTIFACT_ID}" \
            > "${RUNNER_TEMP}/source-artifact.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          meta = json.loads((Path(os.environ['RUNNER_TEMP']) / 'source-artifact.json').read_text())
          assert meta['id'] == int(os.environ['SOURCE_ARTIFACT_ID'])
          assert meta['name'] == f"rfv3b-corpus-{os.environ['SOURCE_HEAD_SHA']}"
          assert meta['expired'] is False
          assert meta['digest'] == os.environ['SOURCE_ARTIFACT_DIGEST']
          assert meta['workflow_run']['id'] == int(os.environ['SOURCE_RUN_ID'])
          assert meta['workflow_run']['head_sha'] == os.environ['SOURCE_HEAD_SHA']
          PY

      - name: Download exact immutable RFV-3B corpus
        uses: actions/download-artifact@v4
        with:
          name: rfv3b-corpus-8d9641c070f69ee1893a7bea9739588cb4bdc23b
          path: ${{ runner.temp }}/rfv3e-diagnostic-input
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: 29678093202

      - name: Prepare exact reviewed corpus
        run: >-
          python -m engine.regression.rfv3_live_prepare
          --bundle "${RUNNER_TEMP}/rfv3e-diagnostic-input/rfv2-public-corpus.tar.gz"
          --checksums "${RUNNER_TEMP}/rfv3e-diagnostic-input/bundle-checksums.json"
          --destination "${RUNNER_TEMP}/rfv3e-diagnostic-corpus"
          --evidence-out "${RUNNER_TEMP}/rfv3e-diagnostic-prepare.json"

      - name: Reproduce and sanitize restore-stage journal
        shell: bash
        run: |
          set +e
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          from PIL import Image

          from app.pipeline_entry import run_pipeline
          from engine.regression.rfv3_measurement_runner import load_qualification_cases

          runner_temp = Path(os.environ['RUNNER_TEMP'])
          case_id = os.environ['CASE_ID']
          output_path = runner_temp / f"rfv3e-live-restore-{case_id}.json"
          corpus_root = runner_temp / 'rfv3e-diagnostic-corpus'
          work_root = runner_temp / 'rfv3e-diagnostic-work'

          def sanitize_text(value: object) -> str:
              text = str(value)
              text = re.sub(r'(?:[A-Za-z]:)?(?:[\\/][\w.\-~+]+){2,}', '<redacted-path>', text)
              text = re.sub(r'0x[0-9a-fA-F]+', '<addr>', text)
              return text[:200]

          def public_metrics(value: object) -> dict[str, object] | None:
              if not isinstance(value, dict):
                  return None
              allowed = {
                  'sha256', 'byte_size', 'structural_safe', 'structural_failure_codes',
                  'measurement_repairs', 'required_unmeasured', 'ssim', 'edge_f1_1px',
                  'seam_ratio', 'component_delta', 'hole_delta', 'alpha_fidelity_status',
                  'alpha_coverage', 'alpha_sha256', 'gradient_fidelity_status',
                  'render_rgb_sha256', 'topology_refinement',
              }
              return {key: value[key] for key in sorted(allowed & set(value))}

          payload: dict[str, object]
          exit_code = 0
          try:
              cases = {item.case_id: item for item in load_qualification_cases(corpus_root)}
              case = cases[case_id]
              source = (corpus_root / case.source_path).resolve()
              job_dir = work_root / case_id
              job_dir.mkdir(parents=True, exist_ok=True)
              with Image.open(source) as opened:
                  image = opened.convert('RGBA')
                  result = run_pipeline(image, source, 'auto', job_dir)

              journal = result.get('transform_journal') or {}
              restore_stages = [
                  stage for stage in journal.get('stages', [])
                  if stage.get('stage_id') == 'restore_source_dimensions'
              ]
              if len(restore_stages) != 1:
                  raise RuntimeError(f'unexpected restore stage count: {len(restore_stages)}')
              stage = restore_stages[0]
              best = result.get('best') or {}
              svg_path = Path(best.get('svg_path') or '')
              svg_bytes = svg_path.read_bytes() if svg_path.is_file() else b''
              viewbox = None
              if svg_bytes:
                  viewbox = ET.fromstring(svg_bytes).get('viewBox')

              payload = {
                  'schema': 'vektoryum-rfv3e-live-restore-diagnostic-v1',
                  'status': 'completed',
                  'case_id': case_id,
                  'source_sha256': case.source_sha256,
                  'mode_used': result.get('mode_used'),
                  'selected_svg_sha256': hashlib.sha256(svg_bytes).hexdigest() if svg_bytes else None,
                  'selected_viewbox_present': bool(viewbox),
                  'selected_viewbox': viewbox,
                  'restore_stage': {
                      'status': stage.get('status'),
                      'reason_codes': stage.get('reason_codes'),
                      'parent_sha256': stage.get('parent_sha256'),
                      'candidate_sha256': stage.get('candidate_sha256'),
                      'accepted_sha256': stage.get('accepted_sha256'),
                      'duration_ms': stage.get('duration_ms'),
                      'required_unmeasured': stage.get('required_unmeasured'),
                      'alpha_comparison': stage.get('alpha_comparison'),
                      'render_comparison': stage.get('render_comparison'),
                      'before_metrics': public_metrics(stage.get('before_metrics')),
                      'after_metrics': public_metrics(stage.get('after_metrics')),
                  },
                  'journal_budget': journal.get('budget'),
                  'journal_budget_exhausted': journal.get('budget_exhausted'),
                  'chain_valid': journal.get('chain_valid'),
                  'chain_failure_codes': journal.get('chain_failure_codes'),
              }
          except BaseException as exc:
              exit_code = 1
              payload = {
                  'schema': 'vektoryum-rfv3e-live-restore-diagnostic-v1',
                  'status': 'failed',
                  'case_id': case_id,
                  'error_class': type(exc).__name__,
                  'error_message_sanitized': sanitize_text(exc),
              }

          output_path.write_text(json.dumps(payload, indent=2, sort_keys=True), encoding='utf-8')
          print(json.dumps(payload, sort_keys=True))
          sys.exit(exit_code)
          PY
          status=$?
          echo "${status}" > "${RUNNER_TEMP}/rfv3e-live-restore-${CASE_ID}.status"
          exit 0

      - name: Upload sanitized live restore diagnosis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rfv3e-live-restore-${{ matrix.case_id }}-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ runner.temp }}/rfv3e-live-restore-${{ matrix.case_id }}.json
            ${{ runner.temp }}/rfv3e-live-restore-${{ matrix.case_id }}.status
            ${{ runner.temp }}/rfv3e-diagnostic-prepare.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Require successful live diagnosis
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat "${RUNNER_TEMP}/rfv3e-live-restore-${CASE_ID}.status")" = "0"
