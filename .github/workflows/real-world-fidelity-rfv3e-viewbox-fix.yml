name: Real-world fidelity RFV-3E viewBox alpha-journal fix

on:
  pull_request:
    paths:
      - ".github/workflows/real-world-fidelity-rfv3e-viewbox-fix.yml"
      - ".github/workflows/real-world-fidelity-rfv3e-viewbox-journal-diagnostics.yml"
      - "engine/app/transform_journal.py"
      - "engine/test_transform_journal.py"
      - "engine/regression/rfv3e_viewbox_journal_diagnostics.py"
      - "engine/regression/test_rfv3e_viewbox_journal_diagnostics.py"
      - "docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-fix.md"
      - "docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-diagnostics.md"

permissions:
  contents: write

concurrency:
  group: rfv3e-viewbox-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rfv3e-viewbox-alpha-journal-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: engine
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # RFV3E_BOOTSTRAP_BEGIN
      - name: Apply one-shot shared RGBA render patch
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          RFV3E_HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          production_path = Path('engine/app/transform_journal.py')
          production = production_path.read_text()
          old_render = '''    render_rgba = None
              with tempfile.TemporaryDirectory(prefix="vektoryum-stage-") as directory:
                  path = Path(directory) / "candidate.svg"
                  path.write_bytes(render_data)
                  rnd = render_svg_to_rgb(path, w, h)
                  if measure_alpha and "alpha_fidelity" in set(required_metrics or ()):
                      render_rgba = _source_truth.render_svg_to_rgba(path, w, h)
              if rnd is None:
                  metric["required_unmeasured"] = sorted(
                      set(metric["required_unmeasured"]) | {"stage_render"}
                  )
                  return metric
              if rnd.shape[:2] != (h, w):
                  rnd = cv2.resize(rnd, (w, h), interpolation=cv2.INTER_AREA)
          '''
          new_render = '''    alpha_required = (
                  measure_alpha and "alpha_fidelity" in set(required_metrics or ())
              )
              render_rgba = None
              with tempfile.TemporaryDirectory(prefix="vektoryum-stage-") as directory:
                  path = Path(directory) / "candidate.svg"
                  path.write_bytes(render_data)
                  if alpha_required:
                      render_rgba = _source_truth.render_svg_to_rgba(path, w, h)
                      if render_rgba is not None:
                          if render_rgba.shape[:2] != (h, w):
                              render_rgba = _source_truth.resize_rgba(render_rgba, w, h)
                          # The alpha proof already produced a straight RGBA render.
                          # Reuse its white composite for the existing RGB gates instead
                          # of invoking a second independent SVG renderer.
                          rnd = _source_truth.composite_rgba(render_rgba, 255)
                      else:
                          # Preserve the existing visual diagnostics while alpha remains
                          # explicitly unmeasured and therefore fail-closed.
                          rnd = render_svg_to_rgb(path, w, h)
                  else:
                      rnd = render_svg_to_rgb(path, w, h)
              if rnd is None:
                  metric["required_unmeasured"] = sorted(
                      set(metric["required_unmeasured"]) | {"stage_render"}
                  )
                  return metric
              if rnd.shape[:2] != (h, w):
                  rnd = cv2.resize(rnd, (w, h), interpolation=cv2.INTER_AREA)
          '''
          old_alpha = '''    if measure_alpha and "alpha_fidelity" in set(required_metrics or ()):
                  if render_rgba is None:
                      metric["alpha_fidelity_status"] = "unmeasured"
                  else:
                      if render_rgba.shape[:2] != (h, w):
                          render_rgba = _source_truth.resize_rgba(render_rgba, w, h)
                      render_alpha = np.asarray(render_rgba[:, :, 3], dtype=np.uint8).copy()
          '''
          new_alpha = '''    if alpha_required:
                  if render_rgba is None:
                      metric["alpha_fidelity_status"] = "unmeasured"
                  else:
                      render_alpha = np.asarray(render_rgba[:, :, 3], dtype=np.uint8).copy()
          '''
          old_refine = '''            required_metrics=required_metrics,
                      measure_alpha=measure_alpha,
                      _allow_topology_refinement=False,
          '''
          new_refine = '''            required_metrics=required_metrics,
                      # The fine pass only replaces topology fields. Repeating the
                      # already-completed alpha proof here wastes the fixed journal
                      # budget without strengthening the decision.
                      measure_alpha=False,
                      _allow_topology_refinement=False,
          '''

          if old_render in production:
              production = production.replace(old_render, new_render, 1)
          else:
              assert 'alpha_required = (' in production, 'shared RGBA render patch anchor missing'
          if old_alpha in production:
              production = production.replace(old_alpha, new_alpha, 1)
          else:
              assert 'if alpha_required:' in production, 'alpha scope patch anchor missing'
          if old_refine in production:
              production = production.replace(old_refine, new_refine, 1)
          else:
              assert 'measure_alpha=False' in production, 'topology alpha reuse patch anchor missing'
          compile(production, str(production_path), 'exec')
          production_path.write_text(production)

          test_path = Path('engine/test_transform_journal.py')
          tests = test_path.read_text()
          test_name = 'test_alpha_restore_reuses_single_rgba_render_per_artifact'
          if test_name not in tests:
              marker = '\ndef test_assertions_are_real() -> None:\n'
              assert marker in tests, 'transform journal test insertion anchor missing'
              addition = r'''
          def test_alpha_restore_reuses_single_rgba_render_per_artifact(
              tmp_path: Path, monkeypatch: pytest.MonkeyPatch,
          ) -> None:
              import app.fidelity as fidelity
              import app.source_truth as source_truth
              from app.transform_journal import TransformJournal

              source = _square_source()
              calls = {"rgb": 0, "rgba": 0}

              def rgb_render(_path: Path, _width: int, _height: int) -> np.ndarray:
                  calls["rgb"] += 1
                  return source.copy()

              def rgba_render(_path: Path, width: int, height: int) -> np.ndarray:
                  calls["rgba"] += 1
                  rgba = np.zeros((height, width, 4), dtype=np.uint8)
                  rgba[24:104, 24:104, :3] = (227, 0, 11)
                  rgba[24:104, 24:104, 3] = 255
                  return rgba

              monkeypatch.setattr(fidelity, "render_svg_to_rgb", rgb_render)
              monkeypatch.setattr(source_truth, "render_svg_to_rgba", rgba_render)
              parent = tmp_path / "parent.svg"
              candidate = tmp_path / "candidate.svg"
              parent.write_bytes(_square_svg())
              candidate.write_bytes(_square_svg("<metadata>same-alpha</metadata>"))
              journal = TransformJournal(
                  parent, source, required_metrics={"alpha_fidelity"},
              )

              accepted, stage = journal.consider_candidate(
                  "restore_source_dimensions", parent, candidate,
              )

              assert accepted == candidate
              assert stage["status"] == "accepted"
              assert stage["required_unmeasured"] == []
              assert stage["alpha_comparison"]["alpha_iou"] == pytest.approx(1.0)
              assert calls == {"rgb": 0, "rgba": 2}
          '''
              tests = tests.replace(marker, '\n' + addition.strip('\n') + '\n\n' + marker.lstrip('\n'), 1)
          compile(tests, str(test_path), 'exec')
          test_path.write_text(tests)

          workflow_path = Path('.github/workflows/real-world-fidelity-rfv3e-viewbox-fix.yml')
          lines = workflow_path.read_text().splitlines(keepends=True)
          start = next(i for i, line in enumerate(lines) if line.strip() == '# RFV3E_BOOTSTRAP_BEGIN')
          end = next(i for i, line in enumerate(lines) if line.strip() == '# RFV3E_BOOTSTRAP_END')
          del lines[start:end + 1]
          lines = [
              line for line in lines
              if not (
                  line.lstrip().startswith('ref:')
                  and 'github.event.pull_request.head.sha' in line
              )
          ]
          workflow = ''.join(lines).replace('  contents: write\n', '  contents: read\n', 1)
          workflow = workflow.replace(
              "-k 'alpha_preserving_viewbox_restore or alpha_plane_regression or unmeasured_alpha or alpha_measurement_is_scoped'",
              "-k 'alpha_preserving_viewbox_restore or alpha_plane_regression or unmeasured_alpha or alpha_measurement_is_scoped or alpha_restore_reuses_single_rgba_render'",
              1,
          )
          workflow_path.write_text(workflow)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/real-world-fidelity-rfv3e-viewbox-fix.yml \
            engine/app/transform_journal.py \
            engine/test_transform_journal.py
          if git diff --cached --quiet; then
            echo "Shared RGBA render patch already applied"
            exit 0
          fi
          git commit -m "RFV-3E: reuse RGBA render within alpha journal"
          git push origin "HEAD:${RFV3E_HEAD_BRANCH}"
      # RFV3E_BOOTSTRAP_END

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install production test dependencies
        run: python -m pip install -r engine/requirements.txt pytest

      - name: Compile changed production and historical contracts
        run: >-
          python -m py_compile
          engine/app/transform_journal.py
          engine/test_transform_journal.py
          engine/regression/rfv3e_viewbox_journal_diagnostics.py
          engine/regression/test_rfv3e_viewbox_journal_diagnostics.py

      - name: Run complete transform journal contract
        working-directory: engine
        run: pytest -q test_transform_journal.py

      - name: Verify stage-scoped alpha behavior
        working-directory: engine
        run: >-
          pytest -q test_transform_journal.py
          -k 'alpha_preserving_viewbox_restore or alpha_plane_regression or unmeasured_alpha or alpha_measurement_is_scoped or alpha_restore_reuses_single_rgba_render'

      - name: Verify immutable historical diagnostics
        run: |
          python -m unittest engine.regression.test_rfv3e_viewbox_journal_diagnostics -v
          python -m engine.regression.rfv3e_viewbox_journal_diagnostics verify \
            --evidence docs/real_world_fidelity/evidence/rfv3e_viewbox_journal_diagnostics.json

      - name: Verify narrow production and evidence-contract diff scope
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          while IFS= read -r path; do
            [ -z "${path}" ] && continue
            case "${path}" in
              .github/workflows/real-world-fidelity-rfv3e-viewbox-fix.yml|\
              .github/workflows/real-world-fidelity-rfv3e-viewbox-journal-diagnostics.yml|\
              engine/app/transform_journal.py|\
              engine/test_transform_journal.py|\
              engine/regression/rfv3e_viewbox_journal_diagnostics.py|\
              engine/regression/test_rfv3e_viewbox_journal_diagnostics.py|\
              docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-fix.md|\
              docs/real_world_fidelity/rfv-3e-exact-metric-path-viewbox-diagnostics.md)
                ;;
              *)
                echo "Unexpected file in RFV-3E viewBox fix diff: ${path}"
                exit 1
                ;;
            esac
          done <<< "${changed}"

      - name: Confirm historical evidence bytes are unchanged
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code "origin/${{ github.base_ref }}...HEAD" -- \
            docs/real_world_fidelity/evidence/rfv3e_viewbox_journal_diagnostics.json

      - name: Confirm forbidden contracts are unchanged
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code "origin/${{ github.base_ref }}...HEAD" -- \
            engine/app/final_artifact_evaluator.py \
            engine/app/pipeline.py \
            engine/benchmark \
            docs/real_world_fidelity/evidence/rfv3_quality_decision.json \
            docs/real_world_fidelity_roadmap.json

      - name: Confirm release remains NO-GO and RFV-4 blocked
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          roadmap = json.loads(Path('docs/real_world_fidelity_roadmap.json').read_text())
          decision = json.loads(
              Path('docs/real_world_fidelity/evidence/rfv3_quality_decision.json').read_text()
          )
          assert roadmap['phases'][2]['status'] == 'pending'
          assert roadmap['phases'][3]['status'] == 'pending'
          assert decision['release_decision'] == 'no_go'
          assert decision['rfv4_allowed'] is False
          print('RFV-3 remains pending; RFV-4 remains blocked')
          PY
