name: FAZ 3D4 paint deficit production v8

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-paint-deficit-production.yml"
      - "engine/regression/faz3d4_integrate_paint_deficit.py"

permissions:
  contents: write

concurrency:
  group: faz-3d4-paint-deficit-production-v8-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: engine:.
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -q -r engine/requirements.txt pytest httpx

      - name: Integrate and compile artwork-anchored paint-deficit candidate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("engine/regression/faz3d4_integrate_paint_deficit.py")
          text = path.read_text(encoding="utf-8")
          start = text.index("    test_text = _extract_cat(workflow, str(test_path))")
          end = text.index("\n\n\ndef _paint_deficit_function", start)
          replacement = '''    test_text = _extract_cat(workflow, str(test_path))
              import re

              pattern = re.compile(
                  r'(?P<indent>^[ \\t]*)tree2, report2 = build_paint_deficit_reconstruction_tree\\(\\n'
                  r'(?P=indent)[ \\t]+copy\\.deepcopy\\(root\\), list\\(copy\\.deepcopy\\(root\\)\\)\\[0\\], source, "txn-fixed"\\n'
                  r'(?P=indent)\\)',
                  re.MULTILINE,
              )

              def replacement(match: re.Match[str]) -> str:
                  indent = match.group("indent")
                  return (
                      f"{indent}root2 = copy.deepcopy(root)\\n"
                      f"{indent}canvas2 = list(root2)[0]\\n"
                      f"{indent}tree2, report2 = build_paint_deficit_reconstruction_tree(\\n"
                      f"{indent}    root2, canvas2, source, \\"txn-fixed\\"\\n"
                      f"{indent})"
                  )

              test_text, count = pattern.subn(replacement, test_text, count=1)
              if count != 1:
                  raise RuntimeError(
                      f"determinism test repair count invalid: {count}"
                  )
              test_path.write_text(test_text, encoding="utf-8")'''
          replacement = "\n".join(
              line[14:] if line.startswith("              ") else line
              for line in replacement.splitlines()
          )
          path.write_text(text[:start] + replacement + text[end:], encoding="utf-8")
          PY

          python engine/regression/faz3d4_integrate_paint_deficit.py

          python - <<'PY'
          from pathlib import Path

          module = Path("engine/app/alpha_candidate_paint_deficit.py")
          text = module.read_text(encoding="utf-8")
          old = "    deficit = source_foreground & artwork_missing\n"
          new = (
              "    artwork_occupied = artwork[:, :, 3] > 0\n"
              "    deficit = source_foreground & artwork_missing & artwork_occupied\n"
          )
          if old not in text:
              raise SystemExit("paint-deficit occupancy anchor missing")
          module.write_text(text.replace(old, new, 1), encoding="utf-8")

          test = Path("engine/test_alpha_painter_paint_deficit.py")
          test_text = test.read_text(encoding="utf-8")
          anchor = "                  return root, canvas\n"
          addition = '''                  ET.SubElement(
                      root,
                      qname("rect"),
                      {"x": "2", "y": "0", "width": "1", "height": "4", "fill": "white"},
                  )
                  return root, canvas
'''
          if anchor not in test_text:
              raise SystemExit("paint-deficit test artwork anchor missing")
          test.write_text(test_text.replace(anchor, addition, 1), encoding="utf-8")
          PY

          git diff --check
          python -m py_compile \
            engine/app/alpha_candidate_paint_deficit.py \
            engine/app/alpha_candidate_painter.py \
            engine/test_alpha_painter_paint_deficit.py

      - name: Run focused painter contracts
        shell: bash
        run: |
          set -o pipefail
          python -m unittest \
            engine.test_alpha_painter_paint_deficit \
            engine.test_alpha_candidate_painter \
            engine.test_alpha_painter_encoding \
            engine.test_alpha_painter_ledger \
            engine.test_alpha_painter_retry \
            engine.test_alpha_painter_reconstruction_fidelity \
            engine.test_alpha_painter_stroke_continuation \
            -v 2>&1 | tee faz3d4-paint-deficit-focused.log

      - name: Run complete alpha suite
        shell: bash
        run: |
          set -o pipefail
          python -m unittest \
            engine.test_alpha_candidate_identity \
            engine.test_alpha_candidate_knockout \
            engine.test_alpha_candidate_paint_selection \
            engine.test_alpha_candidate_support \
            engine.test_alpha_candidate_validation \
            engine.test_alpha_candidate_painter \
            engine.test_alpha_candidate_background \
            engine.test_alpha_mask_adaptive \
            engine.test_alpha_mask_transaction \
            engine.test_alpha_preprocess \
            engine.test_alpha_noop_preflight \
            engine.test_alpha_clip_encoding \
            engine.test_alpha_artwork_identity \
            engine.test_alpha_painter_encoding \
            engine.test_alpha_painter_ledger \
            engine.test_alpha_painter_retry \
            engine.test_alpha_painter_reconstruction_fidelity \
            engine.test_alpha_painter_stroke_continuation \
            engine.test_alpha_painter_paint_deficit \
            -v 2>&1 | tee faz3d4-paint-deficit-alpha.log

      - name: Require Class Reklam and gradient acceptance
        working-directory: engine
        shell: bash
        run: |
          set -euo pipefail
          python test_visual_regression.py \
            --case class_reklam \
            --case gradient_logo \
            --require-baseline \
            --out-dir regression/faz3d4-paint-deficit-production-v8 \
            > regression/faz3d4-paint-deficit-production-v8.log 2>&1
          cat regression/faz3d4-paint-deficit-production-v8.log
          grep -F "PASS class_reklam" regression/faz3d4-paint-deficit-production-v8.log
          grep -F "PASS gradient_logo" regression/faz3d4-paint-deficit-production-v8.log

      - name: Commit accepted production code and clean temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/faz-3d4-*.yml
          rm -f engine/regression/faz3d4_integrate_paint_deficit.py
          rm -rf engine/regression/faz3d4-paint-deficit-production-v8
          rm -f \
            faz3d4-paint-deficit-focused.log \
            faz3d4-paint-deficit-alpha.log \
            engine/regression/faz3d4-paint-deficit-production-v8.log
          git add -A \
            .github/workflows \
            engine/regression \
            engine/app/alpha_candidate_paint_deficit.py \
            engine/app/alpha_candidate_painter.py \
            engine/test_alpha_painter_paint_deficit.py
          test -z "$(git status --porcelain --untracked-files=no | grep -E 'engine/regression/faz3d4|\.github/workflows/faz-3d4-' || true)"
          git -c user.name='Vektoryum CI' -c user.email='actions@github.com' commit \
            -m 'fix: overlay artwork-anchored paint deficits under source alpha' \
            -m 'Add a generic vector-only q24 fallback that repairs source-foreground pixels rendered white only inside existing artwork coverage. Detached source components remain fail-closed. The candidate uses a deterministic dominant source palette and compact rectangles and remains behind unchanged alpha, TransformJournal, complexity, topology, SSIM, Edge F1 and seam gates.'
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Upload safe logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faz3d4-paint-deficit-production-v8-${{ github.run_id }}
          path: |
            faz3d4-paint-deficit-focused.log
            faz3d4-paint-deficit-alpha.log
            engine/regression/faz3d4-paint-deficit-production-v8.log
          if-no-files-found: warn
          retention-days: 7
