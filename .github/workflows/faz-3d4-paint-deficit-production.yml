name: FAZ 3D4 component anchored paint deficit

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-paint-deficit-production.yml"

permissions:
  contents: write

concurrency:
  group: faz-3d4-component-anchor-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: engine:.
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -q -r engine/requirements.txt pytest httpx

      - name: Add component-anchored source support
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          module_path = Path("engine/app/alpha_candidate_paint_deficit.py")
          text = module_path.read_text(encoding="utf-8")
          if "import cv2\n" not in text:
              text = text.replace("import numpy as np\n", "import cv2\nimport numpy as np\n", 1)

          function_anchor = "\ndef _paint_deficit_labels(\n"
          helper = r'''

def _anchored_source_component_mask(
    source_alpha: np.ndarray,
    artwork_alpha: np.ndarray,
) -> tuple[np.ndarray, dict[str, int]]:
    """Return source-alpha components that are grounded in existing artwork.

    A source component may be completed only when at least one pixel of that same
    8-connected alpha component overlaps preserved artwork coverage. This repairs
    missing edges/interiors without synthesizing a completely detached source
    object. Acceptance remains owned by the unchanged alpha and journal gates.
    """
    source_positive = (np.asarray(source_alpha, dtype=np.uint8) > 0).astype(np.uint8)
    artwork_occupied = np.asarray(artwork_alpha, dtype=np.uint8) > 0
    component_count, labels = cv2.connectedComponents(source_positive, connectivity=8)
    anchored = np.zeros(source_positive.shape, dtype=bool)
    anchored_count = 0
    for component_id in range(1, int(component_count)):
        component = labels == component_id
        if bool(np.any(component & artwork_occupied)):
            anchored |= component
            anchored_count += 1
    total = max(0, int(component_count) - 1)
    return anchored, {
        "source_component_count": total,
        "anchored_source_component_count": int(anchored_count),
        "detached_source_component_count": int(total - anchored_count),
    }
'''
          if function_anchor not in text:
              raise SystemExit("paint-deficit function anchor missing")
          if "def _anchored_source_component_mask(" not in text:
              text = text.replace(function_anchor, helper + function_anchor, 1)

          old_deficit = '''    artwork_occupied = artwork[:, :, 3] > 0
    deficit = source_foreground & artwork_missing & artwork_occupied
'''
          new_deficit = '''    anchored_components, component_stats = _anchored_source_component_mask(
        source[:, :, 3], artwork[:, :, 3]
    )
    deficit = source_foreground & artwork_missing & anchored_components
'''
          if old_deficit not in text:
              raise SystemExit("paint-deficit occupancy block missing")
          text = text.replace(old_deficit, new_deficit, 1)

          old_empty = '''                "paint_deficit_alpha_residual_overlap": 0,
            },
'''
          new_empty = '''                "paint_deficit_alpha_residual_overlap": 0,
                **component_stats,
            },
'''
          if old_empty not in text:
              raise SystemExit("paint-deficit empty stats anchor missing")
          text = text.replace(old_empty, new_empty, 1)

          old_return = '''        "paint_deficit_alpha_residual_overlap": int(
            np.count_nonzero(deficit & alpha_residual)
        ),
    }
'''
          new_return = '''        "paint_deficit_alpha_residual_overlap": int(
            np.count_nonzero(deficit & alpha_residual)
        ),
        **component_stats,
    }
'''
          if old_return not in text:
              raise SystemExit("paint-deficit result stats anchor missing")
          text = text.replace(old_return, new_return, 1)
          module_path.write_text(text, encoding="utf-8")

          test_path = Path("engine/test_alpha_painter_paint_deficit.py")
          tests = test_path.read_text(encoding="utf-8")
          old_import = '''from app.alpha_candidate_paint_deficit import (
    _fixed_alpha_levels,
    _paint_deficit_labels,
    build_paint_deficit_reconstruction_tree,
)
'''
          new_import = '''from app.alpha_candidate_paint_deficit import (
    _anchored_source_component_mask,
    _fixed_alpha_levels,
    _paint_deficit_labels,
    build_paint_deficit_reconstruction_tree,
)
'''
          if old_import not in tests:
              raise SystemExit("paint-deficit test import anchor missing")
          tests = tests.replace(old_import, new_import, 1)

          test_anchor = '''    def test_builder_is_vector_only_deterministic_and_repairs_paint(self):
'''
          new_test = r'''    def test_detached_source_component_remains_fail_closed(self):
        source = np.zeros((6, 10, 4), dtype=np.uint8)
        source[1:5, 1:4, :3] = 0
        source[1:5, 1:4, 3] = 255
        source[1:5, 7:9, :3] = 0
        source[1:5, 7:9, 3] = 255

        artwork = np.zeros_like(source)
        artwork[1:5, 1:3, :3] = 0
        artwork[1:5, 1:3, 3] = 255
        artwork[1:5, 3:4, :3] = 255
        artwork[1:5, 3:4, 3] = 255

        anchored, component_stats = _anchored_source_component_mask(
            source[:, :, 3], artwork[:, :, 3]
        )
        labels, _palette, stats = _paint_deficit_labels(source, artwork)

        self.assertEqual(component_stats["source_component_count"], 2)
        self.assertEqual(component_stats["anchored_source_component_count"], 1)
        self.assertEqual(component_stats["detached_source_component_count"], 1)
        self.assertTrue(np.all(anchored[1:5, 1:4]))
        self.assertFalse(np.any(anchored[1:5, 7:9]))
        self.assertTrue(np.all(labels[1:5, 3] > 0))
        self.assertFalse(np.any(labels[1:5, 7:9]))
        self.assertEqual(stats["detached_source_component_count"], 1)

'''
          if test_anchor not in tests:
              raise SystemExit("paint-deficit test insertion anchor missing")
          if "test_detached_source_component_remains_fail_closed" not in tests:
              tests = tests.replace(test_anchor, new_test + test_anchor, 1)
          test_path.write_text(tests, encoding="utf-8")
          PY

          git diff --check
          python -m py_compile \
            engine/app/alpha_candidate_paint_deficit.py \
            engine/app/alpha_candidate_painter.py \
            engine/test_alpha_painter_paint_deficit.py

      - name: Run focused painter contracts
        shell: bash
        run: |
          set -o pipefail
          python -m unittest \
            engine.test_alpha_painter_paint_deficit \
            engine.test_alpha_candidate_painter \
            engine.test_alpha_painter_encoding \
            engine.test_alpha_painter_ledger \
            engine.test_alpha_painter_retry \
            engine.test_alpha_painter_reconstruction_fidelity \
            engine.test_alpha_painter_stroke_continuation \
            -v 2>&1 | tee faz3d4-component-focused.log

      - name: Run complete alpha suite
        shell: bash
        run: |
          set -o pipefail
          python -m unittest \
            engine.test_alpha_candidate_identity \
            engine.test_alpha_candidate_knockout \
            engine.test_alpha_candidate_paint_selection \
            engine.test_alpha_candidate_support \
            engine.test_alpha_candidate_validation \
            engine.test_alpha_candidate_painter \
            engine.test_alpha_candidate_background \
            engine.test_alpha_mask_adaptive \
            engine.test_alpha_mask_transaction \
            engine.test_alpha_preprocess \
            engine.test_alpha_noop_preflight \
            engine.test_alpha_clip_encoding \
            engine.test_alpha_artwork_identity \
            engine.test_alpha_painter_encoding \
            engine.test_alpha_painter_ledger \
            engine.test_alpha_painter_retry \
            engine.test_alpha_painter_reconstruction_fidelity \
            engine.test_alpha_painter_stroke_continuation \
            engine.test_alpha_painter_paint_deficit \
            -v 2>&1 | tee faz3d4-component-alpha.log

      - name: Require Class Reklam and gradient acceptance
        working-directory: engine
        shell: bash
        run: |
          set -euo pipefail
          python test_visual_regression.py \
            --case class_reklam \
            --case gradient_logo \
            --require-baseline \
            --out-dir regression/faz3d4-component-anchor \
            > regression/faz3d4-component-anchor.log 2>&1
          cat regression/faz3d4-component-anchor.log
          grep -F "PASS class_reklam" regression/faz3d4-component-anchor.log
          grep -F "PASS gradient_logo" regression/faz3d4-component-anchor.log

      - name: Commit accepted component anchor and clean executor
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/faz-3d4-paint-deficit-production.yml
          rm -rf engine/regression/faz3d4-component-anchor
          rm -f \
            faz3d4-component-focused.log \
            faz3d4-component-alpha.log \
            engine/regression/faz3d4-component-anchor.log
          git add -A \
            .github/workflows/faz-3d4-paint-deficit-production.yml \
            engine/app/alpha_candidate_paint_deficit.py \
            engine/test_alpha_painter_paint_deficit.py
          git -c user.name='Vektoryum CI' -c user.email='actions@github.com' commit \
            -m 'fix: anchor paint deficits to overlapping source components' \
            -m 'Complete missing paint only inside source-alpha components that overlap preserved artwork. Fully detached source components remain fail-closed. Existing alpha evaluator, TransformJournal, complexity and release gates remain unchanged.'
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Upload safe logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faz3d4-component-anchor-${{ github.run_id }}
          path: |
            faz3d4-component-focused.log
            faz3d4-component-alpha.log
            engine/regression/faz3d4-component-anchor.log
          if-no-files-found: warn
          retention-days: 7
