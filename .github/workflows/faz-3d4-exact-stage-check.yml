name: FAZ 3D4 exact residual staging check

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-exact-stage-check.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TEST_BRANCH: agent/faz3d4-residual-test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 0
      - name: Produce safe staging summary
        shell: bash
        run: |
          set +e
          git fetch origin "${TEST_BRANCH}:refs/remotes/origin/${TEST_BRANCH}" > /tmp/fetch.log 2>&1
          fetch_status=$?
          : > /tmp/residual.b64
          for part in 00 01 02 03; do
            git show "origin/${TEST_BRANCH}:engine/regression/residual_exact_${part}.txt" > "/tmp/${part}.txt" 2> "/tmp/${part}.err"
            echo "part_${part}_status=$? part_${part}_bytes=$(wc -c < /tmp/${part}.txt)" >> exact-stage-summary.txt
            cat "/tmp/${part}.txt" >> /tmp/residual.b64
          done
          base64 --decode /tmp/residual.b64 > /tmp/residual.patch 2>/tmp/decode.err
          decode_status=$?
          git apply --check /tmp/residual.patch > /tmp/apply.log 2>&1
          apply_status=$?
          {
            echo "fetch_status=${fetch_status}"
            echo "joined_bytes=$(wc -c < /tmp/residual.b64)"
            echo "decode_status=${decode_status}"
            echo "patch_bytes=$(wc -c < /tmp/residual.patch)"
            echo "patch_sha=$(sha256sum /tmp/residual.patch | cut -d' ' -f1)"
            echo "apply_status=${apply_status}"
            echo "fetch=$(tail -1 /tmp/fetch.log)"
            echo "decode=$(tail -1 /tmp/decode.err)"
            echo "apply=$(tail -3 /tmp/apply.log | tr '\n' ';')"
          } >> exact-stage-summary.txt
          cat exact-stage-summary.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: exact-stage-summary-${{ github.run_id }}
          path: exact-stage-summary.txt
          retention-days: 2
