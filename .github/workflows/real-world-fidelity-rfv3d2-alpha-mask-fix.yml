name: Real-world fidelity RFV-3D2 alpha-mask fix

on:
  pull_request:
    paths:
      - ".github/workflows/exact-final-svg.yml"
      - ".github/workflows/real-world-fidelity-rfv3d2-alpha-mask-fix.yml"
      - "engine/app/__init__.py"
      - "engine/app/alpha_candidate_background.py"
      - "engine/app/alpha_candidate_identity.py"
      - "engine/app/alpha_candidate_knockout.py"
      - "engine/app/alpha_candidate_paint_selection.py"
      - "engine/app/alpha_candidate_support.py"
      - "engine/app/alpha_candidate_support_compact.py"
      - "engine/app/alpha_candidate_validation.py"
      - "engine/app/alpha_candidate_painter.py"
      - "engine/app/alpha_artwork_identity.py"
      - "engine/app/alpha_mask_contour.py"
      - "engine/app/alpha_mask_adaptive.py"
      - "engine/app/alpha_preprocess.py"
      - "engine/app/alpha_mask_budget.py"
      - "engine/app/alpha_svg_mask.py"
      - "engine/test_alpha_candidate_identity.py"
      - "engine/test_alpha_candidate_knockout.py"
      - "engine/test_alpha_candidate_paint_selection.py"
      - "engine/test_alpha_candidate_support.py"
      - "engine/test_alpha_candidate_validation.py"
      - "engine/test_alpha_candidate_painter.py"
      - "engine/test_alpha_candidate_background.py"
      - "engine/test_alpha_mask_adaptive.py"
      - "engine/test_alpha_mask_transaction.py"
      - "engine/test_alpha_preprocess.py"
      - "engine/test_alpha_noop_preflight.py"
      - "engine/test_alpha_clip_encoding.py"
      - "engine/test_alpha_artwork_identity.py"
      - "engine/test_alpha_painter_encoding.py"
      - "engine/test_alpha_painter_ledger.py"
      - "engine/test_alpha_painter_retry.py"
      - "engine/test_alpha_painter_reconstruction_fidelity.py"
      - "engine/test_alpha_painter_stroke_continuation.py"
      - "docs/real_world_fidelity/rfv-3d2-alpha-mask-fix.md"
      - "docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-diagnostics.md"
      - "docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-fix.md"
      - "docs/real_world_fidelity/evidence/faz3d_painter_alpha_reconstruction_diagnostics.json"

permissions:
  contents: write

concurrency:
  group: rfv3d2-alpha-mask-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PYTHONHASHSEED: "0"
      PYTHONPATH: engine:.
      VEKTORYUM_WORKERS: "1"
      EXECUTOR_COMMIT_MESSAGE: "chore: execute verified Class Reklam stroke retry fix"
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install production and test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -q -r engine/requirements.txt pytest httpx

      - name: Apply and publish test-gated journal stroke continuation
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(git log -1 --pretty=%s)" != "${EXECUTOR_COMMIT_MESSAGE}" ]; then
            echo "Executor inactive for $(git log -1 --pretty=%s)."
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          path = Path('engine/app/alpha_candidate_painter.py')
          text = path.read_text()
          old_import = 'from app.alpha_svg_mask import _quantize_alpha  # noqa: PLC0415\n'
          new_import = (
              'from app.alpha_svg_mask import (  # noqa: PLC0415\n'
              '    _painter_retry_eligible,\n'
              '    _quantize_alpha,\n'
              ')\n'
          )
          assert text.count(old_import) == 1
          text = text.replace(old_import, new_import)

          old_break = '''                    # Journal geometri reddi maske-kaynaklıdır (node/seam) ve stroke'tan
                    # bağımsızdır → bu encoding için diğer stroke'ları deneme (maliyet).
                    break
'''
          new_break = '''                    # FAZ 3C sözleşmesi: topology/seam/SSIM/edge-F1 reddi
                    # destek genişliğine ve ölçekli AA'ya bağlı olabilir. TÜM journal
                    # kodları retry-eligible ise aynı encoding'in bir sonraki mevcut
                    # stroke adayını dene. Node/path/byte/palet gibi kapsam dışı tek
                    # kod varsa erken kesme korunur; fail-open veya eşik değişikliği yok.
                    if _painter_retry_eligible(journal_codes):
                        continue
                    break
'''
          assert text.count(old_break) == 1
          path.write_text(text.replace(old_break, new_break))

          test_path = Path('engine/test_alpha_painter_stroke_continuation.py')
          assert not test_path.exists()
          test_path.write_text(r'''from __future__ import annotations

import hashlib
import tempfile
import unittest
from pathlib import Path
from unittest.mock import patch

from app.alpha_candidate_painter import apply_candidate_painter_reconstruction
from engine.test_alpha_painter_ledger import (
    _capture_attempts,
    _covering_parent,
    _simple_soft_disc_source,
)


class PainterStrokeContinuationTests(unittest.TestCase):
    def test_retry_eligible_journal_rejection_tries_next_stroke(self) -> None:
        with tempfile.TemporaryDirectory() as directory:
            root = Path(directory)
            source = root / "s.png"
            svg = root / "c.svg"
            _simple_soft_disc_source(source)
            _covering_parent(svg, 96)
            calls: list[int] = []

            def journal(*_args, **_kwargs):
                calls.append(len(calls))
                if len(calls) == 1:
                    return False, ["topology_hole_regression", "seam_regression"]
                return True, []

            with patch(
                "app.alpha_candidate_painter._run_painter_geometry_journal",
                side_effect=journal,
            ):
                report, ledgers, error = _capture_attempts(
                    lambda: apply_candidate_painter_reconstruction(
                        svg, source, "logo_color"
                    )
                )

            self.assertIsNone(error)
            self.assertTrue(report["applied"])
            polygon = [
                entry for entry in ledgers[0]
                if entry["encoding_family"] == "polygon"
            ]
            self.assertEqual(
                [entry["stroke_width"] for entry in polygon], [1.0, 1.5, 2.0]
            )
            self.assertEqual(polygon[1]["status"], "geometry_rejected")
            self.assertEqual(
                polygon[1]["journal_reason_codes"],
                ["topology_hole_regression", "seam_regression"],
            )
            self.assertEqual(polygon[2]["status"], "accepted")
            self.assertTrue(polygon[2]["journal_passed"])
            self.assertGreaterEqual(len(calls), 2)

    def test_noneligible_journal_rejection_stops_and_rolls_back(self) -> None:
        with tempfile.TemporaryDirectory() as directory:
            root = Path(directory)
            source = root / "s.png"
            svg = root / "c.svg"
            _simple_soft_disc_source(source)
            original = _covering_parent(svg, 96)

            with patch(
                "app.alpha_candidate_painter._run_painter_geometry_journal",
                return_value=(False, ["node_complexity_explosion"]),
            ):
                _report, ledgers, error = _capture_attempts(
                    lambda: apply_candidate_painter_reconstruction(
                        svg, source, "logo_color"
                    )
                )

            self.assertIsInstance(error, RuntimeError)
            self.assertIn("node_complexity_explosion", str(error))
            self.assertEqual(svg.read_bytes(), original)
            validated = [entry for entry in ledgers[0] if entry["validation_started"]]
            self.assertTrue(validated)
            self.assertTrue(all(entry["stroke_width"] == 1.5 for entry in validated))

    def test_mixed_reason_set_is_not_retry_eligible(self) -> None:
        with tempfile.TemporaryDirectory() as directory:
            root = Path(directory)
            source = root / "s.png"
            svg = root / "c.svg"
            _simple_soft_disc_source(source)
            original = _covering_parent(svg, 96)
            mixed = ["topology_hole_regression", "node_complexity_explosion"]

            with patch(
                "app.alpha_candidate_painter._run_painter_geometry_journal",
                return_value=(False, mixed),
            ):
                _report, ledgers, error = _capture_attempts(
                    lambda: apply_candidate_painter_reconstruction(
                        svg, source, "logo_color"
                    )
                )

            self.assertIsInstance(error, RuntimeError)
            self.assertIn("node_complexity_explosion", str(error))
            self.assertEqual(svg.read_bytes(), original)
            validated = [entry for entry in ledgers[0] if entry["validation_started"]]
            self.assertTrue(validated)
            self.assertTrue(all(entry["stroke_width"] == 1.5 for entry in validated))
            self.assertTrue(all(entry["journal_reason_codes"] == mixed for entry in validated))

    def test_retry_path_is_deterministic(self) -> None:
        def run_once(root: Path):
            source = root / "s.png"
            svg = root / "c.svg"
            _simple_soft_disc_source(source)
            _covering_parent(svg, 96)
            calls: list[int] = []

            def journal(*_args, **_kwargs):
                calls.append(len(calls))
                if len(calls) == 1:
                    return False, ["topology_hole_regression", "seam_regression"]
                return True, []

            with patch(
                "app.alpha_candidate_painter._run_painter_geometry_journal",
                side_effect=journal,
            ):
                report, ledgers, error = _capture_attempts(
                    lambda: apply_candidate_painter_reconstruction(
                        svg, source, "logo_color"
                    )
                )
            self.assertIsNone(error)
            return (
                hashlib.sha256(svg.read_bytes()).hexdigest(),
                report["painter_encoding_label"],
                report["candidate_support_stroke_width_pixels"],
                report["painter_attempts_sha256"],
                ledgers[0],
            )

        with tempfile.TemporaryDirectory() as directory:
            root = Path(directory)
            first = root / "first"
            second = root / "second"
            first.mkdir()
            second.mkdir()
            self.assertEqual(run_once(first), run_once(second))


if __name__ == "__main__":
    unittest.main()
''')
          PY

          python -m py_compile \
            engine/app/alpha_candidate_painter.py \
            engine/test_alpha_painter_stroke_continuation.py

          python -m unittest \
            engine.test_alpha_painter_stroke_continuation \
            engine.test_alpha_painter_retry \
            engine.test_alpha_painter_reconstruction_fidelity \
            -v

          python -m unittest \
            engine.test_alpha_candidate_identity \
            engine.test_alpha_candidate_knockout \
            engine.test_alpha_candidate_paint_selection \
            engine.test_alpha_candidate_support \
            engine.test_alpha_candidate_validation \
            engine.test_alpha_candidate_painter \
            engine.test_alpha_candidate_background \
            engine.test_alpha_mask_adaptive \
            engine.test_alpha_mask_transaction \
            engine.test_alpha_preprocess \
            engine.test_alpha_noop_preflight \
            engine.test_alpha_clip_encoding \
            engine.test_alpha_artwork_identity \
            engine.test_alpha_painter_encoding \
            engine.test_alpha_painter_ledger \
            engine.test_alpha_painter_retry \
            engine.test_alpha_painter_reconstruction_fidelity \
            engine.test_alpha_painter_stroke_continuation \
            -v | tee faz3d-alpha-tests.log

          (
            cd engine
            python test_visual_regression.py \
              --case class_reklam \
              --case gradient_logo \
              --require-baseline \
              --out-dir regression/faz3d-stroke-retry-output \
              2>&1 | tee regression/faz3d-stroke-retry.log
          )

          git add \
            engine/app/alpha_candidate_painter.py \
            engine/test_alpha_painter_stroke_continuation.py
          git -c user.name='Vektoryum CI' -c user.email='actions@github.com' commit \
            -m 'fix: continue painter stroke search after eligible journal rejection' \
            -m 'Retry only when every journal reason remains inside the unchanged FAZ 3C topology/seam/SSIM/edge scope. Noneligible complexity or policy reasons still stop fail-closed. Retry eligibility, retry count, stroke list, thresholds, evaluator, TransformJournal, corpus, repeat, shard and timeout remain unchanged. Output remains deterministic vector-only with byte-identical rollback.'
          printf '\nfaz3d-alpha-tests.log\nengine/regression/faz3d-stroke-retry.log\nengine/regression/faz3d-stroke-retry-output/\n' >> .git/info/exclude
          test -z "$(git status --porcelain)"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Compile alpha-mask fix
        run: >-
          python -m py_compile
          engine/app/__init__.py
          engine/app/alpha_candidate_background.py
          engine/app/alpha_candidate_identity.py
          engine/app/alpha_candidate_knockout.py
          engine/app/alpha_candidate_paint_selection.py
          engine/app/alpha_candidate_support.py
          engine/app/alpha_candidate_support_compact.py
          engine/app/alpha_candidate_validation.py
          engine/app/alpha_candidate_painter.py
          engine/app/alpha_artwork_identity.py
          engine/app/alpha_mask_contour.py
          engine/app/alpha_mask_adaptive.py
          engine/app/alpha_preprocess.py
          engine/app/alpha_mask_budget.py
          engine/app/alpha_svg_mask.py
          engine/test_alpha_candidate_identity.py
          engine/test_alpha_candidate_knockout.py
          engine/test_alpha_candidate_paint_selection.py
          engine/test_alpha_candidate_support.py
          engine/test_alpha_candidate_validation.py
          engine/test_alpha_candidate_painter.py
          engine/test_alpha_candidate_background.py
          engine/test_alpha_mask_adaptive.py
          engine/test_alpha_mask_transaction.py
          engine/test_alpha_preprocess.py
          engine/test_alpha_noop_preflight.py
          engine/test_alpha_clip_encoding.py
          engine/test_alpha_artwork_identity.py
          engine/test_alpha_painter_encoding.py
          engine/test_alpha_painter_ledger.py
          engine/test_alpha_painter_retry.py
          engine/test_alpha_painter_reconstruction_fidelity.py
          engine/test_alpha_painter_stroke_continuation.py

      - name: Run alpha-mask unit and production integration tests
        shell: bash
        run: |
          set +e
          python -m unittest \
            engine.test_alpha_candidate_identity \
            engine.test_alpha_candidate_knockout \
            engine.test_alpha_candidate_paint_selection \
            engine.test_alpha_candidate_support \
            engine.test_alpha_candidate_validation \
            engine.test_alpha_candidate_painter \
            engine.test_alpha_candidate_background \
            engine.test_alpha_mask_adaptive \
            engine.test_alpha_mask_transaction \
            engine.test_alpha_preprocess \
            engine.test_alpha_noop_preflight \
            engine.test_alpha_clip_encoding \
            engine.test_alpha_artwork_identity \
            engine.test_alpha_painter_encoding \
            engine.test_alpha_painter_ledger \
            engine.test_alpha_painter_retry \
            engine.test_alpha_painter_reconstruction_fidelity \
            engine.test_alpha_painter_stroke_continuation \
            -v > alpha-mask-tests.log 2>&1
          status=$?
          cat alpha-mask-tests.log
          exit "${status}"

      - name: Upload alpha-mask test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rfv3d2-alpha-mask-tests-${{ github.run_id }}
          path: alpha-mask-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Confirm narrow production-fix diff scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "${HEAD_SHA}^{commit}"
          changed="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")"
          while IFS= read -r path; do
            [ -z "${path}" ] && continue
            case "${path}" in
              .github/workflows/exact-final-svg.yml|.github/workflows/real-world-fidelity-rfv3d2-alpha-mask-fix.yml|engine/app/__init__.py|engine/app/alpha_candidate_background.py|engine/app/alpha_candidate_identity.py|engine/app/alpha_candidate_knockout.py|engine/app/alpha_candidate_paint_selection.py|engine/app/alpha_candidate_support.py|engine/app/alpha_candidate_support_compact.py|engine/app/alpha_candidate_validation.py|engine/app/alpha_candidate_painter.py|engine/app/alpha_artwork_identity.py|engine/app/alpha_mask_contour.py|engine/app/alpha_mask_adaptive.py|engine/app/alpha_preprocess.py|engine/app/alpha_mask_budget.py|engine/app/alpha_svg_mask.py|engine/test_alpha_candidate_identity.py|engine/test_alpha_candidate_knockout.py|engine/test_alpha_candidate_paint_selection.py|engine/test_alpha_candidate_support.py|engine/test_alpha_candidate_validation.py|engine/test_alpha_candidate_painter.py|engine/test_alpha_candidate_background.py|engine/test_alpha_mask_adaptive.py|engine/test_alpha_mask_transaction.py|engine/test_alpha_preprocess.py|engine/test_alpha_noop_preflight.py|engine/test_alpha_clip_encoding.py|engine/test_alpha_artwork_identity.py|engine/test_alpha_painter_encoding.py|engine/test_alpha_painter_ledger.py|engine/test_alpha_painter_retry.py|engine/test_alpha_painter_reconstruction_fidelity.py|engine/test_alpha_painter_stroke_continuation.py|docs/real_world_fidelity/rfv-3d2-alpha-mask-fix.md|docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-diagnostics.md|docs/real_world_fidelity/faz-3d-painter-alpha-reconstruction-fix.md|docs/real_world_fidelity/evidence/faz3d_painter_alpha_reconstruction_diagnostics.json) ;;
              *) echo "Unexpected RFV-3D2 alpha-fix file: ${path}"; exit 1 ;;
            esac
          done <<< "${changed}"

      - name: Confirm evaluators policies corpus and retry contracts are unchanged
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: >-
          git diff --exit-code "${BASE_SHA}...${HEAD_SHA}" --
          engine/app/final_artifact_evaluator.py
          engine/app/source_truth.py
          engine/app/transform_journal.py
          engine/benchmark
          engine/regression/rfv3_measurement_policy.json
          engine/regression/rfv2_qualification_manifest.json
          docs/real_world_fidelity/evidence/rfv3_quality_decision.json
          docs/real_world_fidelity_roadmap.json

      - name: Confirm release remains NO-GO and RFV-4 blocked
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          roadmap = json.loads(Path('docs/real_world_fidelity_roadmap.json').read_text())
          decision = json.loads(
              Path('docs/real_world_fidelity/evidence/rfv3_quality_decision.json').read_text()
          )
          assert roadmap['phases'][2]['status'] == 'pending'
          assert roadmap['phases'][3]['status'] == 'pending'
          assert decision['release_decision'] == 'no_go'
          assert decision['rfv4_allowed'] is False
          PY
