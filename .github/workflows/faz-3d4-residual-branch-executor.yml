name: FAZ 3D4 residual test branch

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-residual-branch-executor.yml"

permissions:
  contents: write

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONHASHSEED: "0"
      PYTHONPATH: engine:.
      VEKTORYUM_WORKERS: "1"
      TEST_BRANCH: agent/faz3d4-residual-test
      TARGET_BRANCH: agent/rfv-3d3-canvas-independent-alpha-mask
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TEST_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -q -r engine/requirements.txt pytest httpx
      - name: Compile residual implementation
        run: |
          git diff --check "origin/${TARGET_BRANCH}...HEAD"
          python -m py_compile engine/app/alpha_candidate_painter.py engine/app/alpha_candidate_support.py engine/test_alpha_painter_residual_support.py
      - name: Focused residual contracts
        shell: bash
        run: |
          set -o pipefail
          python -m unittest engine.test_alpha_painter_residual_support engine.test_alpha_painter_encoding engine.test_alpha_painter_ledger engine.test_alpha_painter_retry engine.test_alpha_painter_reconstruction_fidelity engine.test_alpha_painter_stroke_continuation -v 2>&1 | tee faz3d4-residual-focused.log
      - name: Complete alpha suite
        shell: bash
        run: |
          set -o pipefail
          python -m unittest engine.test_alpha_candidate_identity engine.test_alpha_candidate_knockout engine.test_alpha_candidate_paint_selection engine.test_alpha_candidate_support engine.test_alpha_candidate_validation engine.test_alpha_candidate_painter engine.test_alpha_candidate_background engine.test_alpha_mask_adaptive engine.test_alpha_mask_transaction engine.test_alpha_preprocess engine.test_alpha_noop_preflight engine.test_alpha_clip_encoding engine.test_alpha_artwork_identity engine.test_alpha_painter_encoding engine.test_alpha_painter_ledger engine.test_alpha_painter_retry engine.test_alpha_painter_reconstruction_fidelity engine.test_alpha_painter_stroke_continuation engine.test_alpha_painter_residual_support -v 2>&1 | tee faz3d4-residual-alpha.log
      - name: Require Class Reklam and gradient acceptance
        working-directory: engine
        shell: bash
        run: |
          set -euo pipefail
          python test_visual_regression.py --case class_reklam --case gradient_logo --require-baseline --out-dir regression/faz3d4-residual-branch > regression/faz3d4-residual-branch.log 2>&1
          cat regression/faz3d4-residual-branch.log
          grep -F "PASS class_reklam" regression/faz3d4-residual-branch.log
          grep -F "PASS gradient_logo" regression/faz3d4-residual-branch.log
      - name: Publish accepted test branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:${TARGET_BRANCH}"
      - name: Upload safe logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faz3d4-residual-branch-${{ github.run_id }}
          path: |
            faz3d4-residual-focused.log
            faz3d4-residual-alpha.log
            engine/regression/faz3d4-residual-branch.log
          if-no-files-found: warn
          retention-days: 7
