name: FAZ 3D4 underpaint retention shadow

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-underpaint-retention-shadow.yml"

permissions:
  contents: read
  actions: read

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: engine:.
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2 unzip
          python -m pip install -q -r engine/requirements.txt pytest httpx

      - name: Patch shadow candidate to retain proven underpaint
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("engine/app/alpha_candidate_paint_deficit.py")
          text = path.read_text(encoding="utf-8")
          old_artwork = '''    artwork_root = copy.deepcopy(original_root)
              if canvas_index is not None:
                  artwork_root.remove(list(artwork_root)[canvas_index])
              artwork_rgba = _render_root(artwork_root, grid_width, grid_height)'''
          new_artwork = '''    artwork_root = copy.deepcopy(original_root)
              artwork_rgba = _render_root(artwork_root, grid_width, grid_height)'''
          if old_artwork not in text:
              raise SystemExit("artwork render anchor missing")
          text = text.replace(old_artwork, new_artwork, 1)

          old_empty = '''    if int(deficit_stats["paint_deficit_pixel_count"]) <= 0:
                  raise RuntimeError(
                      "source_alpha_candidate_painter_paint_deficit_empty"
                  )'''
          new_empty = '''    if (
                  int(deficit_stats["paint_deficit_pixel_count"]) <= 0
                  and canvas_index is None
              ):
                  raise RuntimeError(
                      "source_alpha_candidate_painter_paint_deficit_empty"
                  )'''
          if old_empty not in text:
              raise SystemExit("empty-deficit anchor missing")
          text = text.replace(old_empty, new_empty, 1)

          old_move = '''    for child in movable:
                  root.remove(child)
                  if child is target_canvas:
                      continue
                  _strip_content_alpha(child)
                  paint.append(child)
                  artwork_count += 1'''
          new_move = '''    for child in movable:
                  root.remove(child)
                  _strip_content_alpha(child)
                  paint.append(child)
                  artwork_count += 1'''
          if old_move not in text:
              raise SystemExit("canvas move anchor missing")
          path.write_text(text.replace(old_move, new_move, 1), encoding="utf-8")
          PY
          python -m py_compile engine/app/alpha_candidate_paint_deficit.py

      - name: Extract exact public sentinels from immutable RFV corpus
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/faz3d4-corpus /tmp/faz3d4-sources
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/tayfunates10/vektoryum-v1/actions/artifacts/8599318852/zip" \
            --output /tmp/faz3d4-corpus.zip
          unzip -q /tmp/faz3d4-corpus.zip -d /tmp/faz3d4-corpus
          tar -xzf /tmp/faz3d4-corpus/rfv2-public-corpus.tar.gz \
            -C /tmp/faz3d4-corpus
          cp \
            /tmp/faz3d4-corpus/objects/rfv/qualification/34/341204aa906bc0be33e2891a282a9cdb760711b3f348dc2a97ebe61829fad1fb.png \
            /tmp/faz3d4-sources/qualification-public-03.png
          cp \
            /tmp/faz3d4-corpus/objects/rfv/qualification/0e/0e0e94ad8311a1febb18debdb34f73f00c88ba965cef237a7d49f0954c5d7526.png \
            /tmp/faz3d4-sources/qualification-public-06.png
          echo "341204aa906bc0be33e2891a282a9cdb760711b3f348dc2a97ebe61829fad1fb  /tmp/faz3d4-sources/qualification-public-03.png" | sha256sum -c -
          echo "0e0e94ad8311a1febb18debdb34f73f00c88ba965cef237a7d49f0954c5d7526  /tmp/faz3d4-sources/qualification-public-06.png" | sha256sum -c -

      - name: Measure Class Reklam and public sentinels
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import tempfile
          from pathlib import Path

          import numpy as np
          from PIL import Image

          from app.alpha_candidate_knockout import _source_rgb_on_white
          from app.final_artifact_evaluator import evaluate_final_svg
          from app.pipeline_entry import run_pipeline

          cases = {
              "class_reklam": Path("engine/regression/fixtures/class_reklam.png"),
              "qualification-public-03": Path("/tmp/faz3d4-sources/qualification-public-03.png"),
              "qualification-public-06": Path("/tmp/faz3d4-sources/qualification-public-06.png"),
          }
          matrix = []
          for case_id, source in cases.items():
              job_dir = Path(tempfile.mkdtemp(prefix=f"faz3d4-{case_id}-"))
              record = {"case_id": case_id}
              try:
                  with Image.open(source) as image:
                      rgba = image.convert("RGBA")
                      source_array = np.asarray(rgba, dtype=np.uint8)
                      result = run_pipeline(rgba, source, "auto", job_dir)
                  final_svg = Path(result["best"]["svg_path"])
                  report = dict(result.get("alpha_mask_report") or {})
                  evaluator = evaluate_final_svg(
                      final_svg,
                      _source_rgb_on_white(source_array),
                      source_alpha=source_array[:, :, 3],
                      image_class=str(result.get("mode_used") or "geometric_logo"),
                      required_metrics={"alpha_fidelity"},
                  )
                  alpha_group = evaluator.metrics.get("G_gradient_alpha") or {}
                  record.update(
                      {
                          "status": "accepted",
                          "mode": result.get("mode_used"),
                          "best_name": result["best"].get("name"),
                          "alpha_report_status": report.get("status"),
                          "alpha_report_applied": report.get("applied"),
                          "reconstruction_mask_encoding": report.get("reconstruction_mask_encoding"),
                          "paint_deficit_pixel_count": report.get("paint_deficit_pixel_count"),
                          "paint_deficit_palette_count": report.get("paint_deficit_palette_count"),
                          "paint_deficit_support_rect_count": report.get("paint_deficit_support_rect_count"),
                          "before_byte_size": report.get("before_byte_size"),
                          "after_byte_size": report.get("after_byte_size"),
                          "evaluator_alpha_iou": alpha_group.get("alpha_iou"),
                          "evaluator_alpha_mae": alpha_group.get("alpha_mae"),
                          "hard_fail_codes": list(evaluator.hard_fail_codes),
                          "final_svg_bytes": final_svg.stat().st_size,
                          "final_svg_sha256": hashlib.sha256(final_svg.read_bytes()).hexdigest(),
                      }
                  )
              except Exception as exc:
                  record.update(
                      {
                          "status": "rejected",
                          "error_code": str(exc)[:500],
                      }
                  )
              matrix.append(record)

          payload = {
              "schema": "faz3d4-underpaint-retention-shadow-v2",
              "matrix": matrix,
          }
          Path("faz3d4-underpaint-retention-shadow.json").write_text(
              json.dumps(payload, sort_keys=True, indent=2), encoding="utf-8"
          )
          print(json.dumps(payload, sort_keys=True))
          if any(item["status"] != "accepted" for item in matrix):
              raise SystemExit(1)
          PY

      - name: Upload scalar-only matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faz3d4-underpaint-retention-shadow-${{ github.run_id }}
          path: faz3d4-underpaint-retention-shadow.json
          if-no-files-found: error
          retention-days: 7
