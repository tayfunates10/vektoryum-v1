name: Core curve-safe cutout contract

on:
  pull_request:
    paths:
      - "engine/app/cutouts.py"
      - "engine/app/safe_cutouts.py"
      - "engine/app/counter_merge.py"
      - "engine/app/main.py"
      - "engine/test_safe_cutouts.py"
      - "engine/test_core_vector_engine_roadmap.py"
      - "engine/core_vector_engine_roadmap.json"
      - "docs/CORE_VECTOR_ENGINE_ROADMAP.md"
      - ".github/workflows/core-safe-cutouts.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-safe-cutouts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: engine
    env:
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest httpx
      - name: Curve-safe cutout and roadmap contracts
        run: >-
          python -m pytest -q
          test_safe_cutouts.py
          test_core_vector_engine_roadmap.py
      - name: Legacy engine smoke contract
        run: python test_vector_engine.py
