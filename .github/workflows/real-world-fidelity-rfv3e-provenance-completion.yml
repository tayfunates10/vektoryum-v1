name: Real-world fidelity RFV-3E provenance completion

on:
  pull_request:
    paths:
      - ".github/workflows/real-world-fidelity-rfv3e-provenance-completion.yml"
      - "engine/benchmark/pipeline_results.py"
      - "engine/benchmark/pipeline_smoke.py"
      - "engine/regression/test_rfv3e_metric_provenance_completion.py"
      - "docs/real_world_fidelity/rfv-3e-exact-metric-path-provenance-completion.md"

permissions:
  contents: read

concurrency:
  group: rfv3e-provenance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rfv3e-provenance-completion:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: engine
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install provenance contract dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          numpy pillow opencv-python-headless scipy defusedxml

      - name: Compile provenance completion files
        run: |
          python -m py_compile \
            engine/benchmark/pipeline_results.py \
            engine/benchmark/pipeline_smoke.py \
            engine/regression/test_rfv3d2_metric_provenance.py \
            engine/regression/test_rfv3e_metric_provenance_completion.py

      - name: Test existing RFV-3D2 provenance contract
        run: python -m unittest engine.regression.test_rfv3d2_metric_provenance -v

      - name: Test RFV-3E repeat evaluator provenance
        run: python -m unittest engine.regression.test_rfv3e_metric_provenance_completion -v

      - name: Guard live measurement and aggregation contracts
        run: >-
          python -m unittest
          engine.regression.test_rfv3_live_measurement
          engine.regression.test_rfv3_measurement_runner
          engine.regression.test_rfv3_metric_coverage

      - name: Verify schemas and fail-closed repeat publication
        run: |
          python - <<'PY'
          from benchmark.pipeline_results import EVALUATOR_DETAIL_SCHEMA, PROVENANCE_SCHEMA
          from benchmark.pipeline_smoke import REPEAT_PROVENANCE_SCHEMA
          assert PROVENANCE_SCHEMA == 'rfv3d2-metric-provenance-v1'
          assert EVALUATOR_DETAIL_SCHEMA == 'rfv3e-exact-evaluator-detail-v1'
          assert REPEAT_PROVENANCE_SCHEMA == 'rfv3e-repeat-metric-provenance-v1'
          PY

      - name: Verify instrumentation-only diff scope
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          while IFS= read -r path; do
            [ -z "${path}" ] && continue
            case "${path}" in
              .github/workflows/real-world-fidelity-rfv3e-provenance-completion.yml|\
              engine/benchmark/pipeline_results.py|\
              engine/benchmark/pipeline_smoke.py|\
              engine/regression/test_rfv3e_metric_provenance_completion.py|\
              docs/real_world_fidelity/rfv-3e-exact-metric-path-provenance-completion.md)
                ;;
              *)
                echo "Unexpected file in RFV-3E provenance completion diff: ${path}"
                exit 1
                ;;
            esac
          done <<< "${changed}"

      - name: Confirm release remains NO-GO and RFV-4 blocked
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          roadmap = json.loads(Path('docs/real_world_fidelity_roadmap.json').read_text())
          decision = json.loads(Path('docs/real_world_fidelity/evidence/rfv3_quality_decision.json').read_text())
          assert roadmap['phases'][2]['status'] == 'pending'
          assert roadmap['phases'][3]['status'] == 'pending'
          assert decision['release_decision'] == 'no_go'
          assert decision['rfv4_allowed'] is False
          PY
