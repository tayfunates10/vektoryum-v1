name: FAZ 3D4 seam isolation v4

on:
  pull_request:
    paths:
      - ".github/workflows/faz-3d4-seam-isolation-v4.yml"

permissions:
  contents: read

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: engine:.
      PYTHONHASHSEED: "0"
      VEKTORYUM_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rfv-3d3-canvas-independent-alpha-mask
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghostscript libcairo2
          python -m pip install -q -r engine/requirements.txt pytest httpx
      - name: Rebuild and repair v3 script
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/faz-3d4-seam-isolation-v3.yml').read_text()
          start = "python - <<'PY'\n"
          end = "\n          PY\n          python -m py_compile /tmp/seam_isolation_v3.py"
          builder = textwrap.dedent(workflow.split(start, 1)[1].split(end, 1)[0])
          exec(compile(builder, '<v3-builder>', 'exec'))

          path = Path('/tmp/seam_isolation_v3.py')
          script = path.read_text()
          support_create = '''    support = ET.SubElement(
                  layer,
                  qname("g"),
                  {
                      "transform": (
                          f"translate({view_x:.12g} {view_y:.12g}) "
                          f"scale({view_w / width:.12g} {view_h / height:.12g})"
                      ),
                      "data-vektoryum-shadow-support": "solved-hidden-rgb",
                  },
              )
              rect_count = 0'''
          if '    rect_count = 0' not in script:
              raise SystemExit('rect_count insertion point missing')
          script = script.replace('    rect_count = 0', support_create, 1)
          script = script.replace(
              '            candidate = job_dir / f"{strategy_name}-{support_encoding}-{encoding}.svg"\n            try:',
              '            candidate = job_dir / f"{strategy_name}-{support_encoding}-{encoding}.svg"\n'
              '            geometry = {}\n'
              '            try:',
              1,
          )
          script = script.replace(
              'int(geometry["support_shape_count"])',
              'int(geometry.get("support_shape_count", 0))',
          )
          path.write_text(script)
          PY
          python -m py_compile /tmp/seam_isolation_v3.py
      - name: Run repaired seam-isolation candidates
        shell: bash
        run: |
          set +e
          python /tmp/seam_isolation_v3.py > seam-v4.log 2>&1
          status=$?
          set -e
          tail -180 seam-v4.log > seam-v4-tail.txt
          echo "exit_code=${status}" >> seam-v4-tail.txt
          exit 0
      - name: Upload scalar-only matrix
        uses: actions/upload-artifact@v4
        with:
          name: faz3d4-seam-isolation-v4-${{ github.run_id }}
          path: |
            faz3d4-hidden-rgb-shadow.json
            seam-v4-tail.txt
          if-no-files-found: warn
          retention-days: 7
